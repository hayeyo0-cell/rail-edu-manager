<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>등록된 교육 내역 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f4f6f9; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; max-width: 450px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { background: #fff; border: 1px solid #ddd; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        
        .container { width: 100%; max-width: 450px; }
        .section-title { font-size: 1.1rem; font-weight: bold; color: #333; margin: 10px 0 20px 0; border-left: 4px solid var(--dtro-blue); padding-left: 10px; }

        /* 교육 아이템 카드 */
        .edu-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: left; }
        .edu-date { font-size: 0.85rem; color: var(--dtro-blue); font-weight: bold; margin-bottom: 5px; }
        .edu-title { font-size: 1.1rem; font-weight: bold; color: #333; margin-bottom: 10px; display: block; }
        .edu-desc { font-size: 0.9rem; color: #666; line-height: 1.5; white-space: pre-wrap; margin-bottom: 15px; }
        
        .btn-group { display: flex; gap: 10px; justify-content: flex-end; }
        .del-btn { background: #ff4d4d; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; }
        
        .empty-msg { text-align: center; color: #ccc; padding: 50px 0; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="location.href='admin_main.html'">← 메인으로</button>
        <h3 style="margin:0;">교육 내역 관리</h3>
        <div style="width:70px;"></div> </div>

    <div class="container">
        <div id="deptDisplay" style="font-size: 0.9rem; color: #999; margin-bottom: 5px;">경산승무팀</div>
        <div class="section-title">현재 게시 중인 교육</div>

        <div id="eduListArea">
            </div>
    </div>

    <script>
        const myDept = localStorage.getItem('userDept') || "경산승무팀";

        window.onload = function() {
            document.getElementById('deptDisplay').innerText = "📍 " + myDept;
            renderEduList();
        };

        // 교육 리스트 그리기
        function renderEduList() {
            const listArea = document.getElementById('eduListArea');
            // 전체 교육 리스트 중 내 소속 교육만 필터링
            const totalEduList = JSON.parse(localStorage.getItem('totalEduList')) || [];
            const myEduList = totalEduList.filter(edu => edu.dept === myDept);

            if (myEduList.length === 0) {
                listArea.innerHTML = `
                    <div class="empty-msg">
                        <img src="https://cdn-icons-png.flaticon.com/512/4076/4076549.png" style="width:60px; opacity:0.3; margin-bottom:15px;"><br>
                        등록된 교육 내역이 없습니다.
                    </div>`;
                return;
            }

            // 최신순 정렬
            myEduList.sort((a, b) => new Date(b.date) - new Date(a.date));

            let html = '';
            myEduList.forEach((edu) => {
                html += `
                <div class="edu-card">
                    <div class="edu-date">${edu.date}</div>
                    <span class="edu-title">${edu.title}</span>
                    <div class="edu-desc">${edu.content}</div>
                    <div class="btn-group">
                        <button class="del-btn" onclick="deleteEdu('${edu.id}')">삭제하기</button>
                    </div>
                </div>
                `;
            });
            listArea.innerHTML = html;
        }

        // 교육 삭제 기능
        function deleteEdu(eduId) {
            if (!confirm("이 교육 내용을 삭제하시겠습니까?\n삭제 후에는 복구할 수 없습니다.")) return;

            let totalEduList = JSON.parse(localStorage.getItem('totalEduList')) || [];
            // 해당 ID만 제외하고 필터링
            totalEduList = totalEduList.filter(edu => String(edu.id) !== String(eduId));
            
            localStorage.setItem('totalEduList', JSON.stringify(totalEduList));
            renderEduList();
            alert("삭제되었습니다.");
        }
    </script>
</body>
</html>
