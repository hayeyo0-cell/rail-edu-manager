    <script>
        // 현재 로그인한 관리자의 소속 정보 가져오기
        const adminDept = localStorage.getItem('userDept') || "미지정 소속";

        window.onload = function() {
            loadSavedEdu();
        };

        function loadSavedEdu() {
            const listArea = document.getElementById('dynamicListArea');
            const emptyMsg = document.getElementById('emptyMessage');
            
            // 1. 전체 목록 가져오기
            let allEduList = JSON.parse(localStorage.getItem('myEduList')) || [];

            // 2. [핵심] 현재 관리자의 소속과 일치하는 교육만 필터링
            let myDeptEduList = allEduList.filter(edu => edu.dept === adminDept);

            if(myDeptEduList.length === 0) {
                emptyMsg.style.display = 'block'; 
                listArea.innerHTML = '';
                return;
            }

            emptyMsg.style.display = 'none';
            let html = '';

            // 3. 내 소속 목록만 화면에 출력
            myDeptEduList.forEach((edu) => {
                let badgeClass = 'badge-general';
                if(edu.category === '대면교육' || edu.category === '면담교육') badgeClass = 'badge-face';
                else if(edu.category === '시뮬레이션') badgeClass = 'badge-sim';
                else if(edu.category === '육성방송 훈련') badgeClass = 'badge-voice';
                else if(edu.category === '기타교육' || edu.category === '공지사항') badgeClass = 'badge-etc';

                const deadlineText = edu.deadline ? edu.deadline : '기한 없음';

                html += `
                <div class="edu-card">
                    <div class="card-header">
                        <span class="badge ${badgeClass}">${edu.category}</span>
                        <span class="date">등록: ${edu.date}</span>
                    </div>
                    <div class="edu-title">${edu.title}</div>
                    <div class="edu-deadline">⏳ 마감 기한: ${deadlineText} 까지</div>

                    <div class="card-actions">
                        <button class="action-btn btn-edit" onclick="alert('수정 화면은 곧 업데이트 예정입니다.')">수정</button>
                        <button class="action-btn btn-delete" onclick="deleteEdu('${edu.id}')">삭제</button>
                    </div>
                </div>
                `;
            });

            listArea.innerHTML = html;
        }

        // 삭제 기능 (전체 목록에서 고유 ID를 찾아 삭제)
        function deleteEdu(eduId) {
            if(confirm('이 교육 내역을 정말 삭제하시겠습니까?')) {
                let allEduList = JSON.parse(localStorage.getItem('myEduList')) || [];
                
                // 해당 ID를 제외한 나머지만 다시 저장
                const updatedList = allEduList.filter(edu => String(edu.id) !== String(eduId));
                
                localStorage.setItem('myEduList', JSON.stringify(updatedList)); 
                loadSavedEdu(); // 화면 갱신
            }
        }
    </script>
