<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교육 내역 관리 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f4f6f9; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* 헤더 스타일 고정 */
        .top-nav { 
            width: 100%; background: white; padding: 12px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-sizing: border-box; border-bottom: 1px solid #eee; 
            position: sticky; top: 0; z-index: 100;
        }
        .nav-btn { background: #f8f8f8; border: 1px solid #eee; border-radius: 6px; padding: 6px 12px; font-size: 0.8rem; color: #555; cursor: pointer; font-weight: bold; }
        .brand-logo { height: 42px; object-fit: contain; }
        
        .container { width: 92%; max-width: 400px; padding: 20px 0; }
        
        /* 교육 카드 디자인 */
        .edu-card { 
            background: white; border-radius: 20px; padding: 20px; 
            margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); 
            text-align: left; border: 1px solid rgba(0,0,0,0.02);
        }
        .edu-category { font-size: 0.75rem; color: var(--dtro-blue); font-weight: bold; margin-bottom: 5px; display: block; }
        .edu-title { font-weight: bold; font-size: 1.1rem; color: #333; margin-bottom: 8px; display: block; }
        .edu-date { font-size: 0.8rem; color: #999; margin-bottom: 12px; display: block; }
        
        .btn-group { display: flex; gap: 10px; justify-content: flex-end; }
        .del-btn { background: #ff4d4d; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="top-nav">
        <button class="nav-btn" onclick="location.replace('admin_main.html')">← 메인으로</button>
        <img src="logo.png" class="brand-logo" alt="DTRO Logo">
        <div style="width:75px;"></div>
    </div>

    <div class="container" id="listArea">
        </div>

    <script>
        // 🚨 [보안] 뒤로가기 차단 로직 (유지)
        (function() {
            function lockHistory() {
                for(let i = 0; i < 10; i++) window.history.pushState(null, null, window.location.href);
            }
            lockHistory();
            window.onpopstate = function() {
                lockHistory();
                window.location.replace('admin_main.html');
            };
            document.body.onclick = lockHistory;
        })();

        const myDept = localStorage.getItem('userDept') || "경산승무팀";

        window.onload = function() {
            renderEduList();
        };

        function renderEduList() {
            const listArea = document.getElementById('listArea');
            // 'totalEduList' 키를 정확하게 호출
            const totalEduList = JSON.parse(localStorage.getItem('totalEduList')) || [];
            
            // 내 소속(dept)이 일치하는 교육만 필터링
            const myEduList = totalEduList.filter(edu => edu.dept === myDept);

            if (myEduList.length === 0) { 
                listArea.innerHTML = `
                    <div style="text-align:center; margin-top:100px;">
                        <p style="color:#ccc; font-size:3rem; margin-bottom:10px;">📄</p>
                        <p style="color:#999; font-size:0.9rem;">등록된 교육 내역이 없습니다.<br>새 교육 등록 메뉴에서 추가해 주세요.</p>
                    </div>`;
                return; 
            }

            let html = '';
            // 최신 등록순으로 보기 위해 복사본을 reverse
            [...myEduList].reverse().forEach(edu => {
                html += `
                    <div class="edu-card">
                        <span class="edu-category">${edu.type || '일반교육'}</span>
                        <span class="edu-title">${edu.title}</span>
                        <span class="edu-date">📅 등록일: ${edu.date}</span>
                        <div class="btn-group">
                            <button class="del-btn" onclick="deleteEdu('${edu.id}')">삭제하기</button>
                        </div>
                    </div>`;
            });
            listArea.innerHTML = html;
        }

        function deleteEdu(id) {
            if(!confirm("정말 삭제하시겠습니까?\n삭제하면 사용자 화면에서도 사라집니다.")) return;
            
            let totalEduList = JSON.parse(localStorage.getItem('totalEduList')) || [];
            // 선택한 ID만 제외하고 다시 저장
            totalEduList = totalEduList.filter(edu => String(edu.id) !== String(id));
            localStorage.setItem('totalEduList', JSON.stringify(totalEduList));
            
            // 삭제 후 화면 다시 그리기
            renderEduList();
        }
    </script>
</body>
</html>
