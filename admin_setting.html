<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관리자 설정</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; --error-red: #ff4d4d; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .settings-card { width: 95%; max-width: 400px; background: white; border-radius: 25px; padding: 30px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); box-sizing: border-box; }
        .section-title { font-size: 1rem; font-weight: bold; color: var(--dtro-blue); border-left: 4px solid var(--dtro-blue); padding-left: 10px; margin: 25px 0 15px 0; }
        .input-label { font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 5px; display: block; }
        
        select, input { width: 100%; padding: 14px; margin-bottom: 10px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 0.95rem; outline: none; background: #fafafa; }
        input:focus { border-color: var(--dtro-blue); background: #fff; }
        
        /* 실시간 일치 여부 메시지 */
        .check-msg { font-size: 0.75rem; margin-bottom: 15px; display: none; padding-left: 5px; }
        .error { color: var(--error-red); }
        .success { color: #2ecc71; }

        .save-btn { width: 100%; padding: 18px; background: var(--dtro-blue); color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,114,188,0.2); }
    </style>
</head>
<body>
    <div class="settings-card">
        <h2 style="text-align:center; margin-bottom:30px;">🛠️ 관리자 설정 확인</h2>
        
        <div class="section-title">소속 지정</div>
        <select id="setDept">
            <option value="">소속을 선택하세요</option>
            <option value="경산승무팀">경산승무팀</option>
            <option value="안심승무팀">안심승무팀</option>
            <option value="월배승무팀">월배승무팀</option>
            <option value="문양승무팀">문양승무팀</option>
        </select>

        <div class="section-title">관리자 계정 설정</div>
        <span class="input-label">관리자 사번</span>
        <input type="number" id="setAdminId" placeholder="관리자 사번 입력">
        
        <span class="input-label">관리자 새 비밀번호</span>
        <input type="password" id="setAdminPw" placeholder="새 비밀번호 입력">
        <input type="password" id="confirmAdminPw" placeholder="비밀번호 확인 입력" oninput="validatePw()">
        <div id="pwCheckMsg" class="check-msg">비밀번호가 일치하지 않습니다.</div>

        <div class="section-title">팀원용 공용 비번 설정</div>
        <span class="input-label">공용 비밀번호 (팀원 로그인용)</span>
        <input type="password" id="setTeamPw" placeholder="공용 비밀번호 입력">

        <button class="save-btn" onclick="saveSettings()">설정 저장 및 완료</button>
    </div>

    <script>
        // 비밀번호 실시간 일치 확인
        function validatePw() {
            const pw = document.getElementById('setAdminPw').value;
            const confirm = document.getElementById('confirmAdminPw').value;
            const msg = document.getElementById('pwCheckMsg');

            if (confirm.length > 0) {
                msg.style.display = 'block';
                if (pw === confirm) {
                    msg.innerText = "✓ 비밀번호가 일치합니다.";
                    msg.className = "check-msg success";
                } else {
                    msg.innerText = "✗ 비밀번호가 일치하지 않습니다.";
                    msg.className = "check-msg error";
                }
            } else {
                msg.style.display = 'none';
            }
        }

        function saveSettings() {
            const dept = document.getElementById('setDept').value;
            const id = document.getElementById('setAdminId').value;
            const pw = document.getElementById('setAdminPw').value;
            const confirm = document.getElementById('confirmAdminPw').value;
            const teamPw = document.getElementById('setTeamPw').value;

            // 1. 모든 항목 입력 체크
            if(!dept || !id || !pw || !confirm || !teamPw) {
                alert('모든 항목을 빠짐없이 입력해 주세요!');
                return;
            }

            // 2. 관리자 비번 일치 체크
            if(pw !== confirm) {
                alert('관리자 비밀번호 확인이 일치하지 않습니다.');
                return;
            }

            // 3. [최종 확인 창] 사번과 소속을 다시 보여줌
            const finalConfirm = confirm(
                "아래 정보가 정확합니까?\n\n" +
                "📍 소속: " + dept + "\n" +
                "🆔 사번: " + id + "\n" +
                "🔑 공용비번: " + teamPw + "\n\n" +
                "저장 후에는 이 정보로 로그인해야 합니다."
            );

            if(finalConfirm) {
                localStorage.setItem('userDept', dept);
                localStorage.setItem('adminId', id);
                localStorage.setItem('adminPw', pw);
                localStorage.setItem('teamPw', teamPw);

                alert('설정이 안전하게 저장되었습니다.\n이제 변경된 정보로 로그인해 주세요!');
                location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
