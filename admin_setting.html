<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 설정</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
        button { width: 100%; padding: 15px; background: #0072bc; color: white; border: none; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>관리자 지정 및 설정</h2>
    <select id="setDept"><option value="경산승무팀">경산승무팀</option></select>
    <input type="number" id="setAdminId" placeholder="관리자 사번">
    <input type="password" id="setAdminPw" placeholder="관리자 비밀번호">
    <input type="password" id="setTeamPw" placeholder="팀 공용 비밀번호">
    <button onclick="save()">설정 완료</button>

    <script>
        function save() {
            // 새 설정 저장 전 기존 데이터 초기화 (완벽한 새 출발!)
            localStorage.clear();
            
            localStorage.setItem('userDept', document.getElementById('setDept').value);
            localStorage.setItem('adminId', document.getElementById('setAdminId').value);
            localStorage.setItem('adminPw', document.getElementById('setAdminPw').value);
            localStorage.setItem('teamPw', document.getElementById('setTeamPw').value);
            
            alert("설정 완료! 다시 로그인하세요.");
            location.href = 'index.html';
        }
    </script>
</body>
</html>
