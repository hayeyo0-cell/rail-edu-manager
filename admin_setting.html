<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관리자 설정 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; --error-red: #ff4d4d; --success-green: #2ecc71; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* 🚨 상단 헤더: 로고 42px 통일 */
        .top-nav { width: 100%; background: white; padding: 12px 15px; display: flex; justify-content: center; align-items: center; box-sizing: border-box; border-bottom: 1px solid #eee; position: relative; margin-bottom: 20px; }
        .brand-logo { height: 42px; object-fit: contain; }

        .settings-card { width: 92%; max-width: 400px; background: white; border-radius: 25px; padding: 30px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); box-sizing: border-box; margin-bottom: 40px; }
        h2 { text-align: center; color: #333; margin-bottom: 30px; font-size: 1.4rem; }
        .section-title { font-size: 1rem; font-weight: bold; color: var(--dtro-blue); border-left: 4px solid var(--dtro-blue); padding-left: 10px; margin: 25px 0 15px 0; }
        .input-label { font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 5px; display: block; padding-left: 5px; }
        select, input { width: 100%; padding: 14px; margin-bottom: 10px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 0.95rem; outline: none; background: #fafafa; }
        input:focus { border-color: var(--dtro-blue); background: #fff; }
        .check-msg { font-size: 0.75rem; margin-bottom: 10px; display: none; padding-left: 5px; font-weight: 500; }
        .error { color: var(--error-red); }
        .success { color: var(--success-green); }
        .save-btn { width: 100%; padding: 18px; background: var(--dtro-blue); color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,114,188,0.2); }
    </style>
</head>
<body>
    <div class="top-nav">
        <img src="logo.png" class="brand-logo" alt="DTRO">
    </div>

    <div class="settings-card">
        <h2>🛠️ 관리자 설정</h2>
        
        <div class="section-title">소속 지정</div>
        <select id="setDept">
            <option value="경산승무팀">경산승무팀</option>
            <option value="안심승무팀">안심승무팀</option>
            <option value="월배승무팀">월배승무팀</option>
            <option value="문양승무팀">문양승무팀</option>
        </select>

        <div class="section-title">관리자 계정 설정</div>
        <span class="input-label">관리자 사번</span>
        <input type="number" id="setAdminId" placeholder="사번 입력">
        <span class="input-label">관리자 비밀번호</span>
        <input type="password" id="setAdminPw" placeholder="새 비밀번호 입력">
        <input type="password" id="confirmAdminPw" placeholder="비밀번호 확인" oninput="validateAdminPw()">
        <div id="adminPwMsg" class="check-msg"></div>

        <div class="section-title">팀원용 공용 비번 설정</div>
        <span class="input-label">공용 비밀번호 (팀원 로그인용)</span>
        <input type="password" id="setTeamPw" placeholder="공용 비밀번호 입력">
        <input type="password" id="confirmTeamPw" placeholder="공용 비밀번호 확인" oninput="validateTeamPw()">
        <div id="teamPwMsg" class="check-msg"></div>

        <button class="save-btn" onclick="saveSettings()">설정 저장 및 완료</button>
    </div>

    <script>
        // 🚨 [보안] 뒤로가기 절대 차단 로직 (초기 설정 보호)
        (function() {
            function lockHistory() {
                for(let i = 0; i < 10; i++) {
                    window.history.pushState(null, null, window.location.href);
                }
            }
            lockHistory();
            window.onpopstate = function() {
                lockHistory();
                // 뒤로가기 시 이탈 방지
                alert("설정을 완료해야 시스템 이용이 가능합니다.");
            };
            document.body.onclick = function() { lockHistory(); };
        })();

        // 관리자 비번 체크
        function validateAdminPw() {
            const pw = document.getElementById('setAdminPw').value;
            const confirm = document.getElementById('confirmAdminPw').value;
            const msg = document.getElementById('adminPwMsg');
            if (confirm.length > 0) {
                msg.style.display = 'block';
                const isMatch = (pw === confirm);
                msg.innerText = isMatch ? "✓ 비밀번호가 일치합니다." : "✗ 비밀번호가 일치하지 않습니다.";
                msg.className = "check-msg " + (isMatch ? "success" : "error");
            } else { msg.style.display = 'none'; }
        }

        // 팀원 공용 비번 체크
        function validateTeamPw() {
            const pw = document.getElementById('setTeamPw').value;
            const confirm = document.getElementById('confirmTeamPw').value;
            const msg = document.getElementById('teamPwMsg');
            if (confirm.length > 0) {
                msg.style.display = 'block';
                const isMatch = (pw === confirm);
                msg.innerText = isMatch ? "✓ 공용 비밀번호가 일치합니다." : "✗ 공용 비밀번호가 일치하지 않습니다.";
                msg.className = "check-msg " + (isMatch ? "success" : "error");
            } else { msg.style.display = 'none'; }
        }

        function saveSettings() {
            const dept = document.getElementById('setDept').value;
            const id = document.getElementById('setAdminId').value;
            const adminPw = document.getElementById('setAdminPw').value;
            const adminPwConfirm = document.getElementById('confirmAdminPw').value;
            const teamPw = document.getElementById('setTeamPw').value;
            const teamPwConfirm = document.getElementById('confirmTeamPw').value;

            if(!dept || !id || !adminPw || !teamPw) { alert('모든 항목을 입력해 주세요!'); return; }
            if(adminPw !== adminPwConfirm) { alert('관리자 비밀번호가 일치하지 않습니다.'); return; }
            if(teamPw !== teamPwConfirm) { alert('팀원 공용 비밀번호가 일치하지 않습니다.'); return; }

            if(confirm(`📍 소속: ${dept}\n🆔 사번: ${id}\n\n위 정보로 설정을 완료할까요?\n(기존 데이터가 초기화될 수 있습니다.)`)) {
                // 기존 데이터를 유지하고 싶다면 localStorage.clear()는 주의해서 사용하세요.
                // 여기서는 새로운 관리자 설정을 위해 필수값만 세팅합니다.
                localStorage.setItem('userDept', dept);
                localStorage.setItem('adminId', id);
                localStorage.setItem('adminPw', adminPw);
                localStorage.setItem('teamPw', teamPw);
                
                alert('설정 저장 완료! 로그인 화면으로 이동합니다.');
                // 🚨 replace를 사용하여 뒤로가기 기록 삭제
                window.location.replace('index.html');
            }
        }
    </script>
</body>
</html>
