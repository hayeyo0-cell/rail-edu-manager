<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 관리자 설정</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        html, body { height: 100%; overflow: hidden; }
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-gray); margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* [표준] 슬림 헤더 */
        .top-header-section {
            width: 100%; background-color: var(--bg-gray);
            padding: 12px 0 8px 0; display: flex; flex-direction: column;
            align-items: center; border-bottom: 2px solid var(--dtro-blue);
        }
        .brand-logo { height: 22px; margin-bottom: 4px; mix-blend-mode: multiply; }
        .main-title { font-size: 1.35rem; font-weight: bold; color: #222; margin: 0; }

        /* [표준] 하단 여백 박멸 컨테이너 (80px) */
        .main-container {
            flex: 1; display: flex; flex-direction: column;
            justify-content: flex-end; width: 100%; align-items: center;
            padding-bottom: 80px; 
        }

        .settings-card { 
            width: 88%; max-width: 380px; background: white; 
            border-radius: 24px; padding: 35px 24px 25px 24px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.06); text-align: left;
        }
        
        .section-title { font-size: 1rem; font-weight: bold; color: var(--dtro-blue); margin-bottom: 18px; display: block; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        
        .setting-item { margin-bottom: 20px; }
        .setting-label { font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 8px; display: block; padding-left: 4px; }
        
        input { 
            width: 100%; height: 50px; padding: 0 15px; 
            border: 1px solid #e8e8e8; border-radius: 12px; 
            font-size: 1rem; background: #fafafa; outline: none; box-sizing: border-box;
        }
        input:focus { border-color: var(--dtro-blue); background: #fff; }

        .btn-save { 
            width: 100%; height: 58px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 16px; font-size: 1.15rem; font-weight: bold; 
            cursor: pointer; margin-top: 10px; box-shadow: 0 6px 20px rgba(0,114,188,0.2);
        }

        .back-link { margin-top: 22px; display: block; text-align: center; font-size: 0.85rem; color: #bbb; text-decoration: none; }
    </style>
</head>
<body>

    <div class="top-header-section">
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <h1 class="main-title">관리자 설정</h1>
    </div>

    <div class="main-container">
        <div class="settings-card">
            
            <span class="section-title">담당자 계정 변경</span>
            
            <div class="setting-item">
                <span class="setting-label">신규 관리자 ID (사번)</span>
                <input type="text" placeholder="변경할 ID 입력">
            </div>

            <div class="setting-item" style="margin-bottom: 30px;">
                <span class="setting-label">신규 관리자 비밀번호</span>
                <input type="password" placeholder="새 비밀번호 입력">
            </div>

            <button class="btn-save" onclick="if(confirm('담당자 계정 정보를 변경하시겠습니까?')) { alert('성공적으로 변경되었습니다. 다음 로그인부터 적용됩니다.'); location.href='admin_main.html'; }">
                담당자 정보 업데이트
            </button>
            
            <a href="admin_main.html" class="back-link">관리자 메인으로 돌아가기</a>
        </div>
    </div>

</body>
</html>
