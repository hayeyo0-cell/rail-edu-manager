<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 관리자 설정</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; --error-red: #ff4d4d; --success-green: #2ecc71; }
        html, body { height: 100%; overflow: hidden; }
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-gray); margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* [표준] 슬림 헤더 */
        .top-header-section {
            width: 100%; background-color: var(--bg-gray);
            padding: 12px 0 8px 0; display: flex; flex-direction: column;
            align-items: center; border-bottom: 2px solid var(--dtro-blue);
        }
        .brand-logo { height: 22px; margin-bottom: 4px; mix-blend-mode: multiply; }
        .main-title { font-size: 1.35rem; font-weight: bold; color: #222; margin: 0; }

        /* 메인 컨테이너 (항목이 많아져서 스크롤 허용) */
        .main-container {
            flex: 1; display: flex; flex-direction: column;
            justify-content: flex-start; width: 100%; align-items: center;
            padding: 20px 0; overflow-y: auto;
        }

        .settings-card { 
            width: 88%; max-width: 380px; background: white; 
            border-radius: 24px; padding: 25px 22px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.06); text-align: left;
            margin-bottom: 30px;
        }
        
        .section-title { font-size: 0.95rem; font-weight: bold; color: var(--dtro-blue); margin: 15px 0 12px 0; display: block; border-left: 4px solid var(--dtro-blue); padding-left: 8px; }
        
        .setting-item { margin-bottom: 15px; position: relative; }
        .setting-label { font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 6px; display: block; padding-left: 4px; }
        
        input { 
            width: 100%; height: 48px; padding: 0 15px; 
            border: 1px solid #eee; border-radius: 12px; 
            font-size: 0.95rem; background: #fafafa; outline: none; box-sizing: border-box;
        }
        input.invalid { border-color: var(--error-red); background-color: #fff9f9; }
        input.valid { border-color: var(--success-green); }

        .error-msg { font-size: 0.75rem; color: var(--error-red); margin-top: 4px; display: none; padding-left: 5px; }

        .btn-save { 
            width: 100%; height: 58px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 16px; font-size: 1.15rem; font-weight: bold; 
            cursor: pointer; margin-top: 10px; box-shadow: 0 6px 20px rgba(0,114,188,0.2);
        }

        .back-link { margin-top: 20px; display: block; text-align: center; font-size: 0.85rem; color: #bbb; text-decoration: none; padding-bottom: 20px;}
    </style>
</head>
<body>

    <div class="top-header-section">
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <h1 class="main-title">관리자 설정</h1>
    </div>

    <div class="main-container">
        <div class="settings-card">
            
            <span class="section-title">현장 비번 관리</span>
            <div class="setting-item">
                <span class="setting-label">팀 공용 비밀번호 변경</span>
                <input type="password" id="newTeamPw" placeholder="팀원용 새 비번 입력" oninput="validateMatch('TeamPw')">
            </div>
            <div class="setting-item">
                <input type="password" id="confirmTeamPw" placeholder="비밀번호 재입력 확인" oninput="validateMatch('TeamPw')">
                <div id="errorTeamPw" class="error-msg">비밀번호가 일치하지 않습니다.</div>
            </div>

            <hr style="border: 0; border-top: 1px solid #f5f5f5; margin: 25px 0;">

            <span class="section-title">관리자 계정 변경</span>
            <div class="setting-item">
                <span class="setting-label">새 관리자 ID (사번)</span>
                <input type="text" id="newAdminId" placeholder="변경할 ID 입력" oninput="validateMatch('AdminId')">
            </div>
            <div class="setting-item">
                <input type="text" id="confirmAdminId" placeholder="ID 재입력 확인" oninput="validateMatch('AdminId')">
                <div id="errorAdminId" class="error-msg">ID가 일치하지 않습니다.</div>
            </div>

            <div class="setting-item" style="margin-top:20px;">
                <span class="setting-label">새 관리자 비밀번호</span>
                <input type="password" id="newAdminPw" placeholder="변경할 비밀번호 입력" oninput="validateMatch('AdminPw')">
            </div>
            <div class="setting-item">
                <input type="password" id="confirmAdminPw" placeholder="비밀번호 재입력 확인" oninput="validateMatch('AdminPw')">
                <div id="errorAdminPw" class="error-msg">비밀번호가 일치하지 않습니다.</div>
            </div>

            <button class="btn-save" onclick="handleFinalSave()">
                전체 설정 저장하기
            </button>
            
            <a href="admin_main.html" class="back-link">관리자 메인으로 돌아가기</a>
        </div>
    </div>

    <script>
        // 실시간 일치 여부 검사 함수
        function validateMatch(type) {
            const original = document.getElementById('new' + type).value;
            const confirm = document.getElementById('confirm' + type).value;
            const errorElement = document.getElementById('error' + type);
            const confirmInput = document.getElementById('confirm' + type);

            if (confirm.length > 0) {
                if (original !== confirm) {
                    errorElement.style.display = 'block';
                    confirmInput.classList.add('invalid');
                    confirmInput.classList.remove('valid');
                } else {
                    errorElement.style.display = 'none';
                    confirmInput.classList.remove('invalid');
                    confirmInput.classList.add('valid');
                }
            } else {
                errorElement.style.display = 'none';
                confirmInput.classList.remove('invalid', 'valid');
            }
        }

        function handleFinalSave() {
            // 모든 확인 필드 체크
            const checks = ['TeamPw', 'AdminId', 'AdminPw'];
            for (let type of checks) {
                const original = document.getElementById('new' + type).value;
                const confirm = document.getElementById('confirm' + type).value;
                
                if (original !== confirm) {
                    alert('일치하지 않는 항목이 있습니다. 다시 확인해 주세요.');
                    return;
                }
            }

            if(confirm('설정 내용을 저장하시겠습니까?')) {
                // 실제 저장 로직 (localStorage 등)
                alert('모든 변경사항이 안전하게 저장되었습니다.');
                location.href='admin_main.html';
            }
        }
    </script>

</body>
</html>
