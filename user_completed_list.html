<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이수 완료 내역</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f4f6f9; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-gray); }
        body { font-family: 'Noto Sans KR', sans-serif; display: flex; flex-direction: column; align-items: center; }

        .top-header { width: 100%; background: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; box-sizing: border-box; }
        .back-btn { background: white; border: 1px solid #eaeaea; border-radius: 6px; padding: 6px 12px; font-size: 0.85rem; color: #555; cursor: pointer; }
        .brand-logo { height: 32px; mix-blend-mode: multiply; object-fit: contain; }
        .header-spacer { width: 68px; }

        .main-container { width: 100%; display: flex; justify-content: center; padding: 20px 0 40px 0; }
        .list-wrapper { width: 90%; max-width: 400px; display: flex; flex-direction: column; }

        .page-title { font-size: 1.15rem; font-weight: bold; color: #333; margin-bottom: 20px; display: flex; align-items: center; border-left: 4px solid #2ecc71; padding-left: 10px; }

        /* 완료 내역 전용 카드 (회색 배경) */
        .edu-card { background: #fafbfc; border-radius: 16px; padding: 18px; border: 1px solid #eee; margin-bottom: 15px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .badge-completed { background: #eef9f1; color: #2ecc71; padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: bold; }
        .date { font-size: 0.8rem; color: #999; }
        .edu-title { font-size: 1.05rem; font-weight: bold; color: #666; margin-bottom: 6px; line-height: 1.4; word-break: keep-all; }

        .empty-msg { text-align: center; color: #999; padding: 30px 0; font-size: 0.95rem; line-height: 1.5; background: white; border-radius: 15px; display: none; }
    </style>
</head>
<body>

    <div class="top-header">
        <button class="back-btn" onclick="history.back()">이전으로</button>
        <img src="logo.png" class="brand-logo" alt="대구교통공사 DTRO">
        <div class="header-spacer"></div>
    </div>

    <div class="main-container">
        <div class="list-wrapper">
            
            <div class="page-title">
                ✅ 나의 이수 완료 보관함
            </div>

            <div id="completedListArea"></div>

            <div class="empty-msg" id="emptyMessage">
                아직 이수를 완료한 교육이 없습니다.<br>메인 화면에서 교육을 진행해 주세요.
            </div>

        </div>
    </div>

    <script>
        window.onload = function() {
            const listArea = document.getElementById('completedListArea');
            const emptyMsg = document.getElementById('emptyMessage');
            
            // 완료 보관함 가져오기!
            const completedList = JSON.parse(localStorage.getItem('completedEduList')) || [];

            if(completedList.length === 0) {
                emptyMsg.style.display = 'block'; 
                listArea.innerHTML = '';
                return;
            }

            emptyMsg.style.display = 'none';
            let html = '';

            completedList.forEach((edu) => {
                html += `
                <div class="edu-card">
                    <div class="card-header">
                        <span class="badge-completed">이수 완료</span>
                        <span class="date">완료일: ${edu.completedDate}</span>
                    </div>
                    <div class="edu-title">[${edu.category}] ${edu.title}</div>
                </div>
                `;
            });

            listArea.innerHTML = html;
        };
    </script>
</body>
</html>
