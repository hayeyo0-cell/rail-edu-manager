    <script>
        window.onload = function() {
            const listArea = document.getElementById('completedListArea');
            const emptyMsg = document.getElementById('emptyMessage');
            
            // 1. 로그인한 사용자의 소속 가져오기
            const userDept = localStorage.getItem('userDept') || "";

            // 2. 완료 보관함 전체 가져오기
            const allCompletedList = JSON.parse(localStorage.getItem('completedEduList')) || [];

            // 3. [핵심] 내 소속(userDept) 데이터만 골라내기
            const myCompletedList = allCompletedList.filter(edu => edu.dept === userDept);

            if(myCompletedList.length === 0) {
                emptyMsg.style.display = 'block'; 
                listArea.innerHTML = '';
                return;
            }

            emptyMsg.style.display = 'none';
            let html = '';

            // 4. 필터링된 내 팀 데이터만 화면에 출력
            myCompletedList.forEach((edu) => {
                html += `
                <div class="edu-card">
                    <div class="card-header">
                        <span class="badge-completed">이수 완료</span>
                        <span class="date">완료일: ${edu.completedDate || '기록없음'}</span>
                    </div>
                    <div class="edu-title">[${edu.category}] ${edu.title}</div>
                </div>
                `;
            });

            listArea.innerHTML = html;
        };
    </script>
