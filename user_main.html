<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사용자 메인 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; }
        .header { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .logo { height: 24px; }
        .user-info { font-size: 0.9rem; color: #555; font-weight: bold; }
        
        .container { padding: 20px 15px; max-width: 420px; margin: 0 auto; }
        .section-title { font-size: 1.1rem; font-weight: bold; color: #333; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .count-badge { background: #ff4d4d; color: white; font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; }

        /* 교육 카드 디자인 */
        .edu-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .edu-info { text-align: left; }
        .edu-type { font-size: 0.75rem; color: var(--dtro-blue); font-weight: bold; margin-bottom: 5px; display: block; }
        .edu-title { font-size: 1rem; font-weight: bold; color: #333; margin-bottom: 5px; }
        .edu-date { font-size: 0.8rem; color: #999; }
        .arrow { color: #ccc; font-size: 1.2rem; }

        /* 이수 완료 보관함 스타일 */
        .archive-section { margin-top: 30px; border-top: 1px solid #eee; pt: 20px; }
        .completed-card { opacity: 0.6; background: #f9f9f9; }
        .completed-badge { font-size: 0.7rem; color: #27ae60; border: 1px solid #27ae60; padding: 1px 5px; border-radius: 4px; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" class="logo">
        <div class="user-info"><span id="userNameDisplay">홍길동</span> 기관사님</div>
    </div>

    <div class="container">
        <div class="section-title">
            📢 미이수 교육 및 지시사항
            <span id="todoCount" class="count-badge">0</span>
        </div>
        <div id="todoList">
            </div>

        <div class="archive-section">
            <div class="section-title" style="color: #888; font-size: 1rem;">📦 완료된 교육 보관함</div>
            <div id="doneList">
                </div>
        </div>
    </div>

    <script>
        const loginId = localStorage.getItem('currentUserId');
        const loginName = localStorage.getItem('currentUserName');
        document.getElementById('userNameDisplay').innerText = loginName || "기관사";

        window.onload = function() {
            renderList();
        };

        function renderList() {
            const totalEduList = JSON.parse(localStorage.getItem('totalEduList')) || [];
            const signData = JSON.parse(localStorage.getItem('signData')) || [];
            
            const todoListDiv = document.getElementById('todoList');
            const doneListDiv = document.getElementById('doneList');
            const todoCountBadge = document.getElementById('todoCount');

            todoListDiv.innerHTML = "";
            doneListDiv.innerHTML = "";

            let todoCount = 0;

            totalEduList.forEach(edu => {
                // 🚨 핵심: 현재 로그인한 사용자가 이 교육에 서명했는지 확인
                const isCompleted = signData.some(s => String(s.eduId) === String(edu.id) && String(s.userId) === String(loginId));

                const cardHtml = `
                    <div class="edu-card ${isCompleted ? 'completed-card' : ''}" onclick="location.href='user_edu_detail.html?id=${edu.id}'">
                        <div class="edu-info">
                            <span class="edu-type">${edu.type} ${isCompleted ? '<span class="completed-badge">이수완료</span>' : ''}</span>
                            <div class="edu-title">${edu.title}</div>
                            <div class="edu-date">등록일: ${edu.date} / 기한: ${edu.deadline || '없음'}</div>
                        </div>
                        <div class="arrow"> > </div>
                    </div>
                `;

                if (isCompleted) {
                    // 이수 완료된 경우 보관함으로
                    doneListDiv.innerHTML += cardHtml;
                } else {
                    // 미이수된 경우 상단 목록으로
                    todoListDiv.innerHTML += cardHtml;
                    todoCount++;
                }
            });

            todoCountBadge.innerText = todoCount;
            if(todoCount === 0) {
                todoListDiv.innerHTML = "<p style='text-align:center; color:#bbb; padding:20px;'>모든 교육을 이수하였습니다. 👍</p>";
            }
        }
    </script>
</body>
</html>
