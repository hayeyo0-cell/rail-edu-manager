<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f4f6f9; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-gray); }
        body { font-family: 'Noto Sans KR', sans-serif; display: flex; flex-direction: column; align-items: center; }

        .top-header {
            width: 100%; background: white; padding: 12px 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100;
            box-sizing: border-box;
        }
        .header-btn {
            background: white; border: 1px solid #eaeaea; border-radius: 6px;
            padding: 6px 12px; font-size: 0.85rem; color: #555; cursor: pointer;
        }
        .brand-logo { height: 32px; mix-blend-mode: multiply; object-fit: contain; }
        .header-spacer { width: 68px; } 

        .main-container { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px 0 40px 0; }
        .list-wrapper { width: 90%; max-width: 400px; display: flex; flex-direction: column; }

        .welcome-card {
            background: var(--dtro-blue); color: white; border-radius: 16px;
            padding: 20px; box-shadow: 0 4px 15px rgba(0,114,188,0.2);
            margin-bottom: 25px; text-align: left;
        }
        .welcome-title { font-size: 1.15rem; font-weight: bold; margin-bottom: 5px; }
        .welcome-desc { font-size: 0.9rem; opacity: 0.9; line-height: 1.4; }

        .page-title { 
            font-size: 1.15rem; font-weight: bold; color: #333; 
            margin-bottom: 12px; display: flex; align-items: center; 
            border-left: 4px solid var(--dtro-blue); padding-left: 10px; 
        }

        /* 필터 버튼 영역 */
        .filter-wrapper {
            width: 100%; overflow-x: auto; white-space: nowrap; 
            margin-bottom: 15px; padding-bottom: 5px;
            -ms-overflow-style: none; scrollbar-width: none; 
        }
        .filter-wrapper::-webkit-scrollbar { display: none; }
        
        .filter-btn {
            display: inline-block; padding: 6px 14px; border-radius: 20px;
            border: 1px solid #ddd; background: white; color: #666;
            font-size: 0.85rem; margin-right: 6px; cursor: pointer; transition: 0.2s;
        }
        .filter-btn.active {
            background: var(--dtro-blue); color: white; border-color: var(--dtro-blue); font-weight: bold;
        }

        /* 교육 카드 */
        .edu-card {
            background: white; border-radius: 16px; padding: 18px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 15px;
            border: 1px solid #fcfcfc;
        }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: bold; }
        
        .badge-general { background: #eef6ff; color: var(--dtro-blue); } 
        .badge-face { background: #f3e8ff; color: #8e44ad; } 
        .badge-sim { background: #eef9f1; color: #2ecc71; } 
        .badge-voice { background: #fff5eb; color: #f39c12; } 
        .badge-etc { background: #f0f0f0; color: #555; } 
        
        .date { font-size: 0.8rem; color: #999; }
        .edu-title { font-size: 1.05rem; font-weight: bold; color: #222; margin-bottom: 6px; line-height: 1.4; word-break: keep-all; }
        .edu-deadline { font-size: 0.85rem; color: #ff4d4d; font-weight: bold; margin-bottom: 15px; }

        .card-actions { display: flex; justify-content: flex-end; border-top: 1px dashed #eee; padding-top: 12px; }
        .btn-start { background: var(--dtro-blue); color: white; border: none; border-radius: 8px; padding: 8px 18px; font-size: 0.9rem; cursor: pointer; font-weight: bold; width: 100%; }

        .empty-msg { text-align: center; color: #999; padding: 30px 0; font-size: 0.95rem; line-height: 1.5; background: white; border-radius: 15px; display: none; margin-bottom: 15px; }

        /* [신규] 완료 내역 이동 버튼 (하단 메뉴 박스형) */
        .btn-history {
            width: 100%; padding: 18px; background: white; color: #333;
            border: 1px solid #eaeaea; border-radius: 16px; font-size: 1.05rem;
            font-weight: bold; cursor: pointer; margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02); display: flex;
            justify-content: space-between; align-items: center;
        }
        .btn-history span { color: #888; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="top-header">
        <div class="header-spacer"></div>
        <img src="logo.png" class="brand-logo" alt="대구교통공사 DTRO">
        <button class="header-btn" onclick="location.href='index.html'">로그아웃</button>
    </div>

    <div class="main-container">
        <div class="list-wrapper">
            
            <div class="welcome-card">
                <div class="welcome-title">기관사님, 안전운행 하십시오! 🚆</div>
                <div class="welcome-desc">오늘 이수해야 할 교육 및 훈련 목록입니다.<br>운행 전 꼼꼼히 확인해 주세요.</div>
            </div>

            <div class="page-title">오늘의 필수 교육 목록</div>

            <div class="filter-wrapper" id="categoryFilters">
                </div>

            <div id="userEduListArea"></div>
            <div class="empty-msg" id="emptyMessage">현재 예정된 필수 교육이 없습니다.<br>오늘도 안전운행 하십시오!</div>

            <button class="btn-history" onclick="location.href='user_completed_list.html'">
                ✅ 나의 이수 완료 내역 보러가기 <span>→</span>
            </button>

        </div>
    </div>

    <script>
        let currentFilter = '전체'; 
        let allEduData = []; 

        window.onload = function() {
            allEduData = JSON.parse(localStorage.getItem('myEduList')) || [];
            renderFilters(); 
            renderEduList(); 
        };

        function renderFilters() {
            const filterDiv = document.getElementById('categoryFilters');
            const categories = ['전체', '공지사항', '게시교육', '대면교육', '면담교육', '시뮬레이션', '육성방송 훈련', '기타교육'];
            
            let html = '';
            categories.forEach(cat => {
                const activeClass = (cat === currentFilter) ? 'active' : '';
                html += `<button class="filter-btn ${activeClass}" onclick="changeFilter('${cat}')">${cat}</button>`;
            });
            filterDiv.innerHTML = html;
        }

        function changeFilter(selectedCat) {
            currentFilter = selectedCat; 
            renderFilters(); 
            renderEduList(); 
        }

        function renderEduList() {
            const listArea = document.getElementById('userEduListArea');
            const emptyMsg = document.getElementById('emptyMessage');
            
            const filteredData = allEduData.filter(edu => {
                if(currentFilter === '전체') return true;
                return edu.category === currentFilter;
            });

            if(filteredData.length === 0) {
                emptyMsg.style.display = 'block'; 
                listArea.innerHTML = '';
                return;
            }

            emptyMsg.style.display = 'none';
            let html = '';

            filteredData.forEach((edu, index) => {
                let badgeClass = 'badge-general';
                if(edu.category === '대면교육' || edu.category === '면담교육') badgeClass = 'badge-face';
                else if(edu.category === '시뮬레이션') badgeClass = 'badge-sim';
                else if(edu.category === '육성방송 훈련') badgeClass = 'badge-voice';
                else if(edu.category === '기타교육' || edu.category === '공지사항') badgeClass = 'badge-etc';

                const deadlineText = edu.deadline ? edu.deadline : '기한 없음';

                html += `
                <div class="edu-card">
                    <div class="card-header">
                        <span class="badge ${badgeClass}">${edu.category}</span>
                        <span class="date">게시일: ${edu.date}</span>
                    </div>
                    <div class="edu-title">${edu.title}</div>
                    
                    <div class="edu-deadline">⏳ 마감 기한: ${deadlineText} 까지</div>

                    <div class="card-actions">
                        <button class="btn-start" onclick="enterEducation('${edu.title}')">교육 입장하기 →</button>
                    </div>
                </div>
                `;
            });

            listArea.innerHTML = html;
        }

        function enterEducation(title) {
            alert('[' + title + '] 상세 화면으로 이동합니다! (기능 준비 중)');
        }
    </script>
</body>
</html>
