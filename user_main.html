<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사용자 메인</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .top-nav { width: 100%; background: white; padding: 12px 15px; display: flex; justify-content: center; border-bottom: 1px solid #eee; position: relative; }
        .logout-btn { position: absolute; right: 15px; font-size: 0.75rem; color: #888; cursor: pointer; border: 1px solid #eee; padding: 5px 10px; border-radius: 5px; background: white; }
        .container { width: 92%; max-width: 420px; padding: 20px 0; }
        .section-title { font-size: 1.2rem; font-weight: bold; color: var(--dtro-blue); margin: 20px 0 10px; border-left: 5px solid var(--dtro-blue); padding-left: 10px; }
        .edu-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.04); text-align: left; }
        .btn-start { width: 100%; padding: 12px; background: var(--dtro-blue); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .archive-card { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); display: flex; align-items: center; cursor: pointer; margin-top: 10px; }
        .archive-icon { width: 70px; height: 70px; margin-right: 15px; }
    </style>
</head>
<body>
    <div class="top-nav"><img src="logo.png" style="height:22px;"><button class="logout-btn" onclick="location.href='index.html'">로그아웃</button></div>
    <div class="container">
        <div class="section-title">오늘의 필수 교육 목록</div>
        <div id="userEduListArea"></div>
        <div class="section-title">학습 보관함</div>
        <div class="archive-card" onclick="location.href='user_archive.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/3532/3532053.png" class="archive-icon">
            <div class="archive-info"><h4>나의 이수 완료 내역</h4><p style="margin:0; font-size:0.9rem; color:#888;">이전에 수강을 완료한 교육 목록 확인</p></div>
        </div>
    </div>
    <script>
        const userDept = localStorage.getItem('currentUserDept');
        const userId = localStorage.getItem('currentUserId');
        window.onload = function() {
            if(!userId) location.href = 'index.html';
            const list = JSON.parse(localStorage.getItem('totalEduList')) || [];
            const signData = JSON.parse(localStorage.getItem('signData')) || [];
            const filtered = list.filter(edu => edu.dept === userDept && !signData.some(s => String(s.eduId) === String(edu.id) && String(s.userId) === String(userId)));
            const listArea = document.getElementById('userEduListArea');
            if(filtered.length === 0) { listArea.innerHTML = '<div style="background:white; padding:30px; border-radius:20px; color:#ccc; text-align:center;">이수할 교육이 없습니다.</div>'; return; }
            listArea.innerHTML = filtered.map(edu => `
                <div class="edu-card">
                    <div style="font-size:0.8rem; color:var(--dtro-blue); font-weight:bold;">${edu.type}</div>
                    <div style="font-weight:bold; font-size:1.1rem; margin:5px 0;">${edu.title}</div>
                    <div style="font-size:0.85rem; color:#ff4d4d; font-weight:bold;">기한: ${edu.deadline || '없음'}</div>
                    <button class="btn-start" onclick="location.href='user_edu_detail.html?id=${edu.id}'">교육 입장하기 →</button>
                </div>`).join('');
        };
    </script>
</body>
</html>
