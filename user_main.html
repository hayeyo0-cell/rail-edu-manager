<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사용자 메인 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        .top-nav { 
            width: 100%; background: white; padding: 12px 15px; 
            display: flex; justify-content: center; align-items: center; 
            border-bottom: 1px solid #eee; position: relative; box-sizing: border-box;
        }
        .logout-btn { 
            position: absolute; right: 15px; background: white; border: 1px solid #eaeaea; 
            border-radius: 8px; padding: 6px 12px; font-size: 0.75rem; color: #888; cursor: pointer; font-weight: bold;
        }
        .brand-logo { height: 42px; object-fit: contain; }

        .container { width: 92%; max-width: 420px; padding: 25px 0; }

        .section-title { font-size: 1.25rem; font-weight: bold; color: var(--dtro-blue); margin: 25px 0 15px 0; display: flex; align-items: center; border-left: 5px solid var(--dtro-blue); padding-left: 10px; text-align: left; }

        .filter-container { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 25px; padding: 5px 0; -webkit-overflow-scrolling: touch; }
        .filter-container::-webkit-scrollbar { display: none; } /* 스크롤바 숨김 */
        .filter-btn { 
            padding: 8px 14px; border-radius: 20px; border: 1px solid #ddd; 
            background: white; font-size: 0.82rem; 
            white-space: nowrap; cursor: pointer; color: #666; transition: 0.2s;
        }
        .filter-btn.active { background: var(--dtro-blue); color: white; border-color: var(--dtro-blue); font-weight: bold; }

        .edu-card { background: white; border-radius: 25px; padding: 25px; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); text-align: left; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .badge { padding: 5px 12px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; background: #f3e5f5; color: #7b1fa2; }
        .dday-badge { padding: 5px 10px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; background: #fff0f0; color: #ff4d4d; border: 1px solid #ffcccc; }
        
        .date-label { font-size: 0.85rem; color: #999; }
        .edu-title { font-weight: bold; font-size: 1.25rem; color: #333; margin-bottom: 10px; display: block; line-height: 1.4; }
        .deadline-text { font-size: 1rem; color: #ff4d4d; font-weight: bold; margin-bottom: 20px; display: block; }
        .btn-start { width: 100%; padding: 16px; background: var(--dtro-blue); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.05rem; cursor: pointer; }

        .archive-card { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); display: flex; align-items: center; cursor: pointer; text-align: left; margin-top: 10px; }
        .archive-icon { width: 75px; height: 75px; margin-right: 15px; object-fit: contain; }
        .archive-info h4 { margin: 0 0 8px 0; font-size: 1.25rem; color: #333; font-weight: bold; }
        .archive-info p { margin: 0; font-size: 1rem; color: #888; line-height: 1.5; }

        .empty-box { text-align:center; color:#ccc; padding:40px; background:white; border-radius:25px; margin-bottom:20px; box-shadow: 0 8px 20px rgba(0,0,0,0.02); }
    </style>
</head>
<body>

    <div class="top-nav">
        <img src="logo.png" class="brand-logo" alt="DTRO Logo">
        <button class="logout-btn" onclick="handleLogout()">로그아웃</button>
    </div>

    <div class="container">
        <div class="section-title">오늘의 필수 교육 목록</div>
        <div id="categoryFilters" class="filter-container"></div>
        <div id="userEduListArea"></div>

        <div class="section-title">학습 보관함</div>
        <div class="archive-card" onclick="location.href='user_archive.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/3532/3532053.png" class="archive-icon" alt="Archive">
            <div class="archive-info">
                <h4>나의 이수 완료 내역</h4>
                <p>이전에 수강을 완료한 교육 및 훈련<br>목록을 확인합니다.</p>
            </div>
        </div>
    </div>

    <script>
        // 전역 변수 및 설정
        let currentFilter = '전체';
        const userDept = localStorage.getItem('currentUserDept') || "";
        const userId = localStorage.getItem('currentUserId');

        window.onload = function() {
            // 1. 로그인 체크
            if(!userId) { location.replace('index.html'); return; }
            
            // 2. 뒤로가기 방지 초기화
            window.history.pushState(null, null, window.location.href);
            
            // 3. UI 렌더링
            renderFilters();
            loadEduData();
            
            // 4. 마감 알림 체크
            checkDeadlineAlert();
        };

        // 뒤로가기 방지 로직 (브라우저 자석 고정)
        window.onpopstate = function() {
            window.history.pushState(null, null, window.location.href);
            alert("교육 중에는 뒤로가기를 할 수 없습니다. 로그아웃 버튼을 이용해 주세요.");
        };

        // 로그아웃 처리
        function handleLogout() {
            if(confirm("로그아웃 하시겠습니까?")) {
                localStorage.removeItem('currentUserId');
                localStorage.removeItem('currentUserName');
                localStorage.removeItem('currentUserDept');
                localStorage.removeItem('isSplashShown');
                location.replace('index.html');
            }
        }

        function checkDeadlineAlert() {
            const allEduList = JSON.parse(localStorage.getItem('totalEduList')) || [];
            const completedEduList = JSON.parse(localStorage.getItem('completedEduList')) || [];
            const today = new Date().setHours(0, 0, 0, 0);
            
            let urgentList = [];

            allEduList.forEach(edu => {
                const isMyEdu = edu.dept === userDept;
                const isDone = completedEduList.some(s => String(s.eduId) === String(edu.id) && String(s.userId) === String(userId));
                
                if (isMyEdu && !isDone && edu.deadline) {
                    const targetDate = new Date(edu.deadline).setHours(0, 0, 0, 0);
                    const diffDays = Math.ceil((targetDate - today) / (1000 * 60 * 60 * 24));

                    if (diffDays <= 3) {
                        const status = diffDays < 0 ? "기한 만료" : (diffDays === 0 ? "오늘 마감" : `D-${diffDays}`);
                        urgentList.push(`• ${edu.title} (${status})`);
                    }
                }
            });

            if (urgentList.length > 0) {
                alert(`⚠️ 마감 임박 교육 알림\n\n현재 미이수 상태인 교육이 ${urgentList.length}건 있습니다.\n\n${urgentList.join('\n')}\n\n서둘러 이수해 주시기 바랍니다!`);
            }
        }

        function renderFilters() {
            const filterDiv = document.getElementById('categoryFilters');
            const categories = ['전체', '공지사항', '게시교육', '대면교육', '면담교육', '시뮬레이션', '육성방송 훈련', '기타교육'];
            filterDiv.innerHTML = categories.map(cat => 
                `<button class="filter-btn ${cat === currentFilter ? 'active' : ''}" onclick="changeFilter('${cat}')">${cat}</button>`
            ).join('');
        }

        function changeFilter(cat) {
            currentFilter = cat;
            renderFilters();
            loadEduData();
        }

        function loadEduData() {
            const listArea = document.getElementById('userEduListArea');
            const allEduList = JSON.parse(localStorage.getItem('totalEduList')) || [];
            const completedEduList = JSON.parse(localStorage.getItem('completedEduList')) || [];
            const today = new Date().setHours(0, 0, 0, 0);
            
            let filtered = allEduList.filter(edu => {
                const isMyDept = edu.dept === userDept;
                const isNotDone = !completedEduList.some(s => String(s.eduId) === String(edu.id) && String(s.userId) === String(userId));
                const isCategoryMatch = (currentFilter === '전체' || edu.type === currentFilter || edu.category === currentFilter);
                return isMyDept && isNotDone && isCategoryMatch;
            });

            if(filtered.length === 0) {
                listArea.innerHTML = '<div class="empty-box">🎉 현재 이수할 교육이 없습니다.</div>';
                return;
            }

            listArea.innerHTML = filtered.map(edu => {
                let ddayBadge = "";
                if(edu.deadline) {
                    const targetDate = new Date(edu.deadline).setHours(0,0,0,0);
                    const diff = Math.ceil((targetDate - today) / (1000 * 60 * 60 * 24));
                    const statusText = diff < 0 ? "기한만료" : (diff === 0 ? "D-Day" : `D-${diff}`);
                    ddayBadge = `<span class="dday-badge">${statusText}</span>`;
                }

                return `
                <div class="edu-card">
                    <div class="card-header">
                        <div>
                            <span class="badge">${edu.type || edu.category || '교육'}</span>
                            ${ddayBadge}
                        </div>
                        <span class="date-label">게시일: ${edu.date}</span>
                    </div>
                    <span class="edu-title">${edu.title}</span>
                    <span class="deadline-text">⏳ 마감 기한: ${edu.deadline || '상시'} 까지</span>
                    <button class="btn-start" onclick="location.href='user_edu_detail.html?id=${edu.id}'">교육 입장하기 →</button>
                </div>`;
            }).join('');
        }
    </script>
</body>
</html>
