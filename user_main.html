    <script>
        let currentFilter = '전체';
        let allEduList = [];
        const userDept = localStorage.getItem('userDept') || ""; // 로그인 시 저장된 소속

        window.onload = function() {
            if(!userDept) {
                alert("로그인 정보가 없습니다. 다시 로그인해주세요.");
                location.href = 'index.html';
                return;
            }
            
            // 1. [보강] 보관함 자동 청소 로직 실행 (지난 달 데이터 삭제)
            cleanupOldData();
            
            renderFilters();
            loadEduData();
        };

        // [핵심] 월간 자동 삭제 로직
        function cleanupOldData() {
            let completedList = JSON.parse(localStorage.getItem('completedEduList')) || [];
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth();

            // 완료한 날짜를 기준으로 '이번 달' 것만 남기기
            const freshList = completedList.filter(edu => {
                if(!edu.completedDate) return true; // 날짜 없으면 일단 유지
                
                // 날짜 형식 예: '2026. 4. 10' 또는 '2026-04-10' 대응
                const cDate = new Date(edu.completedDate.replace(/\./g, '-'));
                return cDate.getFullYear() === currentYear && cDate.getMonth() === currentMonth;
            });

            if (completedList.length !== freshList.length) {
                localStorage.setItem('completedEduList', JSON.stringify(freshList));
                console.log("지난 달 이수 데이터가 자동으로 정리되었습니다.");
            }
        }

        function renderFilters() {
            const filterDiv = document.getElementById('categoryFilters');
            const categories = ['전체', '공지사항', '게시교육', '대면교육', '면담교육', '시뮬레이션', '육성방송 훈련', '기타교육'];
            let html = '';
            categories.forEach(cat => {
                const activeClass = (cat === currentFilter) ? 'active' : '';
                html += `<button class="filter-btn ${activeClass}" onclick="changeFilter('${cat}')">${cat}</button>`;
            });
            filterDiv.innerHTML = html;
        }

        function changeFilter(cat) {
            currentFilter = cat;
            renderFilters();
            loadEduData();
        }

        function loadEduData() {
            const listArea = document.getElementById('userEduListArea');
            const emptyMsg = document.getElementById('emptyMessage');
            
            // 1. 전체 등록된 교육 가져오기
            allEduList = JSON.parse(localStorage.getItem('myEduList')) || [];
            
            // 2. [보강] 내 소속(userDept)과 일치하는 교육만 1차 필터링
            let deptFiltered = allEduList.filter(edu => edu.dept === userDept);
            
            // 3. 카테고리 필터링 (2차)
            let finalFiltered = deptFiltered.filter(edu => {
                if(currentFilter === '전체') return true;
                return edu.category === currentFilter;
            });

            if(finalFiltered.length === 0) {
                emptyMsg.style.display = 'block';
                listArea.innerHTML = '';
                return;
            }

            emptyMsg.style.display = 'none';
            let html = '';
            
            finalFiltered.forEach(edu => {
                // 상세 페이지로 넘길 때의 정확한 원본 인덱스 찾기
                const originalIndex = allEduList.indexOf(edu);

                let badgeClass = 'badge-general';
                if(edu.category === '대면교육' || edu.category === '면담교육') badgeClass = 'badge-face';
                else if(edu.category === '시뮬레이션') badgeClass = 'badge-sim';
                else if(edu.category === '육성방송 훈련') badgeClass = 'badge-voice';

                html += `
                <div class="edu-card">
                    <div class="card-header">
                        <span class="badge ${badgeClass}">${edu.category}</span>
                        <span class="date">${edu.date}</span>
                    </div>
                    <div class="edu-title">${edu.title}</div>
                    <div style="font-size:0.85rem; color:#ff4d4d; font-weight:bold; margin-bottom:10px;">⏳ 마감: ${edu.deadline || '없음'}</div>
                    <button class="btn-start" onclick="location.href='user_edu_detail.html?id=${originalIndex}'">교육 입장하기 →</button>
                </div>
                `;
            });
            listArea.innerHTML = html;
        }
    </script>
