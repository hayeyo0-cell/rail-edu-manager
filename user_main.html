<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교육 목록 - 스마트 교육관리</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-info { font-weight: bold; color: #333; }
        
        .edu-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; position: relative; }
        .badge { position: absolute; top: 15px; right: 15px; padding: 5px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: bold; }
        .badge-online { background: #e1f5fe; color: #039be5; }
        .badge-offline { background: #fff3e0; color: #ef6c00; }
        .title { font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; width: 70%; line-height: 1.3; }
        .info { font-size: 0.85rem; color: #666; margin-bottom: 5px; }
        .d-day { color: #e74c3c; font-weight: bold; }
        
        /* 버튼 스타일 변경 */
        .btn-sign { width: 100%; background: #3498db; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-complete { width: 100%; background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: default; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info" id="user-display">정보 로딩 중...</div>
        <button onclick="location.href='index.html'" style="background:none; border:none; color:#666;">로그아웃</button>
    </div>

    <div id="edu-list"></div>

    <script>
        const user = JSON.parse(localStorage.getItem("loginUser"));
        if(!user) { location.href = "index.html"; }
        document.getElementById("user-display").innerText = `${user.team} ${user.name} 기관사님`;

        function loadEduList() {
            const eduList = JSON.parse(localStorage.getItem(`eduList_${user.team}`)) || [];
            const completionData = JSON.parse(localStorage.getItem(`complete_${user.team}`)) || [];
            const container = document.getElementById("edu-list");
            
            if(eduList.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:#999; margin-top:100px;'>현재 등록된 교육이 없습니다.</p>";
                return;
            }

            container.innerHTML = eduList.map(edu => {
                const dDay = calculateDDay(edu.date);
                const isOnline = edu.type === 'online';
                // 이미 서명했는지 확인
                const isDone = completionData.some(c => c.eduId === edu.id && c.userId === user.id);

                return `
                    <div class="edu-card">
                        <span class="badge ${isOnline ? 'badge-online' : 'badge-offline'}">${isOnline ? '💻 게시교육' : '👥 대면교육'}</span>
                        <div class="title">${edu.title}</div>
                        <div class="info">기한: ~ ${edu.date} <span class="d-day">${dDay}</span></div>
                        ${isDone 
                            ? `<button class="btn-complete">이수 완료 ✅</button>` 
                            : `<button class="btn-sign" onclick="goToTimer('${edu.id}', '${edu.title}')">⏱️ 교육 입장 및 시뮬레이션</button>`
                        }
                    </div>
                `;
            }).join('');
        }

        // 🚀 타이머 화면으로 넘어가는 함수!
        function goToTimer(id, title) {
            localStorage.setItem('currentEduId', id);       // 어떤 교육인지 임시 저장
            localStorage.setItem('currentEduTitle', title); // 제목 임시 저장
            location.href = 'user_timer.html';              // 타이머 화면으로 이동!
        }

        function calculateDDay(targetDate) {
            const today = new Date(); today.setHours(0,0,0,0);
            const target = new Date(targetDate);
            const diff = target - today;
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            if (days < 0) return "기한 만료";
            return days === 0 ? "D-Day" : `D-${days}`;
        }

        loadEduList();
    </script>
</body>
</html>
