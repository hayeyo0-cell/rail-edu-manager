<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 15px; -webkit-tap-highlight-color: transparent; }

        /* 상단 헤더 */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; margin-bottom: 20px; }
        .logo-img { height: 22px; }
        .logout-btn { background: white; border: 1px solid #eee; padding: 8px 18px; border-radius: 12px; font-size: 0.85rem; font-weight: bold; color: #666; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }

        /* 섹션 타이틀 (파란색 세로선) */
        .section-header { display: flex; align-items: center; margin: 25px 0 15px 5px; }
        .section-bar { width: 4px; height: 18px; background: var(--dtro-blue); border-radius: 2px; margin-right: 10px; }
        .section-title { font-size: 1.25rem; font-weight: bold; color: #222; }

        /* 탭 메뉴 (가로 스크롤 가능) */
        .tab-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 5px; margin-bottom: 20px; -ms-overflow-style: none; scrollbar-width: none; }
        .tab-scroll::-webkit-scrollbar { display: none; }
        .tab-item { white-space: nowrap; padding: 10px 24px; background: white; border: 1px solid #eee; border-radius: 25px; color: #666; font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .tab-item.active { background: var(--dtro-blue); color: white; border-color: var(--dtro-blue); box-shadow: 0 4px 10px rgba(0, 114, 188, 0.2); }

        /* 교육 카드 디자인 (PDF 미리보기) */
        .course-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.03); }
        .thumb-area { width: 100%; height: 160px; background: #f0f0f0; overflow: hidden; position: relative; }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; }
        .preview-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); color: white; padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; backdrop-filter: blur(4px); }
        
        .course-info { padding: 20px; text-align: left; }
        .course-title { font-size: 1.1rem; font-weight: bold; color: #333; margin-bottom: 6px; }
        .course-date { font-size: 0.85rem; color: #999; margin-bottom: 15px; }
        .start-btn { width: 100%; padding: 14px; background: var(--dtro-blue); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; }

        /* 학습 보관함 카드 */
        .storage-card { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.04); margin-bottom: 40px; display: flex; align-items: center; gap: 20px; }
        .storage-icon-box { width: 70px; height: 70px; background: #f1f7ff; border-radius: 20px; display: flex; align-items: center; justify-content: center; }
        .storage-icon { width: 40px; height: 40px; }
        .storage-text h3 { margin: 0; font-size: 1.15rem; color: #333; margin-bottom: 5px; }
        .storage-text p { margin: 0; font-size: 0.9rem; color: #888; line-height: 1.4; }

        /* 빈 상태 알림 */
        .empty-box { background: white; border-radius: 25px; padding: 50px 20px; text-align: center; color: #bbb; box-shadow: 0 5px 15px rgba(0,0,0,0.03); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" class="logo-img" alt="DTRO">
        <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>

    <div class="section-header">
        <div class="section-bar"></div>
        <div class="section-title">오늘의 필수 교육 목록</div>
    </div>

    <div class="tab-scroll">
        <div class="tab-item active">전체</div>
        <div class="tab-item">공지사항</div>
        <div class="tab-item">게시교육</div>
        <div class="tab-item">대면교육</div>
    </div>

    <div id="courseListArea">
        <div class="empty-box">🎉 현재 이수할 교육이 없습니다.</div>
    </div>

    <div class="section-header">
        <div class="section-bar"></div>
        <div class="section-title">학습 보관함</div>
    </div>

    <div class="storage-card" onclick="alert('이수 내역 페이지로 이동합니다.')">
        <div class="storage-icon-box">
            <img src="storage_icon.png" class="storage-icon" alt="아이콘">
        </div>
        <div class="storage-text">
            <h3>나의 이수 완료 내역</h3>
            <p>이전에 수강을 완료한 교육 및 훈련 목록을 확인합니다.</p>
        </div>
    </div>

    <script>
        // 1. 페이지 로드 시 실행
        window.onload = function() {
            const userName = localStorage.getItem('currentUserName');
            
            // 로그인 체크
            if (!userName) {
                location.replace('index.html');
                return;
            }

            // 🚨 유저 메인 전용 뒤로가기 방어막 (로그인 튕김 방지용)
            window.history.pushState(null, null, window.location.href);
            
            // 2. 낮에 작업한 데이터 렌더링 함수 실행
            renderCourses();
        };

        // 뒤로가기 시 가두기
        window.onpopstate = function() {
            window.history.pushState(null, null, window.location.href);
        };

        // 🚨 낮에 고생해서 만든 PDF 리스트 그리기 로직 복구
        function renderCourses() {
            const area = document.getElementById('courseListArea');
            const data = JSON.parse(localStorage.getItem('educationList')) || [];

            if (data.length > 0) {
                area.innerHTML = data.map(item => `
                    <div class="course-card">
                        <div class="thumb-area">
                            <img src="${item.thumbnail || 'default_thumb.png'}" class="thumb-img">
                            <div class="preview-badge">행로표 미리보기</div>
                        </div>
                        <div class="course-info">
                            <div class="course-title">${item.title}</div>
                            <div class="course-date">작성일: ${item.date} | 작성자: ${item.author}</div>
                            <button class="start-btn" onclick="location.href='viewer.html?file=${item.pdfUrl}'">교육 수강하기 →</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function logout() {
            if(confirm("로그아웃 하시겠습니까?")) {
                localStorage.removeItem('currentUserId');
                localStorage.removeItem('currentUserName');
                window.onpopstate = null;
                location.replace('index.html');
            }
        }
    </script>
</body>
</html>
