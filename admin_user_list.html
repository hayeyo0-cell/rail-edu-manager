<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>팀원 명단 관리 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f4f6f9; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .top-nav { 
            width: 100%; background: white; padding: 12px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-sizing: border-box; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100;
        }
        .nav-btn { background: #f8f8f8; border: 1px solid #eee; border-radius: 6px; padding: 6px 12px; font-size: 0.8rem; color: #555; cursor: pointer; font-weight: bold; }
        .brand-logo { height: 42px; object-fit: contain; }

        .container { width: 92%; max-width: 450px; padding: 20px 0; }
        
        .input-card { background: white; border-radius: 20px; padding: 25px 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); box-sizing: border-box; }
        .input-title { text-align: left; font-weight: bold; color: var(--dtro-blue); margin-bottom: 18px; font-size: 1.1rem; }
        
        .input-row { display: flex; flex-direction: column; gap: 12px; }
        
        input { 
            width: 100%; padding: 16px; border: 1px solid #eee; border-radius: 12px; 
            font-size: 1rem; outline: none; background: #fafafa; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: var(--dtro-blue); background: #fff; box-shadow: 0 0 0 3px rgba(0,114,188,0.1); }
        
        .add-btn { 
            width: 100%; padding: 16px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; 
            cursor: pointer; margin-top: 5px; box-shadow: 0 4px 10px rgba(0,114,188,0.2);
        }

        .list-card { background: white; border-radius: 20px; padding: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); box-sizing: border-box; }
        .list-header { padding: 15px 15px 10px 15px; text-align: left; font-weight: bold; color: #666; font-size: 0.95rem; border-bottom: 2px solid #f0f0f0; margin-bottom: 5px; }
        
        .user-item { display: flex; flex-direction: column; padding: 18px 15px; border-bottom: 1px solid #f9f9f9; }
        .user-item:last-child { border-bottom: none; }
        .user-info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .user-name { font-weight: bold; font-size: 1.1rem; color: #333; }
        .user-id { font-size: 0.9rem; color: #999; margin-left: 5px; }
        
        /* 상태 뱃지 및 버튼 스타일 */
        .status-badge { font-size: 0.75rem; padding: 4px 8px; border-radius: 6px; font-weight: bold; margin-left: 8px; }
        .status-none { background: #f0f0f0; color: #999; }
        .status-pending { background: #fff3e0; color: #ff9800; animation: blink 1.5s infinite; }
        .status-approved { background: #e8f5e9; color: #2ecc71; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .action-row { display: flex; justify-content: flex-end; gap: 8px; }
        .btn-small { padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; cursor: pointer; border: none; }
        .btn-approve { background: var(--dtro-blue); color: white; }
        .btn-reset { background: #f0f0f0; color: #555; }
        .btn-delete { background: #fff0f0; color: #ff4d4d; }
    </style>
</head>
<body>
    <div class="top-nav">
        <button class="nav-btn" onclick="location.replace('admin_main.html')">← 메인으로</button>
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <div style="width:75px;"></div>
    </div>

    <div class="container">
        <div class="input-card">
            <div class="input-title">👤 신규 팀원 명단 등록</div>
            <div class="input-row">
                <input type="number" id="newId" placeholder="사번 8자리를 입력하세요" inputmode="numeric">
                <input type="text" id="newName" placeholder="성함을 입력하세요">
                <button class="add-btn" onclick="addUser()">장부에 등록하기</button>
            </div>
        </div>

        <div class="list-card">
            <div class="list-header">
                우리 팀 명단 (<span id="userCount">0</span>명)
            </div>
            <div id="userListArea"></div>
        </div>
    </div>

    <script>
        (function() {
            history.pushState(null, null, location.href);
            window.onpopstate = function() { location.replace('admin_main.html'); };
        })();

        const myDept = localStorage.getItem('userDept') || "경산승무팀";

        window.onload = function() { renderUserList(); };

        function renderUserList() {
            const listArea = document.getElementById('userListArea');
            const totalUserList = JSON.parse(localStorage.getItem('totalUserList')) || [];
            
            const myTeam = totalUserList.filter(u => u.dept === myDept);
            document.getElementById('userCount').innerText = myTeam.length;

            if (myTeam.length === 0) {
                listArea.innerHTML = '<p style="text-align:center; color:#ccc; padding:40px;">등록된 팀원이 없습니다.</p>';
                return;
            }

            let html = '';
            myTeam.sort((a, b) => a.id - b.id).forEach(user => {
                const status = user.authStatus || 'none';
                let badgeHtml = '';
                let actionHtml = '';

                // 🚨 상태에 따른 뱃지와 버튼 변화 로직!
                if (status === 'none') {
                    badgeHtml = `<span class="status-badge status-none">미접속</span>`;
                    actionHtml = `<button class="btn-small btn-delete" onclick="deleteUser('${user.id}')">삭제</button>`;
                } else if (status === 'pending') {
                    badgeHtml = `<span class="status-badge status-pending">기기 승인 대기중</span>`;
                    actionHtml = `
                        <button class="btn-small btn-approve" onclick="approveDevice('${user.id}')">✅ 승인</button>
                        <button class="btn-small btn-delete" onclick="deleteUser('${user.id}')">삭제</button>
                    `;
                } else if (status === 'approved') {
                    badgeHtml = `<span class="status-badge status-approved">기기 등록됨</span>`;
                    actionHtml = `
                        <button class="btn-small btn-reset" onclick="resetDevice('${user.id}')">📱 기기 해제</button>
                        <button class="btn-small btn-delete" onclick="deleteUser('${user.id}')">삭제</button>
                    `;
                }

                html += `
                    <div class="user-item">
                        <div class="user-info-row">
                            <div>
                                <span class="user-name">${user.name}</span>
                                <span class="user-id">(${user.id})</span>
                            </div>
                            ${badgeHtml}
                        </div>
                        <div class="action-row">
                            ${actionHtml}
                        </div>
                    </div>`;
            });
            listArea.innerHTML = html;
        }

        function addUser() {
            const id = document.getElementById('newId').value.trim();
            const name = document.getElementById('newName').value.trim();

            if(!id || !name) { alert("사번과 성함을 모두 입력해 주세요."); return; }
            if(id.length !== 8) { alert("사번은 8자리로 입력해 주세요."); return; }

            let totalUserList = JSON.parse(localStorage.getItem('totalUserList')) || [];
            if(totalUserList.some(u => String(u.id) === String(id))) {
                alert("이미 등록된 사번입니다."); return;
            }

            // 신규 등록 시 기기 상태는 'none'으로 초기화
            totalUserList.push({ id: id, name: name, dept: myDept, authStatus: 'none', deviceId: null });
            localStorage.setItem('totalUserList', JSON.stringify(totalUserList));

            document.getElementById('newId').value = '';
            document.getElementById('newName').value = '';
            renderUserList();
        }

        // 🚨 승인 버튼 눌렀을 때
        function approveDevice(id) {
            let totalUserList = JSON.parse(localStorage.getItem('totalUserList')) || [];
            const userIndex = totalUserList.findIndex(u => String(u.id) === String(id));
            if(userIndex !== -1) {
                totalUserList[userIndex].authStatus = 'approved';
                localStorage.setItem('totalUserList', JSON.stringify(totalUserList));
                renderUserList();
            }
        }

        // 🚨 기기 해제 (폰 바꿨을 때)
        function resetDevice(id) {
            if(!confirm("기기 등록을 해제하시겠습니까?\n해당 사용자는 다음 접속 시 다시 기기 인증을 받아야 합니다.")) return;
            let totalUserList = JSON.parse(localStorage.getItem('totalUserList')) || [];
            const userIndex = totalUserList.findIndex(u => String(u.id) === String(id));
            if(userIndex !== -1) {
                totalUserList[userIndex].authStatus = 'none';
                totalUserList[userIndex].deviceId = null; // 기기 정보 초기화
                localStorage.setItem('totalUserList', JSON.stringify(totalUserList));
                renderUserList();
            }
        }

        function deleteUser(id) {
            if(!confirm("해당 팀원을 명단에서 완전히 삭제하시겠습니까?")) return;
            let totalUserList = JSON.parse(localStorage.getItem('totalUserList')) || [];
            totalUserList = totalUserList.filter(u => String(u.id) !== String(id));
            localStorage.setItem('totalUserList', JSON.stringify(totalUserList));
            renderUserList();
        }
    </script>
</body>
</html>
