<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>팀원 명단 관리 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f4f6f9; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .top-header { width: 100%; background: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; box-sizing: border-box; position: sticky; top: 0; z-index: 100; }
        .back-btn { background: white; border: 1px solid #eaeaea; border-radius: 6px; padding: 6px 12px; font-size: 0.85rem; color: #555; cursor: pointer; font-weight: bold; }
        .brand-logo { height: 42px; object-fit: contain; }
        .container { width: 92%; max-width: 500px; padding: 20px 0; }
        /* 기존 스타일 유지... (생략) */
    </style>
</head>
<body>
    <div class="top-header">
        <button class="back-btn" onclick="location.replace('admin_main.html')">← 메인으로</button>
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <div style="width:75px;"></div>
    </div>
    <script>
        // 🚨 [보안] 뒤로가기 시 관리자 메인으로 강제 압송
        (function() {
            function lockHistory() { for(let i=0; i<5; i++) window.history.pushState(null, null, window.location.href); }
            lockHistory();
            window.onpopstate = function() { 
                lockHistory(); 
                window.location.replace('admin_main.html'); 
            };
            document.body.onclick = lockHistory;
        })();
        
        // 기존 명단 관리 로직 (CRUD) 유지...
    </script>
</body>
</html>
