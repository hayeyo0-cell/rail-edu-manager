<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 관리자 로그인</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        html, body { height: 100%; overflow: hidden; }
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-gray); margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* 슬림 헤더 */
        .top-header-section {
            width: 100%; background-color: var(--bg-gray);
            padding: 12px 0 8px 0; display: flex; flex-direction: column;
            align-items: center; border-bottom: 2px solid var(--dtro-blue);
        }
        .brand-logo { height: 22px; margin-bottom: 4px; mix-blend-mode: multiply; }
        .main-title { font-size: 1.35rem; font-weight: bold; color: #222; margin: 0; }

        /* [핵심 수정] 하단 공간을 채우기 위해 전체 요소를 아래로 밀어냄 */
        .main-container {
            flex: 1; 
            display: flex; 
            flex-direction: column;
            justify-content: flex-end; /* [변경] 요소를 아래쪽부터 차곡차곡 쌓음 */
            width: 100%; 
            align-items: center;
            padding-bottom: 80px; /* [핵심] 바닥에서 이 정도만 띄워서 하단 여백 박멸 */
        }

        .login-card { 
            width: 88%; max-width: 380px; background: white; 
            border-radius: 24px; padding: 35px 24px 25px 24px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.06); text-align: center;
        }
        
        .input-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 6px; }
        input { width: 100%; height: 52px; padding: 0 15px; border: 1px solid #e8e8e8; border-radius: 12px; font-size: 1rem; background: #fafafa; outline: none; box-sizing: border-box;}

        .btn-admin { 
            width: 100%; height: 58px; background: #333; color: white; 
            border: none; border-radius: 15px; font-size: 1.15rem; font-weight: bold; 
            cursor: pointer; margin-top: 10px; box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .back-link { margin-top: 25px; display: inline-block; font-size: 0.85rem; color: #bbb; text-decoration: none; }
    </style>
</head>
<body>

    <div class="top-header-section">
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <h1 class="main-title">관리자 전용 로그인</h1>
    </div>

    <div class="main-container">
        <div class="login-card">
            <div class="input-group">
                <label>관리자 사번/ID</label>
                <input type="text" id="adminId" placeholder="아이디 입력">
            </div>
            <div class="input-group" style="margin-bottom: 30px;">
                <label>비밀번호</label>
                <input type="password" id="adminPw" placeholder="비밀번호 입력">
            </div>
            <button class="btn-admin" onclick="location.href='admin_main.html'">관리자 접속하기</button>
            <a href="index.html" class="back-link">일반 사용자 페이지로 돌아가기</a>
        </div>
    </div>

</body>
</html>
