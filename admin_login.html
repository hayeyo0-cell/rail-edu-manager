<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 관리자</title>
    <script>
        // 관리자 등록 여부에 따라 화면을 다르게 보여줍니다.
        function checkStatus() {
            if (!localStorage.getItem('adminCreated')) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('setupSection').style.display = 'block';
            }
        }
    </script>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }

        .top-header-section { width: 100%; background-color: var(--bg-gray); padding: 12px 0 8px 0; display: flex; flex-direction: column; align-items: center; border-bottom: 2px solid var(--dtro-blue); }
        .brand-logo { height: 22px; margin-bottom: 4px; mix-blend-mode: multiply; }
        .main-title { font-size: 1.35rem; font-weight: bold; color: #222; margin: 0; }

        .main-container { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; width: 100%; align-items: center; padding-bottom: 80px; }
        .card { width: 88%; max-width: 380px; background: white; border-radius: 24px; padding: 35px 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); text-align: center; }
        
        input { width: 100%; height: 52px; border: 1px solid #eee; border-radius: 12px; padding: 0 15px; margin-bottom: 15px; box-sizing: border-box; outline: none; background: #fafafa; font-size: 1rem; }
        .btn-black { width: 100%; height: 55px; background: #333; color: white; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onload="checkStatus()">
    <div class="top-header-section">
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <h1 class="main-title">관리자 전용</h1>
    </div>

    <div class="main-container">
        <div id="loginSection" class="card">
            <h2 style="font-size:1.1rem; margin-bottom:20px;">관리자 로그인</h2>
            <input type="text" id="loginId" placeholder="관리자 ID (사번)">
            <input type="password" id="loginPw" placeholder="비밀번호">
            <button class="btn-black" onclick="location.href='admin_main.html'">로그인</button>
            <a href="index.html" style="display:block; margin-top:20px; color:#ccc; font-size:0.8rem; text-decoration:none;">홈으로</a>
        </div>

        <div id="setupSection" class="card" style="display:none;">
            <h2 style="font-size:1.1rem; margin-bottom:20px; color:var(--dtro-blue);">최초 설정을 위해<br>마스터 비번을 입력하세요</h2>
            <input type="password" id="masterInput" placeholder="Master Password" style="text-align:center;">
            <button class="btn-black" onclick="verifyMaster()">마스터 인증</button>
        </div>
    </div>

    <script>
        function verifyMaster() {
            if(document.getElementById('masterInput').value === '1234') {
                location.href = 'admin_first_reg.html';
            } else {
                alert('마스터 비밀번호가 틀립니다.');
            }
        }
    </script>
</body>
</html>
