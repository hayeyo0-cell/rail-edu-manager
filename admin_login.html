<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 관리자 로그인</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        
        /* 스크롤 방지 및 중앙 정렬 */
        html, body { height: 100%; overflow: hidden; }
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-gray); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
        }

        /* [통일 수정] 로고와 제목을 중앙 위아래로 배치 */
        .brand-area { 
            text-align: center; 
            margin-bottom: 25px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-logo { 
            height: 20px; /* 통일된 슬림 사이즈 */
            margin-bottom: 6px; /* 제목과 밀착 */
            opacity: 0.8;
        }

        .main-title { 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: #222; 
            margin: 0; 
            letter-spacing: -1px;
            position: relative;
        }
        /* 관리자용임을 나타내는 작은 서브 타이틀 */
        .admin-sub { color: var(--dtro-blue); font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 2px; }

        /* 관리자 로그인 카드 */
        .login-card { 
            width: 88%; max-width: 380px; 
            background: white; border-radius: 24px; 
            padding: 35px 22px 25px 22px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            text-align: center;
        }
        
        .input-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 6px; padding-left: 5px; }
        
        input { 
            width: 100%; height: 50px; padding: 0 15px; 
            border: 1px solid #e1e1e1; border-radius: 12px; 
            font-size: 1rem; background: #fafafa; outline: none; box-sizing: border-box;
        }
        input:focus { border-color: var(--dtro-blue); background: #fff; }

        /* 관리자 전용 블랙 버튼 */
        .btn-admin { 
            width: 100%; height: 55px; background: #333; color: white; 
            border: none; border-radius: 14px; font-size: 1.1rem; font-weight: bold; 
            cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn-admin:active { transform: scale(0.98); }

        .back-link { margin-top: 20px; display: inline-block; font-size: 0.75rem; color: #bbb; text-decoration: none; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="brand-area">
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <h1 class="main-title"><span class="admin-sub">Administrator</span>관리자 로그인</h1>
    </div>

    <div class="login-card">
        <div class="input-group">
            <label>관리자 사번/ID</label>
            <input type="text" id="adminId" placeholder="아이디 입력">
        </div>

        <div class="input-group" style="margin-bottom: 30px;">
            <label>관리자 비밀번호</label>
            <input type="password" id="adminPw" placeholder="비밀번호 입력">
        </div>

        <button class="btn-admin" onclick="location.href='admin_main.html'">
            관리자 접속하기
        </button>

        <a href="index.html" class="back-link">일반 사용자 페이지로 돌아가기</a>
    </div>

</body>
</html>
