<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관리자 홈 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --dtro-sky: #f4f9ff; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }

        /* 상단 헤더 - 로고 크기 상향 조절 */
        .header { 
            width: 100%; background: white; padding: 15px 0; 
            display: flex; align-items: center; justify-content: space-between; 
            border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; 
        }
        .header-left { width: 80px; } 
        .slim-logo { height: 38px; vertical-align: middle; } /* 32px -> 38px로 확대 */
        .header-right { width: 80px; display: flex; gap: 12px; justify-content: flex-end; padding-right: 15px; }
        
        .icon-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #555; }

        .container { width: 92%; max-width: 500px; margin: 20px auto; }
        
        /* 소속 정보 표시 (사번 제거) */
        .admin-tag { text-align: center; margin-bottom: 25px; }
        .admin-tag span { 
            background: var(--dtro-blue); color: white; 
            padding: 6px 20px; border-radius: 20px; 
            font-size: 0.95rem; font-weight: bold; 
            box-shadow: 0 4px 6px rgba(0,114,188,0.2);
        }

        /* 섹션 구분 타이틀 */
        .section-label { font-size: 0.9rem; font-weight: bold; color: var(--dtro-blue); margin: 20px 0 10px 5px; display: flex; align-items: center; }
        .section-label::before { content: ''; width: 3px; height: 14px; background: var(--dtro-blue); margin-right: 8px; border-radius: 2px; }

        /* 메인 메뉴 카드 */
        .menu-card { 
            background: white; border-radius: 20px; padding: 22px 18px; 
            margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            display: flex; align-items: center; cursor: pointer; transition: 0.2s;
        }
        .menu-card:active { transform: scale(0.97); background: #fafafa; }
        .menu-icon { font-size: 1.8rem; margin-right: 15px; width: 40px; text-align: center; }
        .menu-text { text-align: left; }
        .menu-title { font-size: 1.05rem; font-weight: bold; color: #333; margin-bottom: 3px; }
        .menu-desc { font-size: 0.8rem; color: #888; line-height: 1.3; }

        /* 모달 스타일 (기존과 동일) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; }
        .modal-title { font-weight: bold; margin-bottom: 20px; font-size: 1.1rem; color: #333; text-align: center; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-blue { width: 100%; padding: 12px; background: var(--dtro-blue); color: white; border: none; border-radius: 10px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left"></div>
        <img src="logo.png" class="slim-logo">
        <div class="header-right">
            <button class="icon-btn" onclick="openSettings()">⚙️</button>
            <button class="icon-btn" onclick="if(confirm('로그아웃 하시겠습니까?')) location.href='index.html'">🚪</button>
        </div>
    </div>

    <div class="container">
        <div class="admin-tag">
            <span id="adminTeamDisplay">확인 중...</span>
        </div>

        <div class="section-label">교육 관리</div>
        
        <div class="menu-card" onclick="location.href='admin_edu_add.html'">
            <div class="menu-icon">✍️</div>
            <div class="menu-text">
                <div class="menu-title">새 교육 등록하기</div>
                <div class="menu-desc">오늘의 교육 내용 및 지시사항을 게시합니다.</div>
            </div>
        </div>

        <div class="menu-card" onclick="alert('준비 중인 기능입니다.')">
            <div class="menu-icon">📂</div>
            <div class="menu-text">
                <div class="menu-title">등록된 교육 내역</div>
                <div class="menu-desc">게시 중인 교육을 수정하거나 삭제합니다.</div>
            </div>
        </div>

        <div class="section-label">이수 현황 및 소통</div>

        <div class="menu-card" onclick="location.href='admin_status.html'">
            <div class="menu-icon">📊</div>
            <div class="menu-text">
                <div class="menu-title">실시간 이수 현황</div>
                <div class="menu-desc">현재 12명 완료 / 45명 미이수 (상세보기)</div>
            </div>
        </div>

        <div class="menu-card" onclick="alert('준비 중인 기능입니다.')">
            <div class="menu-icon">📢</div>
            <div class="menu-text">
                <div class="menu-title">공지사항 관리</div>
                <div class="menu-desc">팀 내 긴급 공지 및 전달사항을 올립니다.</div>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">관리자 설정</div>
            <div class="input-group">
                <label style="font-size:0.8rem; color:#666; display:block; margin-bottom:5px;">팀 공용 비밀번호 변경</label>
                <input type="number" id="newTeamPw" placeholder="새 비번 입력" inputmode="numeric">
            </div>
            <button class="btn-blue" onclick="updatePw()">비밀번호 즉시 변경</button>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
            <button onclick="resetAdmin()" style="width:100%; color:#dc3545; background:none; border:none; text-decoration:underline; font-size:0.85rem;">담당자 변경 (권한 초기화)</button>
            <button onclick="closeSettings()" style="width:100%; border:none; background:none; color:#999; margin-top:20px;">닫기</button>
        </div>
    </div>

    <script>
        const admin = JSON.parse(localStorage.getItem("assignedAdmin"));
        if(!admin) {
            location.replace("index.html");
        } else {
            // "경산" -> "경산승무팀" 형식으로 출력
            document.getElementById('adminTeamDisplay').innerText = admin.team + "승무팀";
        }

        function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
        function updatePw() {
            const pw = document.getElementById('newTeamPw').value;
            if(pw) { localStorage.setItem("teamPassword", pw); alert("변경되었습니다."); closeSettings(); }
        }
        function resetAdmin() {
            if(confirm("권한을 초기화할까요?")) { localStorage.removeItem("assignedAdmin"); location.href="index.html"; }
        }
    </script>
</body>
</html>
