<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 관리자 메인</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f4f6f9; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; }

        /* [핵심 수정] 헤더 밸런스 조정 */
        .header { 
            width: 100%; 
            background: white; 
            padding: 18px 0; /* 세로 폭을 넓혀 로고 공간 확보 */
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* 로고: 주인공답게 크게 */
        .header-logo { 
            height: 38px; /* 기존보다 훨씬 키움 */
            position: absolute;
            left: 50%;
            transform: translateX(-50%); /* 정확히 중앙 배치 */
        }

        /* 버튼들: 작고 슬림하게 부조연 역할 */
        .header-btn { 
            background: #f8f9fa; 
            border: 1px solid #e0e0e0; 
            padding: 5px 10px; 
            border-radius: 6px; 
            font-size: 0.7rem; /* 글자 크기 축소 */
            color: #777; 
            cursor: pointer;
            margin: 0 12px;
            white-space: nowrap;
        }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        
        /* 소속 표시 버튼 */
        .dept-tag { 
            background: var(--dtro-blue); 
            color: white; 
            padding: 8px 20px; 
            border-radius: 20px; 
            display: inline-block; 
            font-weight: bold; 
            font-size: 0.9rem;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,114,188,0.2);
        }

        .section-title { font-size: 1rem; font-weight: bold; color: var(--dtro-blue); margin: 20px 0 10px 5px; border-left: 4px solid var(--dtro-blue); padding-left: 10px; }

        /* 카드 디자인 보강 */
        .menu-card { 
            background: white; 
            border-radius: 18px; 
            padding: 20px; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            cursor: pointer;
            transition: 0.2s;
        }
        .menu-card:active { transform: scale(0.98); background: #fafafa; }
        .menu-icon { font-size: 2.2rem; margin-right: 18px; }
        .menu-info { text-align: left; }
        .menu-name { font-size: 1rem; font-weight: bold; color: #333; margin-bottom: 4px; }
        .menu-desc { font-size: 0.75rem; color: #888; line-height: 1.3; }
    </style>
</head>
<body>

    <div class="header">
        <button class="header-btn">관리자 설정</button>
        <img src="logo.png" class="header-logo" alt="DTRO">
        <button class="header-btn">로그아웃</button>
    </div>

    <div class="container" style="text-align: center;">
        <div class="dept-tag">경산승무팀</div>

        <div class="section-title">교육 관리</div>
        <div class="menu-card" onclick="location.href='admin_edu_add.html'">
            <div class="menu-icon">✍️</div>
            <div class="menu-info">
                <div class="menu-name">새 교육 등록하기</div>
                <div class="menu-desc">오늘의 교육 내용 및 지시사항을 게시합니다.</div>
            </div>
        </div>

        <div class="menu-card">
            <div class="menu-icon">📂</div>
            <div class="menu-info">
                <div class="menu-name">등록된 교육 내역</div>
                <div class="menu-desc">게시 중인 교육을 수정하거나 삭제 관리합니다.</div>
            </div>
        </div>

        <div class="section-title">이수 현황 및 소통</div>
        <div class="menu-card">
            <div class="menu-icon">📊</div>
            <div class="menu-info">
                <div class="menu-name">실시간 이수 현황</div>
                <div class="menu-desc">현재 12명 완료 / 45명 미이수 상세 보기</div>
            </div>
        </div>

        <div class="menu-card">
            <div class="menu-icon">📢</div>
            <div class="menu-info">
                <div class="menu-name">공지사항 관리</div>
                <div class="menu-desc">팀 내 긴급 공지 및 주요 전달사항을 게시합니다.</div>
            </div>
        </div>
    </div>

</body>
</html>
