<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 관리자 메인</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg-gray); }
        body { font-family: 'Noto Sans KR', sans-serif; display: flex; flex-direction: column; align-items: center; }

        /* [표준] 슬림 헤더 */
        .top-header-section { 
            width: 100%; background-color: var(--bg-gray); padding: 12px 0 8px 0; 
            display: flex; flex-direction: column; align-items: center; 
            border-bottom: 2px solid var(--dtro-blue); flex-shrink: 0; 
        }
        .brand-logo { height: 22px; margin-bottom: 4px; mix-blend-mode: multiply; }
        .main-title { font-size: 1.35rem; font-weight: bold; color: #222; margin: 0; }

        /* 메인 컨테이너 */
        .main-container { 
            flex: 1; width: 100%; display: flex; flex-direction: column; 
            justify-content: flex-start; align-items: center; padding-top: 30px; 
        }

        /* 환영 메시지 카드 */
        .welcome-card {
            width: 88%; max-width: 400px; background: white; border-radius: 24px;
            padding: 30px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center; margin-bottom: 20px;
        }

        .welcome-text { 
            font-size: 1.25rem; font-weight: bold; color: #333; margin: 0;
            line-height: 1.4;
        }
        .welcome-text span { color: var(--dtro-blue); }

        /* 관리 메뉴 버튼들 */
        .menu-grid {
            width: 88%; max-width: 400px; display: grid;
            grid-template-columns: 1fr 1fr; gap: 15px;
        }

        .menu-item {
            background: white; border-radius: 18px; padding: 20px 10px;
            text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.04);
            cursor: pointer; transition: transform 0.2s; border: 1px solid #f0f0f0;
        }
        .menu-item:active { transform: scale(0.96); }
        .menu-icon { font-size: 1.8rem; margin-bottom: 8px; display: block; }
        .menu-name { font-size: 0.95rem; font-weight: bold; color: #444; }

        /* 하단 로그아웃 */
        .logout-link {
            margin-top: 40px; font-size: 0.85rem; color: #bbb; text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="top-header-section">
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <h1 class="main-title">관리자 모드</h1>
    </div>

    <div class="main-container">
        <div class="welcome-card">
            <p class="welcome-text" id="welcomeMsg">
                <span id="deptName">관리자</span>님 환영합니다
            </p>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="location.href='admin_stats.html'">
                <span class="menu-icon">📊</span>
                <span class="menu-name">교육 현황</span>
            </div>
            <div class="menu-item" onclick="location.href='admin_settings.html'">
                <span class="menu-icon">⚙️</span>
                <span class="menu-name">관리자 설정</span>
            </div>
            <div class="menu-item" onclick="alert('준비 중인 기능입니다.')">
                <span class="menu-icon">📋</span>
                <span class="menu-name">명단 관리</span>
            </div>
            <div class="menu-item" onclick="alert('준비 중인 기능입니다.')">
                <span class="menu-icon">📢</span>
                <span class="menu-name">공지사항</span>
            </div>
        </div>

        <a href="index.html" class="logout-link" onclick="sessionStorage.clear()">안전하게 로그아웃</a>
    </div>

    <script>
        // 페이지 로드 시 저장된 소속 정보를 가져와서 문구를 바꿉니다.
        window.onload = function() {
            const myDept = localStorage.getItem('adminDept');
            if (myDept) {
                document.getElementById('deptName').innerText = myDept + " 관리자";
            }
        };
    </script>

</body>
</html>
