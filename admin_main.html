<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 모드 - 스마트 교육관리</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .admin-title { font-size: 1.2rem; font-weight: bold; color: #333; }
        .stats { background: #333; color: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .menu-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; cursor: pointer; }
        .icon { font-size: 1.5rem; margin-bottom: 5px; }
        
        /* 교육 관리 목록 스타일 */
        .edu-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .edu-info { flex: 1; }
        .edu-info div { font-weight: bold; font-size: 1rem; color: #333; }
        .edu-info span { font-size: 0.8rem; color: #888; }
        .btn-group button { padding: 8px 12px; border-radius: 8px; border: none; font-size: 0.8rem; cursor: pointer; margin-left: 5px; }
        .btn-del { background: #ff7675; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <div class="admin-title" id="admin-info">관리자 모드</div>
        <button onclick="location.href='index.html'" style="background:none; border:none; color:#666; cursor:pointer;">로그아웃</button>
    </div>

    <div class="menu-grid">
        <div class="menu-card" onclick="location.href='admin_edu_add.html'">
            <div class="icon">📝</div>
            <div style="font-weight:bold; font-size:0.9rem;">교육 등록</div>
        </div>
        <div class="menu-card" onclick="resetAdmin()">
            <div class="icon">🔄</div>
            <div style="font-weight:bold; font-size:0.9rem;">권한 초기화</div>
        </div>
    </div>

    <h3 style="font-size: 1rem; color: #555;">📋 등록된 교육 관리</h3>
    <div id="admin-edu-list">
        </div>

    <script>
        const adminTeam = localStorage.getItem("loginAdmin");
        if(!adminTeam) { location.href = "index.html"; }
        document.getElementById("admin-info").innerText = `${adminTeam} 사업소 관리자`;

        function loadAdminEduList() {
            const eduList = JSON.parse(localStorage.getItem(`eduList_${adminTeam}`)) || [];
            const container = document.getElementById("admin-edu-list");
            
            if(eduList.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:#999; font-size:0.9rem;'>등록된 교육이 없습니다.</p>";
                return;
            }

            container.innerHTML = eduList.map((edu, index) => `
                <div class="edu-item">
                    <div class="edu-info">
                        <div>${edu.title}</div>
                        <span>기한: ${edu.date} (${edu.type === 'online' ? '게시' : '대면'})</span>
                    </div>
                    <div class="btn-group">
                        <button class="btn-del" onclick="deleteEdu(${index})">삭제</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteEdu(index) {
            if(confirm("이 교육을 삭제할까요? 관련 서명 데이터도 삭제될 수 있습니다.")) {
                let eduList = JSON.parse(localStorage.getItem(`eduList_${adminTeam}`)) || [];
                eduList.splice(index, 1); // 해당 순서의 교육 삭제
                localStorage.setItem(`eduList_${adminTeam}`, JSON.stringify(eduList));
                loadAdminEduList(); // 화면 새로고침
                alert("삭제되었습니다.");
            }
        }

        function resetAdmin() {
            if(confirm("관리자 정보를 초기화할까요?")) {
                localStorage.removeItem(`adminConfig_${adminTeam}`);
                location.href = "index.html";
            }
        }

        loadAdminEduList();
    </script>
</body>
</html>
