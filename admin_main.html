<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 관리자 메인</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f4f6f9; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; }

        /* [핵심 수정] 헤더 디자인: 로고는 크게, 버튼은 아주 작게 */
        .header { 
            width: 100%; 
            background: white; 
            padding: 20px 0; /* 세로 폭을 넓혀 로고의 위엄을 살림 */
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* 로고: 중앙에 크고 선명하게 */
        .header-logo { 
            height: 42px; /* 존재감 있게 키움 */
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 양옆 버튼: 작고 슬림하게 (보조 역할) */
        .header-btn { 
            background: #fdfdfd; 
            border: 1px solid #eaeaea; 
            padding: 4px 8px; 
            border-radius: 4px; 
            font-size: 0.65rem; /* 글자 크기를 최소화하여 로고 방해 금지 */
            color: #999; 
            cursor: pointer;
            margin: 0 15px;
            white-space: nowrap;
            letter-spacing: -0.5px;
        }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; text-align: center; }
        
        /* 소속 태그: 로고와 밸런스를 맞춰 볼륨감 있게 */
        .dept-tag { 
            background: var(--dtro-blue); 
            color: white; 
            padding: 10px 25px; 
            border-radius: 25px; 
            display: inline-block; 
            font-weight: bold; 
            font-size: 0.95rem;
            margin-bottom: 30px;
            box-shadow: 0 4px 12px rgba(0,114,188,0.25);
        }

        .section-title { 
            font-size: 1rem; font-weight: bold; color: var(--dtro-blue); 
            margin: 25px 0 12px 5px; border-left: 4px solid var(--dtro-blue); 
            padding-left: 10px; text-align: left;
        }

        /* 카드 디자인: 시인성 강화 */
        .menu-card { 
            background: white; 
            border-radius: 20px; 
            padding: 22px; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.04);
            cursor: pointer;
            transition: 0.2s ease;
        }
        .menu-card:active { transform: scale(0.97); background: #fafafa; }
        .menu-icon { font-size: 2.3rem; margin-right: 20px; }
        .menu-info { text-align: left; }
        .menu-name { font-size: 1.05rem; font-weight: bold; color: #333; margin-bottom: 5px; }
        .menu-desc { font-size: 0.8rem; color: #888; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="header">
        <button class="header-btn">관리자 설정</button>
        <img src="logo.png" class="header-logo" alt="DTRO">
        <button class="header-btn">로그아웃</button>
    </div>

    <div class="container">
        <div class="dept-tag">경산승무팀</div>

        <div class="section-title">교육 관리</div>
        <div class="menu-card" onclick="location.href='admin_edu_add.html'">
            <div class="menu-icon">✍️</div>
            <div class="menu-info">
                <div class="menu-name">새 교육 등록하기</div>
                <div class="menu-desc">오늘의 교육 내용 및 지시사항을 게시합니다.</div>
            </div>
        </div>

        <div class="menu-card">
            <div class="menu-icon">📂</div>
            <div class="menu-info">
                <div class="menu-name">등록된 교육 내역</div>
                <div class="menu-desc">게시 중인 교육을 수정하거나 삭제 관리합니다.</div>
            </div>
        </div>

        <div class="section-title">이수 현황 및 소통</div>
        <div class="menu-card">
            <div class="menu-icon">📊</div>
            <div class="menu-info">
                <div class="menu-name">실시간 이수 현황</div>
                <div class="menu-desc">현재 12명 완료 / 45명 미이수 상세 보기</div>
            </div>
        </div>

        <div class="menu-card">
            <div class="menu-icon">📢</div>
            <div class="menu-info">
                <div class="menu-name">공지사항 관리</div>
                <div class="menu-desc">팀 내 긴급 공지 및 주요 전달사항을 게시합니다.</div>
            </div>
        </div>
    </div>

</body>
</html>
