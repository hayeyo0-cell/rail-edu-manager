<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관리자 메인 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f4f6f9; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* 상단 헤더 영역 */
        .top-nav { width: 100%; background: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-bottom: 1px solid #eee; }
        .nav-btn { background: white; border: 1px solid #eaeaea; border-radius: 6px; padding: 6px 10px; font-size: 0.8rem; color: #666; cursor: pointer; }
        .brand-logo { height: 24px; object-fit: contain; }

        /* 소속 표시 배지 */
        .dept-badge { background: var(--dtro-blue); color: white; padding: 8px 25px; border-radius: 30px; font-weight: bold; margin: 30px 0 20px 0; box-shadow: 0 4px 10px rgba(0,114,188,0.2); }
        .welcome-text { font-size: 1.15rem; font-weight: bold; color: #333; margin-bottom: 30px; }
        .welcome-text span { color: var(--dtro-blue); }

        .container { width: 90%; max-width: 400px; padding-bottom: 40px; }
        .section-title { font-size: 1.1rem; font-weight: bold; color: #333; margin: 20px 0 15px 0; display: flex; align-items: center; border-left: 4px solid var(--dtro-blue); padding-left: 10px; }

        /* 기관사님이 좋아하시는 아이콘 카드 스타일 */
        .menu-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; display: flex; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.03); cursor: pointer; border: 1px solid transparent; }
        .menu-card:active { background: #f9f9f9; transform: scale(0.98); }
        .menu-icon { width: 50px; height: 50px; margin-right: 20px; object-fit: contain; }
        .menu-info { text-align: left; }
        .menu-title { font-size: 1.05rem; font-weight: bold; color: #333; display: block; margin-bottom: 4px; }
        .menu-desc { font-size: 0.85rem; color: #999; line-height: 1.3; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="nav-btn" onclick="location.href='admin_setup_auth.html'">관리자 설정</button>
        <img src="logo.png" class="brand-logo">
        <button class="nav-btn" onclick="location.href='index.html'">로그아웃</button>
    </div>

    <div id="deptBadge" class="dept-badge">소속 정보</div>
    <div class="welcome-text"><span id="deptName">소속팀</span> 관리자님 환영합니다</div>

    <div class="container">
        
        <div class="section-title">👥 명단 관리</div>
        <div class="menu-card" onclick="location.href='admin_user_list.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="menu-icon">
            <div class="menu-info">
                <span class="menu-title">팀원 명단 관리</span>
                <span class="menu-desc">우리 팀 사번과 성함을 등록하고 관리합니다.</span>
            </div>
        </div>

        <div class="section-title">📝 교육 관리</div>
        <div class="menu-card" onclick="location.href='admin_edu_add.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/201/201602.png" class="menu-icon">
            <div class="menu-info">
                <span class="menu-title">새 교육 등록하기</span>
                <span class="menu-desc">오늘의 교육 내용 및 지시사항을 게시합니다.</span>
            </div>
        </div>

        <div class="menu-card" onclick="location.href='admin_edu_list.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1041/1041916.png" class="menu-icon">
            <div class="menu-info">
                <span class="menu-title">등록된 교육 내역</span>
                <span class="menu-desc">게시 중인 교육을 수정하거나 삭제 관리합니다.</span>
            </div>
        </div>

        <div class="section-title">📊 이수 현황 및 소통</div>
        <div class="menu-card" onclick="location.href='admin_status.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/3408/3408545.png" class="menu-icon">
            <div class="menu-info">
                <span class="menu-title">실시간 이수 현황</span>
                <span class="menu-desc">팀원들의 교육 이수율과 사인 내역을 확인합니다.</span>
            </div>
        </div>

    </div>

    <script>
        window.onload = function() {
            const dept = localStorage.getItem('userDept') || "경산승무팀";
            document.getElementById('deptBadge').innerText = dept;
            document.getElementById('deptName').innerText = dept;
        };
    </script>
</body>
</html>
