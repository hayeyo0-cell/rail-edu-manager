<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTRO 관리자 모드</title>
    <style>
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f4f7f9; }
        .top-nav { background: #0072bc; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .summary-bar { display: flex; gap: 10px; padding: 15px; background: white; border-bottom: 1px solid #ddd; }
        .summary-card { flex: 1; text-align: center; padding: 10px; background: #f8f9fa; border-radius: 8px; border: 1px solid #eee; }
        .summary-card div:last-child { font-size: 1.2rem; font-weight: bold; color: #0072bc; }
        .content-area { flex: 1; background: white; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="top-nav">
        <strong>DTRO 교육 관리자 대시보드</strong>
        <button onclick="location.href='index.html'" style="background:#fff; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">로그아웃</button>
    </div>
    <div class="summary-bar">
        <div class="summary-card"><div>전체</div><div>58명</div></div>
        <div class="summary-card"><div>이수</div><div id="done">실시간</div></div>
        <div class="summary-card"><div>미이수</div><div style="color:red;">확인요망</div></div>
    </div>
    <div class="content-area">
        <iframe src="https://docs.google.com/spreadsheets/d/시트아이디/edit?usp=sharing"></iframe>
    </div>
</body>
</html>
