<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관리자 메인 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f4f6f9; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* 상단바 패딩 및 로고 크기 42px 유지 */
        .top-nav { width: 100%; background: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-bottom: 1px solid #eee; }
        .nav-btn { background: #f8f8f8; border: 1px solid #eee; border-radius: 6px; padding: 6px 12px; font-size: 0.8rem; color: #555; cursor: pointer; font-weight: bold; }
        .brand-logo { height: 42px; object-fit: contain; }
        
        .dept-badge { background: var(--dtro-blue); color: white; padding: 8px 25px; border-radius: 30px; font-weight: bold; margin: 30px 0 20px 0; box-shadow: 0 4px 10px rgba(0,114,188,0.1); }
        .welcome-text { font-size: 1.15rem; font-weight: bold; color: #333; margin-bottom: 30px; }
        .container { width: 92%; max-width: 400px; padding-bottom: 40px; }
        .section-title { font-size: 1.1rem; font-weight: bold; color: #333; margin: 20px 0 15px 0; display: flex; align-items: center; border-left: 4px solid var(--dtro-blue); padding-left: 10px; }
        .menu-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; display: flex; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.03); cursor: pointer; }
        .menu-icon { width: 45px; height: 45px; margin-right: 18px; object-fit: contain; }
        .menu-title { font-size: 1.05rem; font-weight: bold; color: #333; display: block; margin-bottom: 4px; }
        .menu-desc { font-size: 0.85rem; color: #999; line-height: 1.3; }
    </style>
</head>
<body>
    <div class="top-nav">
        <button class="nav-btn" onclick="location.replace('admin_setup_auth.html')">설정</button>
        <img src="logo.png" class="brand-logo" alt="DTRO Logo">
        <button class="nav-btn" onclick="location.replace('index.html')">로그아웃</button>
    </div>
    <div id="deptBadge" class="dept-badge">소속 정보</div>
    <div class="welcome-text">관리자님 환영합니다</div>
    <div class="container">
        <div class="section-title">👥 명단 관리</div>
        <div class="menu-card" onclick="location.replace('admin_user_list.html')">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="menu-icon">
            <div class="menu-info"><span class="menu-title">팀원 명단 관리</span><span class="menu-desc">우리 팀 사번/성함 등록 및 관리</span></div>
        </div>
        <div class="section-title">📝 교육 관리</div>
        <div class="menu-card" onclick="location.replace('admin_edu_add.html')">
            <img src="https://cdn-icons-png.flaticon.com/512/201/201602.png" class="menu-icon">
            <div class="menu-info"><span class="menu-title">새 교육 등록하기</span><span class="menu-desc">오늘의 교육 내용 게시</span></div>
        </div>
        <div class="menu-card" onclick="location.replace('admin_edu_list.html')">
            <img src="https://cdn-icons-png.flaticon.com/512/1041/1041916.png" class="menu-icon">
            <div class="menu-info"><span class="menu-title">등록된 교육 내역</span><span class="menu-desc">게시 중인 교육 관리 및 삭제</span></div>
        </div>
        <div class="section-title">📊 이수 현황</div>
        <div class="menu-card" onclick="location.replace('admin_edu_status.html')">
            <img src="https://cdn-icons-png.flaticon.com/512/3408/3408545.png" class="menu-icon">
            <div class="menu-info"><span class="menu-title">실시간 이수 현황</span><span class="menu-desc">팀원별 사인 내역 및 이수율 확인</span></div>
        </div>
    </div>

    <script>
        // 🚨 [보안] 관리자 메인 뒤로가기 절대 방지 로직
        (function() {
            // 1. 페이지 로드 시 및 뒤로가기 시 히스토리 스택 10중 도배
            function lockHistory() {
                for(let i = 0; i < 10; i++) {
                    window.history.pushState(null, null, window.location.href);
                }
            }

            // 초기 실행
            lockHistory();

            // 2. 뒤로가기 시 로그인창(index.html) 압송 차단
            window.onpopstate = function() {
                lockHistory();
                // 로그인 화면으로 돌아가는 대신 관리자 메인을 강제로 다시 로드(교체)
                window.location.replace('admin_main.html');
            };

            // 3. 화면 클릭/터치 시마다 방어막 무한 보충
            document.body.onclick = function() {
                lockHistory();
            };
        })();

        window.onload = function() {
            const dept = localStorage.getItem('userDept') || "경산승무팀";
            document.getElementById('deptBadge').innerText = dept;
        };
    </script>
</body>
</html>
