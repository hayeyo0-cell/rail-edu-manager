<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 모드 - 스마트 교육관리</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .admin-title { font-size: 1.1rem; font-weight: bold; color: #333; }
        
        /* 메뉴 카드 그리드 */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .menu-card { background: white; padding: 18px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; cursor: pointer; border: none; }
        .menu-card .icon { font-size: 1.8rem; margin-bottom: 8px; display: block; }
        .menu-card span { font-weight: bold; font-size: 0.9rem; color: #333; }

        /* 하단 목록 스타일 */
        h3 { font-size: 1rem; color: #555; margin-bottom: 12px; display: flex; align-items: center; }
        .edu-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .edu-info div { font-weight: bold; font-size: 1rem; color: #333; margin-bottom: 4px; }
        .edu-info span { font-size: 0.8rem; color: #888; }
        .btn-del { background: #ff7675; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
        
        .empty-msg { text-align: center; color: #999; font-size: 0.9rem; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="admin-title" id="admin-info">관리자 모드</div>
        <button onclick="location.href='index.html'" style="background:none; border:none; color:#666; font-weight:bold; cursor:pointer;">로그아웃</button>
    </div>

    <div class="menu-grid">
        <div class="menu-card" onclick="location.href='admin_edu_add.html'">
            <span class="icon">📝</span>
            <span>교육 등록</span>
        </div>
        <div class="menu-card" onclick="location.href='admin_setting.html'">
            <span class="icon">⚙️</span>
            <span>시스템 설정</span>
        </div>
    </div>

    <h3>📋 등록된 교육 관리</h3>
    <div id="admin-edu-list">
        </div>

    <script>
        const adminTeam = localStorage.getItem("loginAdmin");
        if(!adminTeam) { location.href = "index.html"; }
        document.getElementById("admin-info").innerText = `${adminTeam} 사업소 관리자`;

        function loadAdminEduList() {
            const eduList = JSON.parse(localStorage.getItem(`eduList_${adminTeam}`)) || [];
            const container = document.getElementById("admin-edu-list");
            
            if(eduList.length === 0) {
                container.innerHTML = "<p class='empty-msg'>등록된 교육이 없습니다.</p>";
                return;
            }

            container.innerHTML = eduList.map((edu, index) => `
                <div class="edu-item">
                    <div class="edu-info">
                        <div>${edu.title}</div>
                        <span>~ ${edu.date} (${edu.type === 'online' ? '게시' : '대면'})</span>
                    </div>
                    <button class="btn-del" onclick="deleteEdu(${index})">삭제</button>
                </div>
            `).join('');
        }

        function deleteEdu(index) {
            if(confirm("이 교육을 삭제하시겠습니까?")) {
                let eduList = JSON.parse(localStorage.getItem(`eduList_${adminTeam}`)) || [];
                eduList.splice(index, 1);
                localStorage.setItem(`eduList_${adminTeam}`, JSON.stringify(eduList));
                loadAdminEduList();
            }
        }

        loadAdminEduList();
    </script>
</body>
</html>
