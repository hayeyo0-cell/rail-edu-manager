<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 관리자 메인</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f4f6f9; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; }

        /* [핵심 수정] 버튼 클릭 간격을 확보한 헤더 구조 */
        .header { 
            width: 100%; 
            background: white; 
            padding: 15px 0; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 1px solid #eee;
            position: sticky; top: 0; z-index: 1000;
        }

        /* 로고: 중앙 배치하되 버튼 클릭을 방해하지 않도록 설정 */
        .header-logo-wrap {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none; /* [중요] 로고 박스가 버튼 터치를 방해하지 않음 */
        }
        .header-logo { 
            height: 36px; 
            pointer-events: auto; /* 로고 자체는 클릭 가능(필요시) */
        }

        /* 양옆 버튼: 클릭 영역 확실히 확보 */
        .header-btn { 
            background: #fdfdfd; 
            border: 1px solid #eaeaea; 
            padding: 5px 10px; 
            border-radius: 6px; 
            font-size: 0.68rem; 
            color: #888; 
            cursor: pointer;
            margin: 0 12px;
            z-index: 1001; /* 버튼을 로고보다 위로 올림 */
            position: relative;
        }
        .header-btn:active { background: #eee; }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; text-align: center; }
        
        .dept-tag { 
            background: var(--dtro-blue); color: white; 
            padding: 9px 22px; border-radius: 25px; 
            display: inline-block; font-weight: bold; font-size: 0.9rem;
            margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,114,188,0.2);
        }

        .section-title { 
            font-size: 0.95rem; font-weight: bold; color: var(--dtro-blue); 
            margin: 20px 0 12px 5px; border-left: 4px solid var(--dtro-blue); 
            padding-left: 10px; text-align: left;
        }

        .menu-card { 
            background: white; border-radius: 20px; padding: 22px; margin-bottom: 15px; 
            display: flex; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.04);
            cursor: pointer; transition: 0.2s;
        }
        .menu-card:active { transform: scale(0.97); background: #fafafa; }
        .menu-icon { font-size: 2.2rem; margin-right: 18px; }
        .menu-info { text-align: left; }
        .menu-name { font-size: 1rem; font-weight: bold; color: #333; margin-bottom: 4px; }
        .menu-desc { font-size: 0.78rem; color: #888; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="header">
        <button class="header-btn" onclick="location.href='admin_settings.html'">관리자 설정</button>
        
        <div class="header-logo-wrap">
            <img src="logo.png" class="header-logo" alt="DTRO">
        </div>
        
        <button class="header-btn" onclick="location.href='index.html'">로그아웃</button>
    </div>

    <div class="container">
        <div class="dept-tag">경산승무팀</div>

        <div class="section-title">교육 관리</div>
        <div class="menu-card" onclick="location.href='admin_edu_add.html'">
            <div class="menu-icon">✍️</div>
            <div class="menu-info">
                <div class="menu-name">새 교육 등록하기</div>
                <div class="menu-desc">오늘의 교육 내용 및 지시사항을 게시합니다.</div>
            </div>
        </div>

        <div class="menu-card" onclick="location.href='admin_edu_list.html'">
            <div class="menu-icon">📂</div>
            <div class="menu-info">
                <div class="menu-name">등록된 교육 내역</div>
                <div class="menu-desc">게시 중인 교육을 수정하거나 삭제 관리합니다.</div>
            </div>
        </div>

        <div class="section-title">이수 현황 및 소통</div>
        <div class="menu-card" onclick="location.href='admin_status.html'">
            <div class="menu-icon">📊</div>
            <div class="menu-info">
                <div class="menu-name">실시간 이수 현황</div>
                <div class="menu-desc">현재 12명 완료 / 45명 미이수 상세 보기</div>
            </div>
        </div>

        <div class="menu-card" onclick="location.href='admin_notice.html'">
            <div class="menu-icon">📢</div>
            <div class="menu-info">
                <div class="menu-name">공지사항 관리</div>
                <div class="menu-desc">팀 내 긴급 공지 및 주요 전달사항을 게시합니다.</div>
            </div>
        </div>
    </div>

</body>
</html>
