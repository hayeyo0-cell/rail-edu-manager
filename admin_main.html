<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관리자 메인 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f4f6f9; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { height: 35px; }
        .menu-card { width: 100%; max-width: 400px; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; }
        .menu-icon { font-size: 2rem; margin-right: 20px; }
        .menu-text { font-weight: bold; font-size: 1.1rem; color: #333; }
        .dept-info { font-size: 0.9rem; color: var(--dtro-blue); font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" class="logo">
        <button onclick="localStorage.clear(); location.href='index.html';" style="border:none; background:none; color:#999; font-size:0.8rem;">로그아웃</button>
    </div>

    <div style="width:100%; max-width:400px; text-align:left;">
        <div id="deptDisplay" class="dept-info">소속 정보 불러오는 중...</div>
        <h2 style="margin-top:0;">관리자 모드</h2>
    </div>

    <div class="menu-card" onclick="location.href='admin_user_list.html'">
        <span class="menu-icon">👥</span>
        <span class="menu-text">팀원 명단 관리</span>
    </div>

    <div class="menu-card" onclick="location.href='admin_edu_add.html'">
        <span class="menu-icon">📢</span>
        <span class="menu-text">교육 자료 등록</span>
    </div>

    <div class="menu-card" onclick="location.href='admin_status.html'">
        <span class="menu-icon">📊</span>
        <span class="menu-text">교육 이수 현황</span>
    </div>

    <script>
        window.onload = function() {
            const dept = localStorage.getItem('userDept') || "미지정";
            document.getElementById('deptDisplay').innerText = "📍 " + dept;
        };
    </script>
</body>
</html>
