<div id="admin-settings" style="background:#f8f9fa; padding:20px; border-radius:15px; margin-top:20px;">
    <h3>⚙️ 시스템 설정 (관리자 전용)</h3>
    
    <div style="margin-bottom:20px;">
        <label>팀 공용 비번 변경:</label>
        <input type="number" id="newTeamPw" placeholder="새 공용 비번" style="width:100px;">
        <button onclick="updateTeamPw()" style="background:#0072bc; color:white; border:none; padding:5px 10px; border-radius:5px;">변경</button>
    </div>

    <hr>

    <div>
        <p style="color:red; font-size:0.8rem;">* 담당자를 변경하면 현재 관리자 권한이 즉시 삭제됩니다.</p>
        <button onclick="resetAdmin()" style="background:#dc3545; color:white; border:none; padding:10px; border-radius:10px; width:100%; font-weight:bold;">⚠️ 담당자 변경 (권한 초기화)</button>
    </div>
</div>

<script>
    // 공용 비번 업데이트
    function updateTeamPw() {
        const newPw = document.getElementById('newTeamPw').value;
        if(newPw.length > 0) {
            localStorage.setItem("teamPassword", newPw);
            alert("팀 공용 비밀번호가 [" + newPw + "](으)로 변경되었습니다.");
        }
    }

    // 담당자 권한 파기 (이전 관리자 삭제 후 마스터 모드로 복구)
    function resetAdmin() {
        if(confirm("정말로 관리자 권한을 파기하시겠습니까?\n이후에는 다시 마스터 비번으로 접속해야 합니다.")) {
            localStorage.removeItem("assignedAdmin"); // 관리자 정보 삭제
            alert("권한이 파기되었습니다. 메인 화면으로 이동합니다.");
            location.href = "index.html";
        }
    }
</script>
