<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관리자 홈 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --dtro-sky: #f4f9ff; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }

        /* 상단 헤더 - 설정 및 로그아웃 포함 */
        .header { 
            width: 100%; background: white; padding: 12px 0; 
            display: flex; align-items: center; justify-content: space-between; 
            border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; 
        }
        .header-left { width: 80px; } /* 밸런스용 */
        .slim-logo { height: 32px; vertical-align: middle; }
        .header-right { width: 80px; display: flex; gap: 10px; justify-content: flex-end; padding-right: 15px; }
        
        .icon-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #555; }

        .container { width: 92%; max-width: 500px; margin: 20px auto; }
        
        /* 상단 소속 정보 표시 */
        .admin-tag { text-align: center; margin-bottom: 20px; }
        .admin-tag span { background: var(--dtro-blue); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }

        /* 본문 메뉴 카드 */
        .menu-card { 
            background: white; border-radius: 20px; padding: 25px 20px; 
            margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            display: flex; align-items: center; cursor: pointer; transition: 0.2s;
        }
        .menu-card:active { transform: scale(0.97); background: #fafafa; }
        .menu-icon { font-size: 2rem; margin-right: 20px; }
        .menu-text { text-align: left; }
        .menu-title { font-size: 1.1rem; font-weight: bold; color: #333; margin-bottom: 4px; }
        .menu-desc { font-size: 0.8rem; color: #888; }

        /* 설정 모달 스타일 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; }
        .modal-title { font-weight: bold; margin-bottom: 20px; font-size: 1.1rem; color: #333; text-align: center; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-blue { width: 100%; padding: 12px; background: var(--dtro-blue); color: white; border: none; border-radius: 10px; font-weight: bold; margin-bottom: 10px; }
        .btn-reset { width: 100%; background: none; border: none; color: #dc3545; text-decoration: underline; font-size: 0.8rem; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left"></div>
        <img src="logo.png" class="slim-logo">
        <div class="header-right">
            <button class="icon-btn" onclick="openSettings()">⚙️</button>
            <button class="icon-btn" onclick="if(confirm('로그아웃 하시겠습니까?')) location.href='index.html'">🚪</button>
        </div>
    </div>

    <div class="container">
        <div class="admin-tag">
            <span id="adminTeamDisplay">소속: 확인 중...</span>
        </div>

        <div class="menu-card" onclick="location.href='admin_edu_add.html'">
            <div class="menu-icon">📝</div>
            <div class="menu-text">
                <div class="menu-title">새 교육 등록하기</div>
                <div class="menu-desc">지시사항 및 교육 내용을 게시합니다.</div>
            </div>
        </div>

        <div class="menu-card" onclick="location.href='admin_status.html'">
            <div class="menu-icon">📊</div>
            <div class="menu-text">
                <div class="menu-title">오늘의 교육 이수 현황</div>
                <div class="menu-desc">현재까지 12명 완료 / 45명 미이수</div>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">관리자 설정</div>
            
            <div class="input-group">
                <label style="font-size:0.8rem; color:#666;">팀 공용 비밀번호 변경</label>
                <input type="number" id="newTeamPw" placeholder="새 비번 입력" inputmode="numeric">
            </div>
            <button class="btn-blue" onclick="updatePw()">비밀번호 즉시 변경</button>
            
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
            
            <button class="btn-reset" onclick="resetAdmin()">담당자 변경 (권한 초기화)</button>
            <button onclick="closeSettings()" style="width:100%; border:none; background:none; color:#999; margin-top:20px;">닫기</button>
        </div>
    </div>

    <script>
        const admin = JSON.parse(localStorage.getItem("assignedAdmin"));
        if(!admin) location.replace("index.html");
        else document.getElementById('adminTeamDisplay').innerText = "소속: " + admin.team + " (사번: " + admin.id + ")";

        function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

        function updatePw() {
            const pw = document.getElementById('newTeamPw').value;
            if(pw) { 
                localStorage.setItem("teamPassword", pw); 
                alert("비밀번호가 변경되었습니다."); 
                closeSettings();
            }
        }

        function resetAdmin() {
            if(confirm("권한을 초기화할까요?")) { 
                localStorage.removeItem("assignedAdmin"); 
                location.href="index.html"; 
            }
        }
    </script>
</body>
</html>
