<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 관리자 메인</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-gray); }
        body { font-family: 'Noto Sans KR', sans-serif; display: flex; flex-direction: column; align-items: center; }

        .top-header-section {
            width: 100%; background: white; padding: 12px 0;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100;
        }
        .header-btn {
            background: white; border: 1px solid #eaeaea; border-radius: 6px;
            padding: 6px 10px; font-size: 0.65rem; color: #a0a0a0; cursor: pointer; margin: 0 15px;
        }
        .brand-logo { height: 32px; mix-blend-mode: multiply; object-fit: contain; }

        .main-container { width: 100%; display: flex; flex-direction: column; align-items: center; padding-top: 30px; padding-bottom: 40px; }

        .dept-capsule {
            background: var(--dtro-blue); color: white; border-radius: 50px;
            padding: 6px 20px; font-weight: bold; font-size: 0.9rem;
            box-shadow: 0 3px 10px rgba(0,114,188,0.2); margin-bottom: 10px;
        }

        .welcome-msg { font-size: 1rem; font-weight: bold; color: #333; margin-bottom: 22px; text-align: center; }
        .welcome-msg span { color: var(--dtro-blue); }

        .section-wrap { width: 90%; max-width: 400px; text-align: left; margin-bottom: 15px; }
        .section-title { 
            font-size: 1.15rem; font-weight: bold; color: var(--dtro-blue); 
            border-left: 5px solid var(--dtro-blue); padding-left: 12px;
        }

        .menu-card {
            width: 90%; max-width: 400px; background: white; border-radius: 20px;
            padding: 22px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex; align-items: center; margin-bottom: 16px;
            cursor: pointer; box-sizing: border-box; border: 1px solid #fcfcfc;
        }
        .card-icon { width: 50px; height: 50px; margin-right: 18px; object-fit: contain; }
        .card-info { text-align: left; flex: 1; }
        .card-title { font-size: 1.1rem; font-weight: bold; color: #222; margin-bottom: 6px; display: block; }
        .card-desc { font-size: 0.85rem; color: #999; line-height: 1.4; word-break: keep-all; }
    </style>
</head>
<body>

    <div class="top-header-section">
        <button class="header-btn" onclick="location.href='admin_settings.html'">관리자 설정</button>
        <img src="logo.png" class="brand-logo" alt="대구교통공사 DTRO">
        <button class="header-btn" onclick="location.href='index.html'">로그아웃</button>
    </div>

    <div class="main-container">
        <div class="dept-capsule" id="deptDisplay">경산승무팀</div>
        <div class="welcome-msg">
            <span id="welcomeDept">경산승무팀</span> 관리자님 환영합니다
        </div>

        <div class="section-wrap">
            <span class="section-title">교육 관리</span>
        </div>

        <div class="menu-card" onclick="location.href='Admin_edu_add.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/3209/3209250.png" class="card-icon" alt="새 교육 등록">
            <div class="card-info">
                <span class="card-title">새 교육 등록하기</span>
                <span class="card-desc">오늘의 교육 내용 및 지시사항을 게시합니다.</span>
            </div>
        </div>

        <div class="menu-card" onclick="location.href='admin_edu_list.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/2991/2991112.png" class="card-icon" alt="교육 내역">
            <div class="card-info">
                <span class="card-title">등록된 교육 내역</span>
                <span class="card-desc">게시 중인 교육을 수정하거나 삭제 관리합니다.</span>
            </div>
        </div>

        <div class="section-wrap" style="margin-top: 10px;">
            <span class="section-title">이수 현황 및 소통</span>
        </div>

        <div class="menu-card" onclick="location.href='admin_stats.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/3412/3412862.png" class="card-icon" alt="이수 현황">
            <div class="card-info">
                <span class="card-title">실시간 이수 현황</span>
                <span class="card-desc">현재 12명 완료 / 45명 미이수 상세 보기</span>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const savedDept = localStorage.getItem('adminDept');
            if (savedDept) {
                document.getElementById('deptDisplay').innerText = savedDept;
                document.getElementById('welcomeDept').innerText = savedDept;
            }
        };
    </script>
</body>
</html>
