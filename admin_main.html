<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTRO 관리자 모드</title>
    <style>
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f4f7f9; }
        .top-nav { background: #0072bc; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-group { display: flex; gap: 8px; }
        .btn { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        .btn-set { background: #ff9f43; color: white; }
        .btn-logout { background: #fff; color: #0072bc; }
        .content-area { flex: 1; background: white; }
        iframe { width: 100%; height: 100%; border: none; }
        #setupModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index: 100; }
        .modal-card { background:white; padding:25px; border-radius:15px; width:85%; max-width:320px; }
        .modal-card input { width:100%; padding:12px; margin:8px 0; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; }
    </style>
</head>
<body>
    <div class="top-nav">
        <strong>DTRO 관리자</strong>
        <div class="btn-group">
            <button class="btn btn-set" onclick="openSetup()">담당자 지정</button>
            <button class="btn btn-logout" onclick="confirmLogout()">로그아웃</button>
        </div>
    </div>
    <div class="content-area">
        <iframe src="https://docs.google.com/spreadsheets/d/1xARA_iuT6bGnxD91X2V-ODFlcfw6oaiwYZNwltyEqk8/edit?usp=sharing"></iframe>
    </div>

    <div id="setupModal">
        <div class="modal-card">
            <h3 style="margin-top:0;">교육담당자 변경</h3>
            <p style="font-size:0.85rem; color:#666;">새로운 담당자 사번을 입력하세요.</p>
            <input type="number" id="newAdminId" placeholder="새 담당자 사번">
            <button class="btn btn-set" style="width:100%; margin-top:10px; padding:15px;" onclick="saveAdmin()">설정 저장</button>
            <button class="btn" style="width:100%; margin-top:8px; background:#eee;" onclick="closeSetup()">취소</button>
        </div>
    </div>

    <script>
        function openSetup() { document.getElementById('setupModal').style.display = 'flex'; }
        function closeSetup() { document.getElementById('setupModal').style.display = 'none'; }
        function saveAdmin() {
            const id = document.getElementById('newAdminId').value;
            if(!id) { alert("사번을 입력하세요."); return; }
            localStorage.setItem("assignedAdmin", JSON.stringify({id: id}));
            alert("담당자가 사번 [" + id + "]님으로 변경되었습니다.");
            closeSetup();
        }
        function confirmLogout() {
            if(confirm("관리자 모드를 종료하시겠습니까?")) {
                window.location.replace("index.html");
            }
        }
    </script>
</body>
</html>
