<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교육 진행 중</title>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; background: #f4f9ff; text-align: center; }
        .header { background: #0072bc; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .btn-logout { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.5); color: white; padding: 5px 12px; border-radius: 5px; font-size: 0.8rem; cursor: pointer; }
        .content-area { padding: 30px 20px; min-height: 250px; background: white; margin: 15px; border-radius: 20px; border: 2px dashed #0072bc; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #timer { font-size: 3.5rem; font-weight: bold; color: #e74c3c; margin: 20px 0; }
        #sign-area { display: none; padding: 20px; background: white; margin: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        canvas { border: 2px solid #ddd; background: #fff; border-radius: 15px; width: 100%; max-width: 320px; height: 180px; touch-action: none; }
        .btn-submit { padding: 20px; background: #0072bc; color: white; border: none; border-radius: 15px; font-size: 1.2rem; font-weight: bold; width: 100%; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <span id="eduTitle">학습 진행 중</span>
        <button class="btn-logout" onclick="confirmLogout()">로그아웃</button>
    </div>
    <div class="content-area">
        <p style="font-size: 1.2rem; margin: 0;">🚂 <b>전동차 시뮬레이션 학습 중</b></p>
        <p style="font-size:0.9rem; color:#666; margin-top:10px;">교안의 내용을 충분히 숙지하시기 바랍니다.</p>
        <div id="timer">10:00</div>
    </div>
    <div id="sign-area">
        <h3 style="color:#0072bc; margin-bottom:15px;">자필 서명</h3>
        <canvas id="signature-pad"></canvas>
        <button class="btn-submit" onclick="submitData()">이수 완료 및 서명 전송</button>
    </div>

    <script>
        // 뒤로가기 완벽 차단 로직
        history.pushState(null, null, location.href);
        window.onpopstate = function() {
            history.pushState(null, null, location.href);
            alert("학습 중에는 뒤로가기를 할 수 없습니다. 로그아웃 버튼을 이용해 주세요.");
        };

        let timeLeft = 600; 
        const user = JSON.parse(localStorage.getItem("loginUser"));
        if(user) document.getElementById('eduTitle').innerText = user.name + "님";

        const timerInterval = setInterval(() => {
            timeLeft--;
            let min = Math.floor(timeLeft / 60);
            let sec = timeLeft % 60;
            document.getElementById('timer').innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('timer').style.display = 'none';
                document.getElementById('sign-area').style.display = 'block';
            }
        }, 1000);

        const canvas = document.getElementById('signature-pad');
        const signaturePad = new SignaturePad(canvas);

        function confirmLogout() {
            if(confirm("학습을 중단하고 로그아웃하시겠습니까?")) {
                window.onpopstate = null; // 뒤로가기 방지 해제
                localStorage.removeItem("loginUser");
                location.replace("index.html"); // 기록 삭제하며 이동
            }
        }

        function submitData() {
            if (signaturePad.isEmpty()) { alert("서명을 해주세요."); return; }
            const signData = signaturePad.toDataURL();
            const url = "https://script.google.com/macros/s/AKfycbyq6y8W3K_fXy7vI-VInH4vWfT7Qo8Z8J0vJ8Z8J0v/exec";
            fetch(url, {
                method: 'POST',
                mode: 'no-cors',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: user.id, name: user.name, time: 10, sign: signData})
            }).then(() => {
                alert("이수 완료!");
                window.onpopstate = null;
                location.replace("index.html");
            });
        }
    </script>
</body>
</html>
