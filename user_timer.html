<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교육 진행 중</title>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; background: #f4f4f4; text-align: center; }
        .header { background: #0072bc; color: white; padding: 15px; font-weight: bold; }
        .content-area { padding: 20px; min-height: 200px; background: white; margin: 10px; border-radius: 10px; border: 2px dashed #0072bc; }
        #timer { font-size: 2.5rem; font-weight: bold; color: #e74c3c; margin: 20px 0; }
        #sign-area { display: none; padding: 20px; }
        canvas { border: 2px solid #333; background: #fff; border-radius: 10px; width: 100%; max-width: 300px; height: 150px; }
        .btn { padding: 15px 30px; border-radius: 10px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .btn-submit { background: #0072bc; color: white; width: 100%; }
    </style>
</head>
<body>
    <div class="header" id="eduTitle">교육 로딩 중...</div>
    <div class="content-area">
        <p>🚂 <b>시뮬레이션 교육 중입니다.</b></p>
        <p style="font-size:0.9rem; color:#666;">내용을 충분히 숙지하신 후 서명해 주세요.</p>
        <div id="timer">10:00</div>
    </div>

    <div id="sign-area">
        <h3>자필 서명</h3>
        <canvas id="signature-pad"></canvas><br><br>
        <button class="btn btn-submit" onclick="submitData()">이수 완료 및 서명 제출</button>
    </div>

    <script>
        let timeLeft = 600; // 10분 설정
        const user = JSON.parse(localStorage.getItem("loginUser"));
        document.getElementById('eduTitle').innerText = user.name + " 기관사님 교육 중";

        const timerInterval = setInterval(() => {
            timeLeft--;
            let min = Math.floor(timeLeft / 60);
            let sec = timeLeft % 60;
            document.getElementById('timer').innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('timer').style.display = 'none';
                document.getElementById('sign-area').style.display = 'block';
            }
        }, 1000);

        const canvas = document.getElementById('signature-pad');
        const signaturePad = new SignaturePad(canvas);

        function submitData() {
            if (signaturePad.isEmpty()) { alert("서명을 해주세요."); return; }
            const signData = signaturePad.toDataURL();
            
            // 여기에 기관사님의 구글 웹앱 URL을 넣으세요
            const url = "https://script.google.com/macros/s/여기에_배포URL_입력/exec";
            
            fetch(url, {
                method: 'POST',
                mode: 'no-cors',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    id: user.id,
                    name: user.name,
                    time: 10,
                    sign: signData
                })
            }).then(() => {
                alert("이수 처리가 완료되었습니다!");
                location.href = "index.html";
            });
        }
    </script>
</body>
</html>
