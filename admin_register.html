<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관리자 등록 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --dtro-sky: #f4f9ff; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--dtro-sky); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; width: 90%; max-width: 400px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--dtro-blue); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:var(--dtro-blue);">관리자 사번/비번 지정</h2>
        <input type="number" id="regId" placeholder="관리자 사번 (8자리)" inputmode="numeric">
        <input type="password" id="regPw" placeholder="관리자 개인 비밀번호" inputmode="numeric">
        <button class="btn" onclick="save()">등록 완료</button>
    </div>
    <script>
        function save() {
            const id = document.getElementById('regId').value;
            const pw = document.getElementById('regPw').value;
            if(id.length === 8 && pw !== "") {
                localStorage.setItem("assignedAdmin", JSON.stringify({id: id, pw: pw}));
                alert("관리자 등록 완료! 이제 개인 사번으로 로그인하세요.");
                location.href = "index.html";
            } else { alert("정보를 정확히 입력하세요."); }
        }
    </script>
</body>
</html>
