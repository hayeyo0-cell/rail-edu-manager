<script>
    function registerAdmin() {
        const id = document.getElementById('regId').value;
        const pw = document.getElementById('regPw').value;
        if(id.length === 8 && pw.length > 0) {
            const adminData = { id: id, pw: pw };
            localStorage.setItem("assignedAdmin", JSON.stringify(adminData));
            alert("관리자 등록 완료! 이제 관리자 사번으로 로그인하세요.");
            location.href = "index.html";
        } else {
            alert("사번 8자리와 비밀번호를 입력하세요.");
        }
    }
</script>
