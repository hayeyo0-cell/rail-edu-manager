<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교육 상세 내용 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* 상단 헤더 */
        .top-nav { width: 100%; background: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-bottom: 1px solid #eee; }
        .nav-btn { background: white; border: 1px solid #eaeaea; border-radius: 8px; padding: 8px 15px; font-size: 0.85rem; color: #555; cursor: pointer; font-weight: bold; }
        .brand-logo { height: 24px; object-fit: contain; }

        .container { width: 92%; max-width: 420px; padding: 20px 0; padding-bottom: 100px; }

        /* 게시 내용 카드 */
        .content-card { background: white; border-radius: 25px; padding: 25px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); text-align: left; }
        .edu-type-badge { display: inline-block; padding: 4px 10px; background: #eef6ff; color: var(--dtro-blue); border-radius: 8px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; }
        .edu-title { font-size: 1.3rem; font-weight: bold; color: #333; margin-bottom: 15px; line-height: 1.4; display: block; }
        .edu-content-text { font-size: 1rem; color: #555; line-height: 1.7; white-space: pre-wrap; margin-bottom: 20px; }

        /* 🚨 첨부파일(이미지) 영역 스타일 */
        .attachment-area { border-top: 1px dashed #eee; padding-top: 20px; margin-top: 10px; }
        .attach-label { font-size: 0.9rem; font-weight: bold; color: #333; margin-bottom: 10px; display: block; }
        .img-viewer { width: 100%; border-radius: 15px; border: 1px solid #eee; display: none; margin-top: 10px; }

        /* 서명 섹션 */
        .signature-section { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); text-align: left; }
        .sig-title { font-size: 1.1rem; font-weight: bold; color: #333; margin-bottom: 15px; display: flex; align-items: center; }
        .sig-canvas-area { width: 100%; height: 200px; background: #fafafa; border: 2px dashed #ddd; border-radius: 15px; position: relative; touch-action: none; }
        canvas { width: 100%; height: 100%; cursor: crosshair; }

        /* 하단 버튼 */
        .bottom-bar { position: fixed; bottom: 0; width: 100%; max-width: 420px; background: white; padding: 15px; box-sizing: border-box; border-top: 1px solid #eee; }
        .submit-btn { width: 100%; padding: 18px; background: var(--dtro-blue); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="nav-btn" onclick="location.href='user_main.html'">← 메인으로</button>
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <div style="width:75px;"></div>
    </div>

    <div class="container">
        <div class="content-card">
            <span id="displayType" class="edu-type-badge">게시교육</span>
            <span id="displayTitle" class="edu-title">교육 제목</span>
            <div id="displayContent" class="edu-content-text">교육 내용을 불러오는 중...</div>

            <div id="attachBox" class="attachment-area">
                <span class="attach-label">📎 첨부된 참조 파일</span>
                <img id="eduImage" src="" class="img-viewer">
                <p id="noAttach" style="font-size: 0.85rem; color: #bbb;">첨부된 파일이 없습니다.</p>
            </div>
        </div>

        <div class="signature-section">
            <div class="sig-title">✒️ 본인 확인 서명</div>
            <div class="sig-canvas-area">
                <canvas id="sigCanvas"></canvas>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="submit-btn" onclick="submitEducation()">✅ 서명 완료 및 제출</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const eduId = urlParams.get('id');
        const loginId = localStorage.getItem('currentUserId');

        window.onload = function() {
            loadEduDetail();
            initCanvas();
        };

        function loadEduDetail() {
            const totalEduList = JSON.parse(localStorage.getItem('totalEduList')) || [];
            const edu = totalEduList.find(item => String(item.id) === String(eduId));

            if (edu) {
                document.getElementById('displayType').innerText = edu.type || "게시교육";
                document.getElementById('displayTitle').innerText = edu.title;
                document.getElementById('displayContent').innerText = edu.content;
                
                // 🚨 첨부파일(이미지) 데이터가 있다면 표시
                const imgElement = document.getElementById('eduImage');
                const noAttach = document.getElementById('noAttach');
                
                if (edu.fileData) {
                    imgElement.src = edu.fileData;
                    imgElement.style.display = 'block';
                    noAttach.style.display = 'none';
                }
            }
        }

        // 서명 패드 설정
        let canvas, ctx, drawing = false;
        function initCanvas() {
            canvas = document.getElementById('sigCanvas');
            ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.strokeStyle = "#222"; ctx.lineWidth = 3; ctx.lineCap = "round";
            canvas.addEventListener("touchstart", (e) => { drawing = true; ctx.beginPath(); });
            canvas.addEventListener("touchend", () => { drawing = false; });
            canvas.addEventListener("touchmove", (e) => {
                if(!drawing) return;
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
                ctx.stroke();
                e.preventDefault();
            });
        }

        function submitEducation() {
            if(!confirm("서명을 제출하시겠습니까?")) return;
            let signData = JSON.parse(localStorage.getItem('signData')) || [];
            let completedEduList = JSON.parse(localStorage.getItem('completedEduList')) || [];
            const newRecord = {
                eduId: eduId,
                userId: loginId,
                completedDate: new Date().toLocaleDateString()
            };
            if(!signData.some(s => s.eduId === eduId && s.userId === loginId)) {
                signData.push(newRecord);
                completedEduList.push(newRecord);
                localStorage.setItem('signData', JSON.stringify(signData));
                localStorage.setItem('completedEduList', JSON.stringify(completedEduList));
            }
            alert("제출 완료되었습니다.");
            location.href = 'user_main.html';
        }
    </script>
</body>
</html>
