<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta id="viewportMeta" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교육 상세 - DTRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .top-nav { width: 100%; background: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; box-sizing: border-box; }
        .nav-btn { background: white; border: 1px solid #eaeaea; border-radius: 8px; padding: 8px 15px; font-size: 0.85rem; color: #555; cursor: pointer; font-weight: bold; }
        .brand-logo { height: 42px; object-fit: contain; }
        .container { width: 92%; max-width: 420px; padding: 25px 0; padding-bottom: 120px; }
        .content-card { background: white; border-radius: 25px; padding: 25px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); text-align: left; }
        .edu-badge { display: inline-block; padding: 4px 10px; background: #eef6ff; color: var(--dtro-blue); border-radius: 8px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; }
        .edu-title { font-size: 1.3rem; font-weight: bold; color: #333; margin-bottom: 15px; display: block; }
        .edu-content { font-size: 1rem; color: #555; line-height: 1.7; white-space: pre-wrap; margin-bottom: 25px; }
        
        .file-section { border-top: 1px dashed #eee; padding-top: 20px; }
        .file-label { font-size: 1rem; font-weight: bold; color: #333; margin-bottom: 5px; display: block; }
        .click-hint { font-size: 0.85rem; color: var(--dtro-blue); font-weight: bold; margin-bottom: 15px; display: block; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        
        /* 🚨 터치할 수 있게 스타일 수정 */
        .img-preview { width: 100%; border-radius: 15px; border: 1px solid #eee; display: none; margin-bottom: 15px; cursor: pointer; }
        #pdfWrapper { width: 100%; border-radius: 15px; border: 1px solid #eee; display: none; margin-bottom: 15px; overflow: hidden; background: #fafafa; cursor: pointer; }
        #pdfCanvas { width: 100%; height: auto; }

        .sig-card { display: none; background: white; border-radius: 25px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); text-align: left; }
        .sig-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .clear-btn { background: #f1f1f1; border: 1px solid #ddd; padding: 5px 12px; border-radius: 8px; font-size: 0.8rem; color: #666; cursor: pointer; font-weight: bold; }
        .sig-canvas-area { width: 100%; height: 200px; background: #fafafa; border: 2px dashed #ddd; border-radius: 15px; touch-action: none; }
        canvas { width: 100%; height: 100%; }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; max-width: 420px; background: white; padding: 15px; box-sizing: border-box; border-top: 1px solid #eee; }
        .submit-btn { width: 100%; padding: 18px; background: var(--dtro-blue); color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        /* 🚨 전체화면 확대 모달 스타일 */
        .zoom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; overflow: auto; text-align: center; }
        .modal-close { position: fixed; top: 15px; right: 15px; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.5); border-radius: 8px; padding: 8px 20px; font-size: 1rem; font-weight: bold; cursor: pointer; z-index: 100000; }
        .zoom-hint { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; z-index: 100000; pointer-events: none; white-space: nowrap; }
        #zoomImg { width: 100%; height: auto; margin: auto; display: block; margin-top: 60px; margin-bottom: 60px; }
    </style>
</head>
<body>

    <div id="zoomModal" class="zoom-modal">
        <button class="modal-close" onclick="closeZoom()">✕ 닫기</button>
        <div class="zoom-hint">👆 두 손가락으로 화면을 확대할 수 있습니다</div>
        <img id="zoomImg" src="">
    </div>

    <div class="top-nav">
        <button class="nav-btn" onclick="goMain()">← 메인으로</button>
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <div style="width:75px;"></div>
    </div>
    
    <div class="container" id="mainContainer">
        <div class="content-card">
            <span id="displayType" class="edu-badge">게시교육</span>
            <span id="displayTitle" class="edu-title">제목</span>
            <div id="displayContent" class="edu-content">내용을 불러오는 중...</div>
            <div class="file-section">
                <span class="file-label">📎 첨부 파일 학습 (다운로드 불가)</span>
                <span class="click-hint" id="clickHint" style="display:none;">🔍 이미지를 터치하면 크게 확대하여 볼 수 있습니다</span>
                
                <img id="imageViewer" class="img-preview" oncontextmenu="return false;" onclick="openZoom('image')">
                <div id="pdfWrapper" onclick="openZoom('pdf')"><canvas id="pdfCanvas"></canvas></div>
                <p id="noFileText" style="color:#ccc; font-size:0.9rem; text-align:center;">첨부된 파일이 없습니다.</p>
            </div>
        </div>

        <div class="sig-card" id="sigCardArea">
            <div class="sig-header">
                <p style="font-weight:bold; margin:0;">✒️ 본인 확인 서명</p>
                <button class="clear-btn" onclick="clearCanvas()">🔄 다시 쓰기</button>
            </div>
            <div class="sig-canvas-area"><canvas id="sigCanvas"></canvas></div>
        </div>
    </div>
    
    <div class="bottom-bar" id="bottomBar">
        <button class="submit-btn" id="mainSubmitBtn" onclick="submitEdu()">✅ 학습 완료 (이수)</button>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const urlParams = new URLSearchParams(window.location.search);
        const eduId = urlParams.get('id');
        const isReviewMode = urlParams.get('review') === 'true'; 
        let isSignatureRequired = false;

        function goMain() { window.location.replace('user_main.html'); }

        (function() {
            for(let i = 0; i < 10; i++) window.history.pushState(null, null, window.location.href);
            window.onpopstate = function() { 
                // 줌 모달이 열려있을 때 뒤로가기를 누르면 모달만 닫기
                if(document.getElementById('zoomModal').style.display === 'block') {
                    closeZoom();
                    window.history.pushState(null, null, window.location.href);
                } else {
                    goMain(); 
                }
            };
        })();

        window.onload = function() {
            const list = JSON.parse(localStorage.getItem('totalEduList')) || [];
            const edu = list.find(e => String(e.id) === String(eduId));
            
            if(edu) {
                document.getElementById('displayTitle').innerText = edu.title;
                document.getElementById('displayContent').innerText = edu.content;
                document.getElementById('displayType').innerText = edu.category || edu.type || "일반교육";
                
                if(isReviewMode || edu.signatureType === "오프라인") {
                    document.getElementById('bottomBar').style.display = 'none'; 
                    document.getElementById('sigCardArea').style.display = 'none'; 
                    document.getElementById('mainContainer').style.paddingBottom = '30px';
                } 
                else if(edu.signatureType === "서명 필요" || edu.signatureType === "필요") {
                    isSignatureRequired = true;
                    document.getElementById('sigCardArea').style.display = 'block';
                    document.getElementById('mainSubmitBtn').innerText = "✅ 서명 완료 및 제출";
                    initCanvas();
                }

                if(edu.fileData) {
                    document.getElementById('noFileText').style.display = 'none';
                    document.getElementById('clickHint').style.display = 'block'; // 🚨 안내문구 띄우기

                    if(edu.fileData.startsWith('data:image/')) {
                        const img = document.getElementById('imageViewer');
                        img.src = edu.fileData;
                        img.style.display = 'block';
                    } else if(edu.fileData.startsWith('data:application/pdf')) {
                        renderPDF(edu.fileData);
                    }
                }
            }
        };

        async function renderPDF(dataUrl) {
            try {
                const loadingTask = pdfjsLib.getDocument(dataUrl);
                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1); 
                
                const canvas = document.getElementById('pdfCanvas');
                const context = canvas.getContext('2d');
                const viewport = page.getViewport({ scale: 2.0 }); 

                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = { canvasContext: context, viewport: viewport };
                await page.render(renderContext).promise;
                document.getElementById('pdfWrapper').style.display = 'block';
            } catch (e) {
                console.error("PDF 렌더링 실패:", e);
                document.getElementById('noFileText').innerText = "PDF 미리보기를 불러올 수 없습니다.";
                document.getElementById('noFileText').style.display = 'block';
                document.getElementById('clickHint').style.display = 'none';
            }
        }

        // 🚨 전체화면 확대 열기 로직
        function openZoom(type) {
            const modal = document.getElementById('zoomModal');
            const zoomImg = document.getElementById('zoomImg');
            
            if (type === 'image') {
                zoomImg.src = document.getElementById('imageViewer').src;
            } else if (type === 'pdf') {
                // PDF 캔버스를 고화질 이미지로 변환해서 확대창에 띄움
                zoomImg.src = document.getElementById('pdfCanvas').toDataURL('image/png');
            }
            
            modal.style.display = 'block';
            
            // 🚨 화면 확대 잠금 해제 (최대 5배 줌 허용)
            document.getElementById('viewportMeta').setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes');
        }

        // 🚨 전체화면 확대 닫기 로직
        function closeZoom() {
            document.getElementById('zoomModal').style.display = 'none';
            
            // 🚨 화면 확대 다시 잠금 (앱 레이아웃 깨짐 방지)
            document.getElementById('viewportMeta').setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no');
        }

        let canvas, ctx, drawing = false;
        function initCanvas() {
            canvas = document.getElementById('sigCanvas'); ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            ctx.strokeStyle = "#222"; ctx.lineWidth = 3; ctx.lineCap = "round";
            canvas.addEventListener("touchstart", (e) => { drawing = true; ctx.beginPath(); e.preventDefault(); });
            canvas.addEventListener("touchend", () => { drawing = false; });
            canvas.addEventListener("touchmove", (e) => {
                if(!drawing) return;
                const touch = e.touches[0]; const rect = canvas.getBoundingClientRect();
                ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top); ctx.stroke();
                e.preventDefault();
            }, { passive: false });
        }

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.beginPath(); }

        function submitEdu() {
            if(!confirm("이수를 완료하시겠습니까?")) return;
            const signatureData = isSignatureRequired ? canvas.toDataURL() : "N/A"; 
            
            const sendData = { id: localStorage.getItem('currentUserId'), name: localStorage.getItem('currentUserName'), title: document.getElementById('displayTitle').innerText, signature: signatureData, date: new Date().toLocaleString() };
            fetch('https://script.google.com/macros/s/AKfycbyAcZ0CvItLoKpsQP8ie6MSz7OMK-fkW90MU1ZiuIQTPIN5jtAbRDkqoJQWxYLBOqf0/exec', { method: 'POST', mode: 'no-cors', cache: 'no-cache', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(sendData) })
            .then(() => {
                let completed = JSON.parse(localStorage.getItem('completedEduList')) || [];
                completed.push({ eduId: eduId, userId: localStorage.getItem('currentUserId'), completedDate: new Date().toLocaleDateString() });
                localStorage.setItem('completedEduList', JSON.stringify(completed));
                
                alert("이수가 완료되었습니다.");
                window.location.replace('user_main.html');
            })
            .catch(() => alert("전송 실패"));
        }
    </script>
</body>
</html>
