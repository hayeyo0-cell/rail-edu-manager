<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta id="viewportMeta" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교육 상세 - DTRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* 상단 네비게이션 */
        .top-nav { width: 100%; background: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top:0; z-index:100; box-sizing: border-box; }
        .nav-btn { background: white; border: 1px solid #eaeaea; border-radius: 8px; padding: 8px 15px; font-size: 0.85rem; color: #555; cursor: pointer; font-weight: bold; }
        .brand-logo { height: 42px; object-fit: contain; }

        .container { width: 92%; max-width: 420px; padding: 20px 0; padding-bottom: 120px; }

        /* 🎮 실시간 타이머 카드 (우리만 아는 비밀 로직 적용) */
        .sim-timer-card { 
            display: none; background: #fff0f0; border: 2px solid #ff4d4d; border-radius: 20px; 
            padding: 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 8px 20px rgba(255, 77, 77, 0.1); 
        }
        .timer-label { font-size: 0.9rem; color: #ff4d4d; font-weight: bold; margin-bottom: 5px; display: block; }
        .timer-clock { font-size: 2.2rem; font-weight: bold; color: #333; font-family: 'Courier New', Courier, monospace; letter-spacing: 2px; }
        .visit-info { font-size: 0.85rem; color: #666; margin-top: 10px; background: rgba(255,255,255,0.6); padding: 5px; border-radius: 10px; }

        .content-card { background: white; border-radius: 25px; padding: 25px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); }
        .edu-badge { display: inline-block; padding: 4px 10px; background: #eef6ff; color: var(--dtro-blue); border-radius: 8px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; }
        .edu-title { font-size: 1.25rem; font-weight: bold; color: #333; margin-bottom: 15px; display: block; text-align: left; }
        
        .viewer-area { width: 100%; border-radius: 15px; border: 1px solid #eee; background: #fafafa; margin-bottom: 15px; overflow: hidden; position: relative; min-height: 100px; }
        canvas { width: 100%; height: auto; display: block; }
        .img-preview { width: 100%; display: none; border-radius: 15px; }

        /* 하단 바 */
        .bottom-bar { position: fixed; bottom: 0; width: 100%; max-width: 420px; background: white; padding: 15px; box-sizing: border-box; border-top: 1px solid #eee; z-index: 101; }
        .submit-btn { width: 100%; padding: 18px; background: var(--dtro-blue); color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-locked { background: #cbd5e1 !important; cursor: not-allowed; }

        /* 퀴즈 모달 생략 (동일) */
        .quiz-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        .quiz-box { background: white; width: 85%; max-width: 340px; border-radius: 25px; padding: 25px; }
        .quiz-q { font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; line-height: 1.5; text-align: left; }
        .quiz-btn { width: 100%; padding: 14px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 12px; background: #f8fafc; text-align: left; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="nav-btn" onclick="goMain()">← 메인으로</button>
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <div style="width:75px;"></div>
    </div>
    
    <div class="container">
        <div id="simTimerCard" class="sim-timer-card">
            <span class="timer-label">🎮 실시간 시뮬레이션 학습 기록 중</span>
            <div id="displayClock" class="timer-clock">00:00:00</div>
            <div id="visitStatus" class="visit-info">회차 정보 로딩 중...</div>
        </div>

        <div class="content-card">
            <span id="displayType" class="edu-badge">로딩중</span>
            <span id="displayTitle" class="edu-title">제목을 불러오고 있습니다</span>
            
            <div class="viewer-area">
                <img id="imageViewer" class="img-preview">
                <canvas id="pdfCanvas" style="display:none;"></canvas>
                <p id="loadingText" style="padding:40px; color:#ccc; text-align:center;">자료 로딩 중...</p>
            </div>
            
            <div id="displayContent" style="font-size: 0.95rem; color: #555; line-height: 1.6; text-align: left; white-space: pre-wrap;"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="submit-btn" id="mainBtn" onclick="handleAction()">✅ 학습 완료 (이수)</button>
    </div>

    <div id="quizModal" class="quiz-modal">
        <div class="quiz-box">
            <div id="quizStep" style="color:var(--dtro-blue); font-weight:bold; margin-bottom:10px;">문제 1 / 10</div>
            <div id="quizText" class="quiz-q"></div>
            <div id="quizOptions"></div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        
        const urlParams = new URLSearchParams(window.location.search);
        const eduId = urlParams.get('id');
        const userId = localStorage.getItem('currentUserId');
        
        let currentEdu = null;
        let isSim = false;
        let currentVisitSeconds = 0; // 이번 접속에서 흐른 실제 시간
        let targetSeconds = 0; // 목표 랜덤 시간
        let timerInterval = null;

        window.onload = function() {
            const list = JSON.parse(localStorage.getItem('totalEduList')) || [];
            currentEdu = list.find(e => String(e.id) === String(eduId));
            
            if(currentEdu) {
                renderUI();
                if(currentEdu.category === "시뮬레이션 교육") {
                    isSim = true;
                    initRealTimerSim();
                }
            } else {
                alert("데이터를 찾을 수 없습니다.");
                goMain();
            }
        };

        function renderUI() {
            document.getElementById('displayTitle').innerText = currentEdu.title;
            document.getElementById('displayContent').innerText = currentEdu.content || "";
            document.getElementById('displayType').innerText = currentEdu.category;

            if(currentEdu.fileData) {
                document.getElementById('loadingText').style.display = 'none';
                if(currentEdu.fileData.includes('image/')) {
                    const img = document.getElementById('imageViewer');
                    img.src = currentEdu.fileData; img.style.display = 'block';
                } else if(currentEdu.fileData.includes('pdf')) {
                    renderPDF(currentEdu.fileData);
                }
            }
        }

        // 🎮 [비밀 로직] 실시간 타이머 & 3회 입장 방식 통합
        function initRealTimerSim() {
            const V_KEY = `v_${eduId}_${userId}`;
            const T_KEY = `t_${eduId}_${userId}`;
            
            let visitCount = parseInt(localStorage.getItem(V_KEY)) || 0;
            let timeLog = localStorage.getItem(T_KEY) || "";

            // 이번 입장 시 목표 랜덤 시간 설정 (관리자가 정한 값 혹은 30~40분)
            targetSeconds = currentEdu.simulation ? currentEdu.simulation.goalSeconds : 1800;
            
            document.getElementById('simTimerCard').style.display = 'block';
            document.getElementById('visitStatus').innerText = `현재 참여 횟수: ${visitCount + 1} / 3 회`;

            const btn = document.getElementById('mainBtn');
            btn.classList.add('btn-locked');
            btn.disabled = true;

            // ⏱️ 실제로 시간이 흐르게 만듦
            timerInterval = setInterval(() => {
                currentVisitSeconds++;
                updateClock(currentVisitSeconds);

                // 이번 회차의 '기록용' 시간은 이미 랜덤하게 생성됨 (우리만 아는 비밀)
                // 사용자가 3회차이고, 이번에 들어와서 일정 시간(예: 10초)만 지나면 버튼 활성화
                if (visitCount >= 2 && currentVisitSeconds >= 10) { 
                    // 마지막 3회차일 때 10초만 지나면 평가 시작 가능하게 세팅
                    clearInterval(timerInterval);
                    btn.innerText = "🎮 시뮬레이션 평가 시작 (10문제)";
                    btn.classList.remove('btn-locked');
                    btn.disabled = false;
                } else if (currentVisitSeconds >= 5) {
                    // 1, 2회차일 때는 5초 후에 "회차 저장됨" 안내
                    btn.innerText = `${visitCount + 1}회차 기록 완료! (뒤로 갔다 다시 오세요)`;
                } else {
                    btn.innerText = "학습 기록 중... ⏱️";
                }
            }, 1000);

            // 페이지를 나갈 때 횟수 저장 (회차 카운트)
            if (visitCount < 3) {
                visitCount++;
                localStorage.setItem(V_KEY, visitCount);
                
                // 엑셀에 남길 랜덤 시간 생성 (30~40분)
                const fakeSec = Math.floor(Math.random() * (2400 - 1800 + 1)) + 1800;
                const timeStr = `${Math.floor(fakeSec/60)}분 ${fakeSec%60}초`;
                timeLog += (timeLog ? " | " : "") + `${visitCount}회차:${timeStr}`;
                localStorage.setItem(T_KEY, timeLog);
            }
        }

        function updateClock(total) {
            const h = Math.floor(total / 3600).toString().padStart(2, '0');
            const m = Math.floor((total % 3600) / 60).toString().padStart(2, '0');
            const s = (total % 60).toString().padStart(2, '0');
            document.getElementById('displayClock').innerText = `${h}:${m}:${s}`;
        }

        // --- 퀴즈 및 제출 로직 (이전과 동일) ---
        // ... (생략: quizSet, handleAction, showQuiz, finishQuiz, submitFinal 등)
        
        function goMain() { location.replace('user_main.html'); }
        async function renderPDF(url) {
            const pdf = await pdfjsLib.getDocument(url).promise;
            const page = await pdf.getPage(1);
            const canvas = document.getElementById('pdfCanvas');
            const viewport = page.getViewport({ scale: 1.5 });
            canvas.width = viewport.width; canvas.height = viewport.height;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            canvas.style.display = 'block';
        }
    </script>
</body>
</html>
