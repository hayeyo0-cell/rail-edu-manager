<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta id="viewportMeta" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교육 상세 - DTRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg-gray); margin:0; display:flex; flex-direction:column; align-items:center; }
        
        .top-nav { 
            width: 100%; background: white; padding: 0 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #eee; position: sticky; top:0; z-index: 1000; 
            box-sizing: border-box; height: 65px; 
        }
        .nav-btn { min-width: 80px; background: white; border: 1px solid #eaeaea; border-radius: 8px; padding: 8px 10px; font-size: 0.85rem; font-weight: bold; cursor: pointer; }
        .brand-logo { height: 42px !important; width: auto !important; }
        .nav-spacer { width: 80px; }

        .container { width: 92%; max-width: 420px; padding: 15px 0 180px 0; }
        .content-card { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); margin-bottom: 20px; }
        
        .viewer-area { width: 100%; max-height: 250px; border-radius: 15px; border: 1px solid #eee; background: #fafafa; margin-bottom: 15px; overflow: hidden; position: relative; }
        canvas, .img-preview { width: 100%; height: auto; display: none; border-radius: 12px; }
        
        .signature-section { 
            background: white; border-radius: 25px; padding: 20px; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05); border: 2px solid var(--dtro-blue);
            margin-top: 10px;
        }
        .sig-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .sig-title { font-weight: bold; color: var(--dtro-blue); font-size: 1.1rem; }
        
        #sigPad { 
            background: #f9f9f9; border: 1px solid #ddd; border-radius: 15px; 
            width: 100%; height: 200px;
            touch-action: none;
            display: block;
        }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; max-width: 420px; background: white; padding: 15px; border-top: 1px solid #eee; box-sizing: border-box; z-index: 1001; }
        .submit-btn { width: 100%; padding: 18px; background: var(--dtro-blue); color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        /* 🚫 이수 완료 후 버튼 스타일 */
        .submit-btn:disabled { background: #bbb; cursor: default; }
        .clear-btn { background: #f1f1f1; border: none; padding: 5px 12px; border-radius: 6px; font-size: 0.8rem; color: #666; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="nav-btn" onclick="location.replace('user_main.html')">← 뒤로</button>
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <div class="nav-spacer"></div>
    </div>
    
    <div class="container">
        <div class="content-card">
            <h3 id="displayTitle" style="margin:0 0 10px 0;">교육 제목</h3>
            <div class="viewer-area">
                <img id="imageViewer" class="img-preview">
                <canvas id="pdfCanvas"></canvas>
            </div>
            <div id="displayContent" style="font-size: 0.95rem; color: #555; line-height: 1.6; white-space: pre-wrap;"></div>
        </div>

        <div id="sigSection" class="signature-section" style="display:none;">
            <div class="sig-header">
                <span class="sig-title">🖋️ 본인 서명</span>
                <button class="clear-btn" onclick="clearSig()">지우기</button>
            </div>
            <canvas id="sigPad"></canvas>
            <p style="font-size: 0.8rem; color: #999; margin-top: 8px; text-align: center;">위 영역에 이름을 정자로 적어주세요.</p>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="submit-btn" id="mainBtn" onclick="handleFinalAction()">✅ 학습 완료 (이수)</button>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        const urlParams = new URLSearchParams(window.location.search);
        const eduId = urlParams.get('id');
        let currentEdu = null;
        let sigCanvas, sigCtx, drawing = false;

        window.onload = function() {
            const list = JSON.parse(localStorage.getItem('totalEduList')) || [];
            currentEdu = list.find(e => String(e.id) === String(eduId));
            
            if(currentEdu) {
                document.getElementById('displayTitle').innerText = currentEdu.title;
                document.getElementById('displayContent').innerText = currentEdu.content;
                
                if(currentEdu.fileData) {
                    if(currentEdu.fileData.includes('image/')) {
                        const img = document.getElementById('imageViewer'); img.src = currentEdu.fileData; img.style.display = 'block';
                    } else if(currentEdu.fileData.includes('pdf')) { renderPDF(currentEdu.fileData); }
                }

                // 🔍 [수정 핵심] 이수 여부 확인 로직
                const userId = localStorage.getItem('currentUserId');
                const completedList = JSON.parse(localStorage.getItem('completedEduList')) || [];
                // 해당 유저가 이 교육을 이미 이수했는지 확인
                const isAlreadyDone = completedList.some(c => String(c.eduId) === String(eduId) && String(c.userId) === String(userId));

                if(isAlreadyDone) {
                    // 1. 이미 이수했다면 서명란 숨기기
                    document.getElementById('sigSection').style.display = 'none';
                    // 2. 하단 버튼 상태 변경 (클릭 불가)
                    const mainBtn = document.getElementById('mainBtn');
                    mainBtn.innerText = "✅ 이수 완료된 교육입니다";
                    mainBtn.disabled = true;
                } else {
                    // 미이수 상태이고 서명이 필요한 경우에만 서명란 노출
                    if(currentEdu.signatureType === "전자서명") {
                        document.getElementById('sigSection').style.display = 'block';
                        document.getElementById('mainBtn').innerText = "🖋️ 서명 후 이수 완료";
                        setTimeout(initSigPad, 300);
                    }
                }
            }
        };

        function initSigPad() {
            sigCanvas = document.getElementById('sigPad');
            if(!sigCanvas) return;
            sigCtx = sigCanvas.getContext('2d');
            const rect = sigCanvas.getBoundingClientRect();
            sigCanvas.width = rect.width;
            sigCanvas.height = 200;
            sigCtx.lineWidth = 4;
            sigCtx.lineCap = 'round';
            sigCtx.strokeStyle = '#000';

            const getPos = (e) => {
                const r = sigCanvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - r.left, y: clientY - r.top };
            };

            const start = (e) => { if(e.target === sigCanvas) e.preventDefault(); drawing = true; const p = getPos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x, p.y); };
            const move = (e) => { if(!drawing) return; if(e.target === sigCanvas) e.preventDefault(); const p = getPos(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); };
            const stop = () => { drawing = false; };

            sigCanvas.addEventListener('touchstart', start, { passive: false });
            sigCanvas.addEventListener('touchmove', move, { passive: false });
            sigCanvas.addEventListener('touchend', stop);
            sigCanvas.addEventListener('mousedown', start);
            sigCanvas.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);
        }

        function clearSig() { if(sigCtx) sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height); }

        function handleFinalAction() {
            if(currentEdu.signatureType === "전자서명") {
                const blank = document.createElement('canvas');
                blank.width = sigCanvas.width; blank.height = sigCanvas.height;
                if(sigCanvas.toDataURL() === blank.toDataURL()) {
                    alert("서명란에 성함을 적어주세요.");
                    return;
                }
            }
            if(confirm("이수를 완료하시겠습니까?")) {
                const completed = JSON.parse(localStorage.getItem('completedEduList')) || [];
                completed.push({ 
                    eduId, 
                    userId: localStorage.getItem('currentUserId'), 
                    completedDate: new Date().toLocaleString(),
                    signature: currentEdu.signatureType === "전자서명" ? sigCanvas.toDataURL() : null
                });
                localStorage.setItem('completedEduList', JSON.stringify(completed));
                alert("이수가 완료되었습니다.");
                // ✅ 이수 후 즉시 화면을 갱신해서 서명란을 숨깁니다.
                location.reload();
            }
        }

        async function renderPDF(url) {
            const pdf = await pdfjsLib.getDocument(url).promise;
            const page = await pdf.getPage(1);
            const canvas = document.getElementById('pdfCanvas');
            const viewport = page.getViewport({ scale: 2.0 });
            canvas.width = viewport.width; canvas.height = viewport.height;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            canvas.style.display = 'block';
        }
    </script>
</body>
</html>
