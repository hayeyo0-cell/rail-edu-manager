<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교육 상세</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .top-nav { width: 100%; background: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .container { width: 92%; max-width: 420px; padding: 20px 0; padding-bottom: 100px; }
        .card { background: white; border-radius: 25px; padding: 25px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); }
        .sig-area { width: 100%; height: 200px; background: #fafafa; border: 2px dashed #ddd; border-radius: 15px; touch-action: none; }
        .bottom-bar { position: fixed; bottom: 0; width: 100%; max-width: 420px; background: white; padding: 15px; border-top: 1px solid #eee; }
        .submit-btn { width: 100%; padding: 18px; background: var(--dtro-blue); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="top-nav"><button onclick="location.href='user_main.html'" style="border:1px solid #ddd; background:white; padding:5px 10px; border-radius:5px;">← 메인으로</button><img src="logo.png" style="height:22px;"><div style="width:60px;"></div></div>
    <div class="container">
        <div class="card">
            <div id="dType" style="color:var(--dtro-blue); font-weight:bold; font-size:0.8rem;">분류</div>
            <div id="dTitle" style="font-weight:bold; font-size:1.2rem; margin:10px 0;">제목</div>
            <div id="dContent" style="white-space:pre-wrap; color:#555; line-height:1.6; margin-bottom:20px;">내용</div>
            <img id="dImg" style="width:100%; border-radius:10px; display:none; border:1px solid #eee;">
        </div>
        <div class="card">
            <p style="font-weight:bold; margin-bottom:10px;">✒️ 본인 확인 서명</p>
            <div class="sig-area"><canvas id="sigCanvas"></canvas></div>
        </div>
    </div>
    <div class="bottom-bar"><button class="submit-btn" onclick="submitEdu()">✅ 서명 완료 및 제출</button></div>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        window.onload = function() {
            const edu = (JSON.parse(localStorage.getItem('totalEduList')) || []).find(e => String(e.id) === String(id));
            if(edu) {
                document.getElementById('dType').innerText = edu.type;
                document.getElementById('dTitle').innerText = edu.title;
                document.getElementById('dContent').innerText = edu.content;
                if(edu.fileData) { const img = document.getElementById('dImg'); img.src = edu.fileData; img.style.display = 'block'; }
            }
            initCanvas();
        };
        let canvas, ctx, drawing = false;
        function initCanvas() {
            canvas = document.getElementById('sigCanvas'); ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            ctx.strokeStyle = "#222"; ctx.lineWidth = 3; ctx.lineCap = "round";
            canvas.addEventListener("touchstart", (e) => { drawing = true; ctx.beginPath(); e.preventDefault(); });
            canvas.addEventListener("touchend", () => { drawing = false; });
            canvas.addEventListener("touchmove", (e) => {
                if(!drawing) return;
                const t = e.touches[0]; const r = canvas.getBoundingClientRect();
                ctx.lineTo(t.clientX - r.left, t.clientY - r.top); ctx.stroke(); e.preventDefault();
            });
        }
        function submitEdu() {
            if(!confirm("제출하시겠습니까?")) return;
            const signData = JSON.parse(localStorage.getItem('signData')) || [];
            signData.push({ eduId: id, userId: localStorage.getItem('currentUserId'), date: new Date().toLocaleDateString() });
            localStorage.setItem('signData', JSON.stringify(signData));
            alert("완료되었습니다."); location.href = 'user_main.html';
        }
    </script>
</body>
</html>
