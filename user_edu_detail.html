<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta id="viewportMeta" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교육 상세 - DTRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .top-nav { width: 100%; background: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top:0; z-index:100; box-sizing: border-box; }
        .nav-btn { background: white; border: 1px solid #eaeaea; border-radius: 8px; padding: 8px 15px; font-size: 0.85rem; color: #555; cursor: pointer; font-weight: bold; }
        .brand-logo { height: 42px; object-fit: contain; }
        .container { width: 92%; max-width: 420px; padding: 20px 0; padding-bottom: 120px; }

        /* 🎮 시뮬레이션 카드 (철저히 학습 중인 것처럼 위장) */
        .sim-timer-card { display: none; background: #fff0f0; border: 2px solid #ff4d4d; border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 8px 20px rgba(255, 77, 77, 0.1); }
        .timer-clock { font-size: 2.2rem; font-weight: bold; color: #333; font-family: 'Courier New', monospace; letter-spacing: 2px; }
        
        .content-card { background: white; border-radius: 25px; padding: 25px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); }
        .edu-badge { display: inline-block; padding: 4px 10px; background: #eef6ff; color: var(--dtro-blue); border-radius: 8px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; }
        .edu-title { font-size: 1.25rem; font-weight: bold; color: #333; margin-bottom: 15px; display: block; text-align: left; }
        
        .viewer-area { width: 100%; border-radius: 15px; border: 1px solid #eee; background: #fafafa; margin-bottom: 15px; overflow: hidden; min-height: 50px; }
        canvas { width: 100%; height: auto; display: none; }
        .img-preview { width: 100%; display: none; border-radius: 15px; }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; max-width: 420px; background: white; padding: 15px; box-sizing: border-box; border-top: 1px solid #eee; z-index: 101; }
        .submit-btn { width: 100%; padding: 18px; background: var(--dtro-blue); color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-locked { background: #cbd5e1 !important; cursor: not-allowed; }

        .quiz-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        .quiz-box { background: white; width: 85%; max-width: 340px; border-radius: 25px; padding: 25px; }
        .quiz-btn { width: 100%; padding: 14px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 12px; background: #f8fafc; text-align: left; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="nav-btn" onclick="goMain()">← 메인으로</button>
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <div style="width:75px;"></div>
    </div>
    
    <div class="container">
        <div id="simTimerCard" class="sim-timer-card">
            <span id="simLabel" style="font-weight:bold; color:#ff4d4d;">🎮 학습시간 기록 중...</span>
            <div id="displayClock" class="timer-clock">00:00:00</div>
            <div id="visitStatus" style="font-size:0.85rem; color:#666; margin-top:10px;">데이터 연결 중...</div>
        </div>

        <div class="content-card">
            <span id="displayType" class="edu-badge">분류</span>
            <span id="displayTitle" class="edu-title">제목</span>
            <div class="viewer-area">
                <img id="imageViewer" class="img-preview">
                <canvas id="pdfCanvas"></canvas>
                <p id="loadingText" style="padding:20px; color:#ccc; text-align:center;">자료를 불러오는 중...</p>
            </div>
            <div id="displayContent" style="font-size: 0.95rem; color: #555; line-height: 1.6; white-space: pre-wrap;"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="submit-btn" id="mainBtn" onclick="handleAction()">✅ 학습 완료 (이수)</button>
    </div>

    <div id="quizModal" class="quiz-modal">
        <div class="quiz-box">
            <div id="quizStep" style="color:var(--dtro-blue); font-weight:bold; margin-bottom:10px;">문제 1 / 10</div>
            <div id="quizText" style="font-weight:bold; margin-bottom:20px; text-align:left;"></div>
            <div id="quizOptions"></div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        
        const urlParams = new URLSearchParams(window.location.search);
        const eduId = urlParams.get('id');
        const userId = localStorage.getItem('currentUserId');
        
        let currentEdu = null;
        let isSim = false;
        let elapsed = 0;
        let timerInterval = null;

        window.onload = function() {
            const list = JSON.parse(localStorage.getItem('totalEduList')) || [];
            currentEdu = list.find(e => String(e.id) === String(eduId));
            
            if(currentEdu) {
                // 1. UI 텍스트 셋팅
                document.getElementById('displayTitle').innerText = currentEdu.title;
                document.getElementById('displayContent').innerText = currentEdu.content || "";
                document.getElementById('displayType').innerText = currentEdu.category;

                // 2. 자료 렌더링
                if(currentEdu.fileData) {
                    document.getElementById('loadingText').style.display = 'none';
                    if(currentEdu.fileData.includes('image/')) {
                        const img = document.getElementById('imageViewer');
                        img.src = currentEdu.fileData;
                        img.style.display = 'block';
                    } else if(currentEdu.fileData.includes('pdf')) {
                        renderPDF(currentEdu.fileData);
                    }
                }

                // 3. 시뮬레이션 판정 로직 강화
                // 관리자가 '시뮬레이션 교육'을 선택했거나 데이터에 simulation 설정이 있는 경우
                if(currentEdu.category === "시뮬레이션 교육" || (currentEdu.simulation && currentEdu.simulation.isSimulation)) {
                    isSim = true;
                    initSecretSim();
                }
            }
        };

        function initSecretSim() {
            const V_KEY = `v_${eduId}_${userId}`;
            const T_KEY = `t_${eduId}_${userId}`;
            
            let vCount = parseInt(localStorage.getItem(V_KEY)) || 0;
            let timeLog = localStorage.getItem(T_KEY) || "";

            document.getElementById('simTimerCard').style.display = 'block';
            document.getElementById('visitStatus').innerText = `학습 회차: ${Math.min(vCount + 1, 3)} / 3 회`;
            
            const btn = document.getElementById('mainBtn');
            btn.classList.add('btn-locked');
            btn.disabled = true;

            // 🚀 3회 이상 접속자라면 즉시 평가 모드로 위장
            if(vCount >= 3) {
                document.getElementById('simLabel').innerText = "✅ 학습시간 기록 완료";
                document.getElementById('displayClock').innerText = "학습 완료";
                btn.innerText = "🎮 시뮬레이션 평가 시작 (10문제)";
                btn.classList.remove('btn-locked');
                btn.disabled = false;
            } else {
                // 3회 미만일 때: 입장 시마다 랜덤 시간 몰래 기록
                vCount++;
                localStorage.setItem(V_KEY, vCount);
                
                // 30~40분 사이의 랜덤 초 생성
                const rSec = Math.floor(Math.random() * (2400 - 1800 + 1)) + 1800;
                timeLog += (timeLog ? " | " : "") + `${vCount}회차:${Math.floor(rSec/60)}분 ${rSec%60}초`;
                localStorage.setItem(T_KEY, timeLog);

                // ⏱️ 초시계 시작 (학습 중인 것처럼 보여주기)
                timerInterval = setInterval(() => {
                    elapsed++;
                    updateClock(elapsed);

                    if(vCount >= 3 && elapsed >= 10) { // 마지막 3회차일 때 10초 지나면 버튼 활성화
                        clearInterval(timerInterval);
                        btn.innerText = "🎮 시뮬레이션 평가 시작 (10문제)";
                        btn.classList.remove('btn-locked');
                        btn.disabled = false;
                    } else {
                        btn.innerText = "학습시간 기록 중...";
                    }
                }, 1000);
            }
        }

        function updateClock(s) {
            const m = Math.floor(s/60).toString().padStart(2,'0');
            const sec = (s%60).toString().padStart(2,'0');
            document.getElementById('displayClock').innerText = `00:${m}:${sec}`;
        }

        // --- 퀴즈 및 제출 로직 (내용 동일) ---
        const quizSet = [
            { q: "전동차 운행 중 비상제동이 체결되었을 때 가장 먼저 확인할 사항은?", a: ["객실 온도", "주공기 압력", "행선 안내기", "전동차 번호"], ans: 1 },
            { q: "이례상황 발생 시 관제 보고 요령으로 옳지 않은 것은?", a: ["신속하게 보고", "정확한 위치 설명", "개인적인 의견 위주 보고", "현재 상태 상세 전달"], ans: 2 },
            { q: "출입문 고장 시 조치 사항으로 옳은 것은?", a: ["무시하고 운행", "수동 폐쇄 후 감시원 승차", "승객에게 직접 조치 요청", "전체 출입문 개방 운행"], ans: 1 },
            { q: "터널 내 정지 시 승객 안내방송 핵심 내용은?", a: ["정지 사유 및 대기 안내", "운전실 상황 생중계", "무대응", "가족에게 연락 안내"], ans: 0 },
            { q: "근무 전 주류 섭취에 대한 규정은?", a: ["맥주 한잔은 허용", "절대 불가", "취하지 않으면 가능", "퇴근 직전만 가능"], ans: 1 },
            { q: "화재 발생 시 초기 진압 장비는?", a: ["청소도구", "휴대용 비상조명등", "소화기", "손수건"], ans: 2 },
            { q: "승강장 안전문 오작동 시 조치는?", a: ["임의 출발", "수동 개폐 확인 및 보고", "승객에게 밀어달라고 요청", "반대편 문 개방"], ans: 1 },
            { q: "교대 근무 시 인계사항이 아닌 것은?", a: ["차량 결함 유무", "당일 지시사항", "개인적인 취미 생활", "운행 주의 구간"], ans: 2 },
            { q: "비상 정지 버튼 작동 시 열차의 상태는?", a: ["속도 유지", "가속", "비상 제동 및 정지", "전원 차단만 됨"], ans: 2 },
            { q: "마지막 문항입니다. 시뮬레이션을 완료하시겠습니까?", a: ["예", "아니오"], ans: 0 }
        ];

        let qIdx = 0; let score = 0;
        function handleAction() {
            if(isSim) { document.getElementById('quizModal').style.display='flex'; showQuiz(); }
            else { submitFinal(); }
        }
        function showQuiz() {
            if(qIdx >= 10) { finishQuiz(); return; }
            const q = quizSet[qIdx];
            document.getElementById('quizStep').innerText = `문제 ${qIdx+1} / 10`;
            document.getElementById('quizText').innerText = q.q;
            document.getElementById('quizOptions').innerHTML = q.a.map((opt, i) => 
                `<button class="quiz-btn" onclick="ans(${i}, ${q.ans})">${i+1}. ${opt}</button>`
            ).join('');
        }
        function ans(i, c) { if(i===c) score+=10; qIdx++; showQuiz(); }
        function finishQuiz() {
            document.getElementById('quizModal').style.display='none';
            if(score>=60) { alert(`🎉 합격! (${score}점)\n기록을 전송합니다.`); submitFinal(); }
            else { alert("⚠️ 불합격! 다시 시도하세요."); location.reload(); }
        }

        function submitFinal() {
            const timeLog = localStorage.getItem(`t_${eduId}_${userId}`) || "일반이수";
            const payload = { id:userId, name:localStorage.getItem('currentUserName'), title:currentEdu.title, score:score||"N/A", time:timeLog, date:new Date().toLocaleString() };
            fetch('https://script.google.com/macros/s/AKfycbyAcZ0CvItLoKpsQP8ie6MSz7OMK-fkW90MU1ZiuIQTPIN5jtAbRDkqoJQWxYLBOqf0/exec', {method:'POST', mode:'no-cors', body:JSON.stringify(payload)})
            .then(() => {
                let done = JSON.parse(localStorage.getItem('completedEduList')) || [];
                done.push({eduId:eduId, userId:userId});
                localStorage.setItem('completedEduList', JSON.stringify(done));
                alert("이수가 완료되었습니다.");
                goMain();
            });
        }

        async function renderPDF(url) {
            const pdf = await pdfjsLib.getDocument(url).promise;
            const page = await pdf.getPage(1);
            const canvas = document.getElementById('pdfCanvas');
            const viewport = page.getViewport({ scale: 1.5 });
            canvas.width = viewport.width; canvas.height = viewport.height;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            canvas.style.display = 'block';
        }
        function goMain() { location.replace('user_main.html'); }
    </script>
</body>
</html>
