<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta id="viewportMeta" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교육 상세 - DTRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg-gray); margin:0; display:flex; flex-direction:column; align-items:center; }
        .top-nav { width: 100%; background: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top:0; z-index:100; box-sizing: border-box; }
        .nav-btn { background: white; border: 1px solid #eaeaea; border-radius: 6px; padding: 5px 12px; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
        .container { width: 92%; max-width: 420px; padding: 20px 0 130px 0; }
        .content-card { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); }
        .viewer-area { width: 100%; border-radius: 15px; border: 1px solid #eee; background: #fafafa; margin-bottom: 15px; overflow: hidden; cursor: zoom-in; position: relative; }
        canvas, .img-preview { width: 100%; height: auto; display: none; border-radius: 12px; }
        
        /* 🖋️ 서명 패드 스타일 */
        #signatureArea { display: none; background: #fdfdfd; border: 1px solid #ddd; border-radius: 15px; padding: 15px; margin-top: 20px; text-align: center; }
        #sigPad { background: #fff; border: 1px dashed #bbb; border-radius: 10px; width: 100%; height: 160px; touch-action: none; cursor: crosshair; }
        .sig-tools { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }

        /* 🖼️ 확대 모달 */
        .zoom-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index: 99999; justify-content:center; align-items:center; flex-direction:column; }
        .zoom-img { max-width:100%; max-height:100%; object-fit:contain; }
        .zoom-close { position:absolute; top:30px; right:30px; color:white; font-size:40px; font-weight:bold; cursor:pointer; }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; max-width: 420px; background: white; padding: 15px; border-top: 1px solid #eee; box-sizing: border-box; z-index: 101; }
        .submit-btn { width: 100%; padding: 16px; background: var(--dtro-blue); color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .btn-offline { background: #27ae60 !important; cursor: default; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="nav-btn" onclick="location.replace('user_main.html')">← 뒤로</button>
        <img src="logo.png" style="height:30px;">
        <div style="width:50px;"></div>
    </div>
    
    <div class="container">
        <div class="content-card">
            <h3 id="displayTitle" style="margin-top:0; font-size: 1.25rem;">교육 제목</h3>
            <div class="viewer-area" id="viewerArea">
                <img id="imageViewer" class="img-preview" onclick="openZoom(this.src)">
                <canvas id="pdfCanvas" onclick="openZoomCanvas()"></canvas>
                <div id="loadingText" style="padding:40px; color:#ccc; text-align:center;">자료 로딩 중...</div>
            </div>
            <div id="displayContent" style="font-size: 0.95rem; color: #555; line-height: 1.6; white-space: pre-wrap; margin-bottom: 10px;"></div>

            <div id="signatureArea">
                <div style="font-size: 0.85rem; color: #dtro-blue; font-weight: bold; margin-bottom: 8px; text-align: left;">🖋️ 본인 확인 서명</div>
                <canvas id="sigPad"></canvas>
                <div class="sig-tools">
                    <span style="font-size: 0.75rem; color: #999;">위 빈칸에 성명을 정자로 쓰세요.</span>
                    <button onclick="clearSig()" style="background:none; border:none; color:#ff4d4d; font-size:0.8rem; font-weight:bold; text-decoration:underline; cursor:pointer;">다시 쓰기</button>
                </div>
            </div>
        </div>
    </div>

    <div id="zoomModal" class="zoom-modal" onclick="closeZoom()">
        <span class="zoom-close">&times;</span>
        <img id="zoomContent" class="zoom-img">
        <div style="position:absolute; bottom:30px; color:#aaa; font-size:0.8rem;">터치하면 닫힙니다 (두 손가락 확대 가능)</div>
    </div>

    <div class="bottom-bar">
        <button class="submit-btn" id="mainBtn" onclick="handleFinalAction()">✅ 학습 완료 (이수)</button>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        const urlParams = new URLSearchParams(window.location.search);
        const eduId = urlParams.get('id');
        let currentEdu = null;

        // 서명 패드 변수
        let sigCanvas, sigCtx, drawing = false;

        window.onload = function() {
            const list = JSON.parse(localStorage.getItem('totalEduList')) || [];
            currentEdu = list.find(e => String(e.id) === String(eduId));
            
            if(currentEdu) {
                document.getElementById('displayTitle').innerText = currentEdu.title;
                document.getElementById('displayContent').innerText = currentEdu.content;
                
                // 자료 렌더링
                if(currentEdu.fileData) {
                    document.getElementById('loadingText').style.display = 'none';
                    if(currentEdu.fileData.includes('image/')) {
                        const img = document.getElementById('imageViewer');
                        img.src = currentEdu.fileData; img.style.display = 'block';
                    } else if(currentEdu.fileData.includes('pdf')) {
                        renderPDF(currentEdu.fileData);
                    }
                }

                // 🖋️ 서명 타입에 따른 UI 분기
                const btn = document.getElementById('mainBtn');
                if(currentEdu.signatureType === "전자서명") {
                    document.getElementById('signatureArea').style.display = 'block';
                    btn.innerText = "🖋️ 서명 후 이수 완료";
                    initSigPad();
                } else if(currentEdu.signatureType === "오프라인") {
                    btn.innerText = "📢 오프라인 교육 (내용 확인완료)";
                    btn.classList.add('btn-offline');
                }
            }
        };

        // 서명 패드 초기화 및 그리기 로직
        function initSigPad() {
            sigCanvas = document.getElementById('sigPad');
            sigCtx = sigCanvas.getContext('2d');
            
            // 해상도 조절
            sigCanvas.width = sigCanvas.offsetWidth;
            sigCanvas.height = sigCanvas.offsetHeight;

            const getPos = (e) => {
                const rect = sigCanvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const start = (e) => { drawing = true; const p = getPos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x, p.y); };
            const move = (e) => { if(!drawing) return; e.preventDefault(); const p = getPos(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); };
            const end = () => { drawing = false; };

            sigCtx.lineWidth = 3; sigCtx.lineCap = 'round'; sigCtx.strokeStyle = '#222';

            sigCanvas.addEventListener('mousedown', start);
            sigCanvas.addEventListener('mousemove', move);
            window.addEventListener('mouseup', end);
            sigCanvas.addEventListener('touchstart', start);
            sigCanvas.addEventListener('touchmove', move);
            sigCanvas.addEventListener('touchend', end);
        }

        function clearSig() { sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height); }

        // 최종 이수 버튼 클릭 시
        function handleFinalAction() {
            if(currentEdu.signatureType === "오프라인") {
                location.replace('user_main.html');
                return;
            }

            if(currentEdu.signatureType === "전자서명") {
                // 서명 여부 확인 (간단하게 데이터 존재 여부 확인)
                const blank = document.createElement('canvas');
                blank.width = sigCanvas.width; blank.height = sigCanvas.height;
                if(sigCanvas.toDataURL() === blank.toDataURL()) {
                    alert("하단 서명란에 본인 성명을 적어주세요.");
                    return;
                }
            }

            if(confirm("교육 이수를 완료하시겠습니까?")) {
                submitFinal();
            }
        }

        function submitFinal() {
            const userId = localStorage.getItem('currentUserId');
            const completed = JSON.parse(localStorage.getItem('completedEduList')) || [];
            
            completed.push({ 
                eduId: eduId, 
                userId: userId, 
                completedDate: new Date().toLocaleString(),
                signature: currentEdu.signatureType === "전자서명" ? sigCanvas.toDataURL() : null
            });
            
            localStorage.setItem('completedEduList', JSON.stringify(completed));
            
            // 구글 시트 전송 등 기존 API 연동이 있다면 여기서 실행
            alert("이수 처리가 완료되었습니다.");
            location.replace('user_main.html');
        }

        // --- 고화질 확대 로직 (기존 유지) ---
        function openZoom(src) {
            document.getElementById('zoomContent').src = src;
            document.getElementById('zoomModal').style.display = 'flex';
            document.getElementById('viewportMeta').content = "width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes";
        }
        function openZoomCanvas() { openZoom(document.getElementById('pdfCanvas').toDataURL("image/png")); }
        function closeZoom() {
            document.getElementById('zoomModal').style.display = 'none';
            document.getElementById('viewportMeta').content = "width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no";
        }
        async function renderPDF(url) {
            const pdf = await pdfjsLib.getDocument(url).promise;
            const page = await pdf.getPage(1);
            const canvas = document.getElementById('pdfCanvas');
            const viewport = page.getViewport({ scale: 2.0 });
            canvas.width = viewport.width; canvas.height = viewport.height;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            canvas.style.display = 'block';
        }
    </script>
</body>
</html>
