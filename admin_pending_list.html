<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>미이수자 관리 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fa; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* 🚨 상단 헤더: 패딩 및 로고 42px 통일 */
        .top-nav { 
            width: 100%; background: white; padding: 12px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-sizing: border-box; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100;
        }
        .back-btn { background: white; border: 1px solid #eaeaea; border-radius: 8px; padding: 8px 15px; font-size: 0.85rem; color: #555; cursor: pointer; font-weight: bold; }
        .brand-logo { height: 42px; object-fit: contain; }

        .container { width: 92%; max-width: 500px; padding: 20px 0; }
        .section-title { font-size: 1.2rem; font-weight: bold; color: #333; margin-bottom: 20px; text-align: left; width: 100%; }
        
        .section { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); }
        .edu-selector { 
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #eee; 
            margin-bottom: 20px; font-size: 1rem; background: #fafafa; outline: none; font-weight: bold; color: var(--dtro-blue);
        }
        
        .pending-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5px; border-bottom: 1px solid #f9f9f9; font-size: 1rem; 
        }
        .pending-item:last-child { border-bottom: none; }
        .badge-wait { background: #ff7675; color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; }
        .count-info { font-size: 0.9rem; color: #888; margin-bottom: 15px; display: block; font-weight: bold; }
    </style>
</head>
<body>
    <div class="top-nav">
        <button class="back-btn" onclick="location.replace('admin_main.html')">← 메인으로</button>
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <div style="width:75px;"></div>
    </div>

        <select id="edu-select" class="edu-selector" onchange="loadPendingList()"></select>
