<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>실시간 이수 현황 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* 헤더: 로고 강조 및 [← 메인으로] 버튼 고정 */
        .top-nav { 
            width: 100%; background: white; padding: 12px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-sizing: border-box; border-bottom: 1px solid #eee;
        }
        .nav-btn { 
            background: white; border: 1px solid #eaeaea; border-radius: 8px; 
            padding: 8px 15px; font-size: 0.85rem; color: #555; cursor: pointer; font-weight: bold;
        }
        .brand-logo { height: 26px; object-fit: contain; }

        .container { width: 92%; max-width: 420px; padding: 25px 0; }

        /* 카드 디자인: 기관사님 원본 스타일 */
        .status-card { 
            background: white; border-radius: 30px; padding: 25px 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); box-sizing: border-box; margin-bottom: 20px;
        }

        .card-title { 
            font-size: 1.3rem; font-weight: bold; color: var(--dtro-blue); 
            margin-bottom: 20px; display: block; text-align: left;
        }

        /* 이수율 요약 정보 */
        .summary-box {
            background: #f0f7ff; border-radius: 20px; padding: 20px;
            text-align: center; margin-bottom: 25px;
        }
        .summary-percent { font-size: 2.2rem; font-weight: bold; color: var(--dtro-blue); }
        .summary-label { font-size: 0.9rem; color: #666; margin-top: 5px; }

        /* 팀원 리스트 스타일 */
        .member-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5px; border-bottom: 1px solid #f2f2f2;
        }
        .member-info { text-align: left; }
        .member-name { font-weight: bold; font-size: 1rem; color: #333; }
        .member-id { font-size: 0.8rem; color: #999; }
        
        .status-badge {
            padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold;
        }
        .done { background: #eef9f1; color: #2ecc71; } /* 이수 완료 */
        .yet { background: #fff5f5; color: #ff4d4d; }  /* 미이수 */
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="nav-btn" onclick="location.href='admin_main.html'">← 메인으로</button>
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <div style="width:75px;"></div>
    </div>

    <div class="container">
        <div class="status-card">
            <span class="card-title">📊 실시간 이수 현황</span>
            
            <div id="summaryArea" class="summary-box">
                <div id="percentText" class="summary-percent">0%</div>
                <div class="summary-label">현재 우리 팀 전체 이수율</div>
            </div>

            <div id="listArea">
                </div>
        </div>
    </div>

    <script>
        const myDept = localStorage.getItem('userDept') || "경산승무팀";

        window.onload = function() {
            renderStatus();
        };

        function renderStatus() {
            const listArea = document.getElementById('listArea');
            const percentText = document.getElementById('percentText');

            // 1. 데이터 불러오기
            const totalUserList = JSON.parse(localStorage.getItem('totalUserList')) || [];
            const myTeamMembers = totalUserList.filter(u => u.dept === myDept);
            
            // 2. 사인 완료 데이터 (나중에 사용자 페이지 완성 시 기록됨)
            const signData = JSON.parse(localStorage.getItem('signData')) || [];

            if (myTeamMembers.length === 0) {
                listArea.innerHTML = '<p style="text-align:center; color:#ccc; padding:30px;">등록된 팀원이 없습니다.</p>';
                return;
            }

            let doneCount = 0;
            let html = '';

            myTeamMembers.forEach(member => {
                // 이 팀원이 사인을 했는지 확인 (사번 기준)
                const isDone = signData.some(s => String(s.userId) === String(member.id));
                if (isDone) doneCount++;

                html += `
                <div class="member-item">
                    <div class="member-info">
                        <div class="member-name">${member.name}</div>
                        <div class="member-id">사번: ${member.id}</div>
                    </div>
                    <div class="status-badge ${isDone ? 'done' : 'yet'}">
                        ${isDone ? '이수 완료' : '미이수'}
                    </div>
                </div>
                `;
            });

            // 이수율 계산 및 표시
            const percent = Math.round((doneCount / myTeamMembers.length) * 100);
            percentText.innerText = percent + "%";
            listArea.innerHTML = html;
        }
    </script>
</body>
</html>
