<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 초기 설정 인증</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        html, body { height: 100%; overflow: hidden; display: flex; flex-direction: column; align-items: center; background: var(--bg-gray); font-family: 'Noto Sans KR', sans-serif; }
        .main-container { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; width: 100%; align-items: center; padding-bottom: 80px; }
        .auth-card { width: 88%; max-width: 380px; background: white; border-radius: 24px; padding: 40px 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); text-align: center; }
        .title { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; color: #333; }
        input { width: 100%; height: 55px; text-align: center; font-size: 1.2rem; border: 1px solid #eee; border-radius: 14px; margin-bottom: 20px; outline: none; }
        .btn-next { width: 100%; height: 55px; background: #333; color: white; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="auth-card">
            <div class="title">초기 설정을 위해<br>마스터 비밀번호를 입력하세요</div>
            <input type="password" id="masterInput" placeholder="Master Password">
            <button class="btn-next" onclick="checkMaster()">인증하기</button>
        </div>
    </div>
    <script>
        function checkMaster() {
            if(document.getElementById('masterInput').value === '1234') {
                location.href = 'admin_first_reg.html'; // 인증 성공 시 등록 화면으로
            } else {
                alert('마스터 비밀번호가 틀립니다.');
            }
        }
    </script>
</body>
</html>
