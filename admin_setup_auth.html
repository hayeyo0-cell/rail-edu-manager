<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관리자 설정 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; --error-red: #ff4d4d; --success-green: #2ecc71; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* 상단 헤더 */
        .top-nav { 
            width: 100%; background: white; padding: 12px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-sizing: border-box; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100;
        }
        .nav-btn { 
            background: white; border: 1px solid #eaeaea; border-radius: 8px; 
            padding: 8px 15px; font-size: 0.85rem; color: #555; cursor: pointer; font-weight: bold;
        }
        .brand-logo { height: 42px; object-fit: contain; }

        .settings-card { 
            width: 92%; max-width: 400px; background: white; border-radius: 25px; 
            padding: 30px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); box-sizing: border-box; 
            margin-top: 20px; margin-bottom: 40px;
        }
        
        h2 { text-align: center; color: #333; margin-bottom: 25px; font-size: 1.4rem; letter-spacing: -0.5px; }
        
        /* 🚨 분리된 구역을 감싸는 박스 디자인 추가 */
        .section-box {
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; 
            padding: 20px 15px; margin-bottom: 25px;
        }
        
        .section-title { font-size: 1.1rem; font-weight: bold; color: var(--dtro-blue); border-left: 4px solid var(--dtro-blue); padding-left: 8px; margin-bottom: 15px; }
        .input-label { font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 6px; display: block; padding-left: 5px; }
        
        select, input { 
            width: 100%; padding: 14px; margin-bottom: 10px; border: 1px solid #eee; 
            border-radius: 12px; box-sizing: border-box; font-size: 1rem; background: #fff; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--dtro-blue); box-shadow: 0 0 0 3px rgba(0,114,188,0.05); }
        
        .check-msg { font-size: 0.75rem; margin-bottom: 15px; display: none; padding-left: 5px; font-weight: 500; }
        .error { color: var(--error-red); }
        .success { color: var(--success-green); }

        .save-btn { 
            width: 100%; padding: 16px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 12px; font-size: 1.05rem; font-weight: bold; 
            cursor: pointer; margin-top: 10px; box-shadow: 0 6px 15px rgba(0,114,188,0.15); transition: background 0.2s;
        }
        .save-btn:hover { background: #005a96; }
        
        /* 공용 비밀번호 버튼은 색상을 다르게 주어 확실히 구분 */
        .save-btn.team-btn { background: #2ecc71; box-shadow: 0 6px 15px rgba(46,204,113,0.15); }
        .save-btn.team-btn:hover { background: #27ae60; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="nav-btn" onclick="goMain()">← 메인으로</button>
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <div style="width:75px;"></div>
    </div>

    <div class="settings-card">
        <h2>🛠️ 관리자 설정</h2>
        
        <div class="section-box">
            <div class="section-title">👤 관리자 정보 (인수인계)</div>
            
            <span class="input-label">운영 소속</span>
            <select id="setDept">
                <option value="경산승무팀">경산승무팀</option>
                <option value="안심승무팀">안심승무팀</option>
                <option value="월배승무팀">월배승무팀</option>
                <option value="문양승무팀">문양승무팀</option>
            </select>

            <span class="input-label">새 관리자 사번 (로그인 ID)</span>
            <input type="number" id="setAdminId" placeholder="사번 8자리 입력" inputmode="numeric">
            <input type="number" id="confirmAdminId" placeholder="사번 한 번 더 입력" oninput="validateId()" inputmode="numeric">
            <div id="idCheckMsg" class="check-msg"></div>
            
            <span class="input-label">새 관리자 비밀번호</span>
            <input type="password" id="setAdminPw" placeholder="비밀번호 설정">
            <input type="password" id="confirmAdminPw" placeholder="비밀번호 한 번 더 입력" oninput="validatePw()">
            <div id="pwCheckMsg" class="check-msg"></div>

            <button class="save-btn" onclick="saveAdminInfo()">관리자 정보 저장</button>
        </div>

        <div class="section-box">
            <div class="section-title">🔑 팀원 공용 비번 관리</div>
            
            <span class="input-label">새 팀원 접속 비밀번호</span>
            <input type="password" id="setTeamPw" placeholder="팀원들이 쓸 공용 비번">
            <input type="password" id="confirmTeamPw" placeholder="공용 비번 한 번 더 입력" oninput="validateTeamPw()">
            <div id="teamPwCheckMsg" class="check-msg"></div>

            <button class="save-btn team-btn" onclick="saveTeamPw()">공용 비밀번호 변경</button>
        </div>
    </div>

    <script>
        const isAdminSet = localStorage.getItem('adminId');

        // 페이지 로드 시 기존 정보가 있다면 불러오기 (편의성)
        window.onload = function() {
            const currentDept = localStorage.getItem('userDept');
            const currentAdminId = localStorage.getItem('adminId');
            
            if (currentDept) document.getElementById('setDept').value = currentDept;
            if (currentAdminId) {
                document.getElementById('setAdminId').value = currentAdminId;
                document.getElementById('confirmAdminId').value = currentAdminId;
            }
        };

        // 🚨 [보안] 초기 설정 여부에 따른 뒤로가기 제어
        (function() {
            function lockHistory() {
                for(let i = 0; i < 10; i++) {
                    window.history.pushState(null, null, window.location.href);
                }
            }
            lockHistory();

            window.onpopstate = function() {
                if (!isAdminSet) {
                    lockHistory();
                    alert("초기 설정을 완료해야 시스템 이용이 가능합니다.");
                } else {
                    location.replace('admin_main.html');
                }
            };
            document.body.onclick = lockHistory;
        })();

        // 🚨 메인으로 가기 함수
        function goMain() {
            if (!isAdminSet) {
                alert("최초 설정을 완료해 주세요!");
            } else {
                location.replace('admin_main.html');
            }
        }

        // 실시간 입력 체크 로직
        function validateId() {
            const val1 = document.getElementById('setAdminId').value;
            const val2 = document.getElementById('confirmAdminId').value;
            const msg = document.getElementById('idCheckMsg');
            msg.style.display = 'block';
            if(val1 === val2 && val1 !== '') { msg.innerHTML = '✅ 사번이 일치합니다.'; msg.className = 'check-msg success'; } 
            else { msg.innerHTML = '❌ 사번이 일치하지 않습니다.'; msg.className = 'check-msg error'; }
        }
        function validatePw() {
            const val1 = document.getElementById('setAdminPw').value;
            const val2 = document.getElementById('confirmAdminPw').value;
            const msg = document.getElementById('pwCheckMsg');
            msg.style.display = 'block';
            if(val1 === val2 && val1 !== '') { msg.innerHTML = '✅ 비밀번호가 일치합니다.'; msg.className = 'check-msg success'; } 
            else { msg.innerHTML = '❌ 비밀번호가 일치하지 않습니다.'; msg.className = 'check-msg error'; }
        }
        function validateTeamPw() {
            const val1 = document.getElementById('setTeamPw').value;
            const val2 = document.getElementById('confirmTeamPw').value;
            const msg = document.getElementById('teamPwCheckMsg');
            msg.style.display = 'block';
            if(val1 === val2 && val1 !== '') { msg.innerHTML = '✅ 비밀번호가 일치합니다.'; msg.className = 'check-msg success'; } 
            else { msg.innerHTML = '❌ 비밀번호가 일치하지 않습니다.'; msg.className = 'check-msg error'; }
        }

        // 1. 관리자 정보(인수인계)만 독립적으로 저장
        function saveAdminInfo() {
            const dept = document.getElementById('setDept').value;
            const id = document.getElementById('setAdminId').value;
            const confirmId = document.getElementById('confirmAdminId').value;
            const pw = document.getElementById('setAdminPw').value;
            const confirmPw = document.getElementById('confirmAdminPw').value;

            if(!dept || !id || !pw || !confirmId || !confirmPw) {
                alert('관리자 정보 빈칸을 모두 채워주세요!'); return;
            }
            if(id !== confirmId || pw !== confirmPw) {
                alert('입력하신 사번이나 비밀번호가 서로 일치하지 않습니다.'); return;
            }

            if(confirm(`📍 소속: ${dept}\n🆔 사번: ${id}\n\n관리자 정보를 변경(인수인계) 하시겠습니까?`)) {
                localStorage.setItem('userDept', dept);
                localStorage.setItem('adminId', id);
                localStorage.setItem('adminPw', pw);
                
                alert('✅ 관리자 정보가 성공적으로 저장되었습니다.\n보안을 위해 다시 로그인해 주세요.');
                window.location.replace('index.html'); // 인수인계 후에는 로그아웃 처리
            }
        }

        // 2. 공용 비밀번호만 독립적으로 저장
        function saveTeamPw() {
            const teamPw = document.getElementById('setTeamPw').value;
            const confirmTeamPw = document.getElementById('confirmTeamPw').value;

            if(!teamPw || !confirmTeamPw) {
                alert('공용 비밀번호 빈칸을 모두 채워주세요!'); return;
            }
            if(teamPw !== confirmTeamPw) {
                alert('입력하신 공용 비밀번호가 서로 일치하지 않습니다.'); return;
            }

            if(confirm(`🔑 새 공용 비밀번호: ${teamPw}\n\n팀원들이 사용할 공용 비밀번호를 변경하시겠습니까?`)) {
                localStorage.setItem('teamPw', teamPw);
                alert('✅ 팀 공용 비밀번호가 성공적으로 변경되었습니다!');
                
                // 공용비번만 바꿨을 때는 튕겨내지 않고 입력창만 비워줌
                document.getElementById('setTeamPw').value = '';
                document.getElementById('confirmTeamPw').value = '';
                document.getElementById('teamPwCheckMsg').style.display = 'none';
                
                // 만약 최초 설정 중이 아니라면 메인으로 보내주기
                if (isAdminSet) {
                    window.location.replace('admin_main.html');
                }
            }
        }
    </script>
</body>
</html>
