<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; position: relative; }

        /* [핵심 수정] 우측 상단 은은한 로고 배치 */
        .top-logo { 
            position: absolute; 
            top: 20px; /* 상단 여백 */
            right: 20px; /* 우측 여백 */
            height: 22px; /* 세련된 작은 크기 */
            opacity: 0.8; /* 은은하게 노출 */
        }

        /* [핵심 수정] 메인 제목 중앙 배치 */
        .main-title { 
            font-size: 1.6rem; /* 큼직하게 강조 */
            font-weight: bold; 
            color: #333; 
            margin: 60px 0 35px 0; /* 상단 여백을 충분히 주어 제목 공간 확보 */
            letter-spacing: -1px; 
            text-align: center;
        }

        .login-card { 
            width: 90%; 
            max-width: 400px; 
            background: white; 
            border-radius: 20px; 
            padding: 30px 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); /* 조금 더 고급스러운 그림자 */
            text-align: center;
        }
        
        .card-welcome-text { font-size: 1.1rem; font-weight: bold; margin-bottom: 25px; color: var(--dtro-blue); /* 소속 선택 유도 */ }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 7px; padding-left: 5px; }
        
        input, select { 
            width: 100%; height: 50px; padding: 0 15px; border: 1px solid #ddd; border-radius: 13px; 
            box-sizing: border-box; font-size: 0.95rem; background: #fafafa; outline: none; transition: 0.2s;
        }
        input:focus, select:focus { border-color: var(--dtro-blue); background: #fff; box-shadow: 0 0 10px rgba(0,114,188,0.1); }

        .btn-start { 
            width: 100%; height: 55px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; 
            cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,114,188,0.25);
            transition: 0.2s;
        }
        .btn-start:active { transform: scale(0.98); }

        .admin-link { margin-top: 25px; display: inline-block; font-size: 0.85rem; color: #bbb; text-decoration: none; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <img src="logo.png" class="top-logo" alt="DTRO">

    <div class="main-title">스마트 교육 플랫폼</div>

    <div class="login-card">
        <div class="card-welcome-text">경산승무팀 교육 시작하기</div>
        
        <div class="input-group">
            <label>소속 선택</label>
            <select id="userDept">
                <option value="">소속을 선택하세요</option>
                <option value="경산승무팀">경산승무팀</option>
                <option value="월배승무팀">월배승무팀</option>
                <option value="안심승무팀">안심승무팀</option>
            </select>
        </div>

        <div class="input-group">
            <label>사번 (8자리)</label>
            <input type="number" id="userId" placeholder="사번 입력" inputmode="numeric">
        </div>

        <div class="input-group">
            <label>팀 공용 비밀번호</label>
            <input type="password" id="userPw" placeholder="비밀번호 입력">
        </div>

        <button class="btn-start" onclick="location.href='user_main.html'">
            교육 시작하기 →
        </button>

        <a href="admin_login.html" class="admin-link" style="font-size: 0.7rem;">관리자 페이지 이동</a>
    </div>

</body>
</html>
