<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-gray); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; 
        }

        /* [핵심 수정] 상단 제목 영역: 슬림하게 최적화 */
        .main-title { 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: #333; 
            margin: 40px 0 25px 0; /* 여백을 확 줄여서 슬림하게 배치 */
            letter-spacing: -1px; 
            text-align: center;
        }

        .login-card { 
            width: 90%; 
            max-width: 400px; 
            background: white; 
            border-radius: 20px; 
            padding: 30px 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); 
            text-align: center;
            z-index: 2;
        }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 7px; padding-left: 5px; }
        
        input, select { 
            width: 100%; height: 50px; padding: 0 15px; border: 1px solid #ddd; border-radius: 13px; 
            box-sizing: border-box; font-size: 0.95rem; background: #fafafa; outline: none;
        }

        .btn-start { 
            width: 100%; height: 55px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; 
            cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,114,188,0.25);
        }

        .admin-link { margin-top: 25px; display: inline-block; font-size: 0.8rem; color: #ccc; text-decoration: none; }

        /* [핵심 수정] 하단 로고 배치: 동그라미 친 위치 */
        .bottom-logo-area {
            margin-top: auto; /* 카드 아래 남는 공간을 모두 차지 */
            padding: 40px 0; /* 바닥에서 적당히 띄움 */
            display: flex;
            justify-content: center;
            width: 100%;
        }
        .bottom-logo {
            height: 24px; /* 정갈하고 품격 있는 크기 */
            opacity: 0.7; /* 배경과 조화롭게 은은하게 */
        }
    </style>
</head>
<body>

    <div class="main-title">스마트 교육 플랫폼</div>

    <div class="login-card">
        <div class="input-group">
            <label>소속 선택</label>
            <select id="userDept">
                <option value="">소속을 선택하세요</option>
                <option value="경산승무팀">경산승무팀</option>
                <option value="월배승무팀">월배승무팀</option>
                <option value="안심승무팀">안심승무팀</option>
            </select>
        </div>

        <div class="input-group">
            <label>사번 (8자리)</label>
            <input type="number" id="userId" placeholder="사번 입력" inputmode="numeric">
        </div>

        <div class="input-group">
            <label>팀 공용 비밀번호</label>
            <input type="password" id="userPw" placeholder="비밀번호 입력">
        </div>

        <button class="btn-start" onclick="location.href='user_main.html'">
            교육 시작하기 →
        </button>

        <a href="admin_login.html" class="admin-link">관리자 로그인</a>
    </div>

    <div class="bottom-logo-area">
        <img src="logo.png" class="bottom-logo" alt="대구교통공사 DTRO">
    </div>

</body>
</html>
