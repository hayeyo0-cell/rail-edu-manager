<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        
        /* 전체 화면 고정 및 중앙 정렬 */
        html, body { height: 100%; overflow: hidden; }
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-gray); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }

        /* [핵심 수정] 로고와 제목을 하나의 세트로 결합 */
        .brand-area { 
            text-align: center; 
            margin-bottom: 25px; /* 카드와의 간격 */
        }

        .brand-logo { 
            height: 22px; /* 선명하게 잘 보이는 크기 */
            margin-bottom: 8px; /* 제목과의 밀착 간격 */
            opacity: 0.9;
        }

        .main-title { 
            font-size: 1.55rem; 
            font-weight: bold; 
            color: #222; 
            margin: 0; 
            letter-spacing: -1px;
        }

        /* 로그인 카드 디자인 최적화 */
        .login-card { 
            width: 88%; 
            max-width: 380px; 
            background: white; 
            border-radius: 22px; 
            padding: 30px 22px 20px 22px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); 
            text-align: center;
        }
        
        .input-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 6px; padding-left: 5px; }
        
        input, select { 
            width: 100%; height: 50px; padding: 0 15px; 
            border: 1px solid #e1e1e1; border-radius: 12px; 
            font-size: 1rem; background: #fafafa; outline: none;
            box-sizing: border-box;
        }
        input:focus, select:focus { border-color: var(--dtro-blue); background: #fff; }

        .btn-start { 
            width: 100%; height: 55px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; 
            cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,114,188,0.25);
        }

        .admin-link { margin-top: 20px; display: inline-block; font-size: 0.75rem; color: #ccc; text-decoration: none; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="brand-area">
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <h1 class="main-title">스마트 교육 플랫폼</h1>
    </div>

    <div class="login-card">
        <div class="input-group">
            <label>소속 선택</label>
            <select id="userDept">
                <option value="">소속을 선택하세요</option>
                <option value="경산승무팀">경산승무팀</option>
                <option value="월배승무팀">월배승무팀</option>
                <option value="안심승무팀">안심승무팀</option>
            </select>
        </div>

        <div class="input-group">
            <label>사번 (8자리)</label>
            <input type="number" id="userId" placeholder="사번 입력" inputmode="numeric">
        </div>

        <div class="input-group" style="margin-bottom: 25px;">
            <label>팀 공용 비밀번호</label>
            <input type="password" id="userPw" placeholder="비밀번호 입력">
        </div>

        <button class="btn-start" onclick="location.href='user_main.html'">
            교육 시작하기 →
        </button>

        <a href="admin_login.html" class="admin-link">관리자 로그인</a>
    </div>

</body>
</html>
