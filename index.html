<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        #splashScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.4s ease;
        }
        .splash-logo { width: 180px; height: auto; margin-bottom: 20px; object-fit: contain; }
        .splash-text { font-size: 1.5rem; font-weight: bold; color: #222; }

        .login-card { 
            width: 90%; max-width: 400px; background: white; padding: 45px 25px; 
            border-radius: 30px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); 
            text-align: center; display: none; box-sizing: border-box;
        }
        .login-card.show { display: block; animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .logo-area img { width: 180px; height: auto; margin-bottom: 20px; object-fit: contain; }
        .main-title { display: inline-block; font-size: 1.5rem; font-weight: bold; color: #222; margin-bottom: 30px; background: linear-gradient(to top, rgba(0, 114, 188, 0.2) 40%, transparent 40%); padding: 0 5px; }
        
        .tab-menu { display: flex; margin-bottom: 25px; background: #f0f0f0; border-radius: 15px; padding: 5px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: none; color: #999; }
        .tab-btn.active { background: white; color: var(--dtro-blue); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-label { font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 6px; display: block; padding-left: 5px; }
        input { width: 100%; padding: 15px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 1rem; background: #fafafa; outline: none; }
        
        .login-btn { width: 100%; padding: 16px; background: var(--dtro-blue); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .exit-btn { width: 100%; padding: 12px; background: none; color: #bbb; border: none; font-size: 0.85rem; font-weight: bold; cursor: pointer; margin-top: 20px; text-decoration: underline; }

        /* 커스텀 모달 디자인 */
        .custom-alert-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999999; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
        .custom-alert-box { background: white; width: 85%; max-width: 320px; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); animation: popIn 0.3s ease; }
        .custom-alert-title { font-size: 1.2rem; font-weight: bold; color: var(--dtro-blue); margin-bottom: 15px; }
        .custom-alert-msg { font-size: 0.95rem; color: #444; line-height: 1.5; margin-bottom: 20px; word-break: keep-all; }
        .btn-group-row { display: flex; gap: 10px; }
        .modal-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .modal-btn-cancel { background: #f0f0f0; color: #666; }
        .modal-btn-confirm { background: var(--dtro-blue); color: white; }
    </style>
</head>
<body>

    <div id="splashScreen">
        <img src="logo.png" class="splash-logo" alt="DTRO">
        <div class="splash-text">스마트 교육 플랫폼</div>
    </div>

    <div id="authModal" class="custom-alert-bg">
        <div class="custom-alert-box">
            <div id="authModalTitle" class="custom-alert-title">📱 기기 인증 필요</div>
            <div id="authModalMsg" class="custom-alert-msg">등록되지 않은 기기입니다.<br>관리자에게 기기 승인을 요청하시겠습니까?</div>
            <div class="btn-group-row" id="authBtnGroup">
                <button class="modal-btn modal-btn-cancel" onclick="closeAuthModal()">취소</button>
                <button class="modal-btn modal-btn-confirm" id="requestAuthBtn">요청하기</button>
            </div>
        </div>
    </div>

    <div class="login-card" id="loginCard">
        <div class="logo-area"><img src="logo.png" alt="DTRO"></div>
        <div class="main-title">스마트 교육 플랫폼</div>
        
        <div class="tab-menu">
            <button id="userTab" class="tab-btn active" onclick="switchTab('user')">사용자 로그인</button>
            <button id="adminTab" class="tab-btn" onclick="switchTab('admin')">관리자 모드</button>
        </div>

        <div id="userForm">
            <div class="input-group"><span class="input-label">사용자 사번</span><input type="number" id="userId" placeholder="사번 입력" inputmode="numeric"></div>
            <div class="input-group"><span class="input-label">팀 공용 비밀번호</span><input type="password" id="userPw" placeholder="비밀번호 입력"></div>
            <button class="login-btn" onclick="userLogin()">로그인 및 교육 시작 →</button>
        </div>

        <div id="adminForm" style="display: none;">
            <div id="adminIdArea" class="input-group" style="display:none;"><span class="input-label">관리자 사번</span><input type="number" id="adminId" placeholder="사번 입력" inputmode="numeric"></div>
            <div class="input-group"><span id="pwLabel" class="input-label">마스터 인증(1234)</span><input type="password" id="adminPw" placeholder="비밀번호 입력"></div>
            <button class="login-btn" onclick="adminLogin()">관리자 인증</button>
        </div>

        <button class="exit-btn" onclick="exitApp()">시스템 종료</button>
    </div>

    <script>
        let isMoving = false;

        function pushState() { window.history.pushState(null, null, window.location.href); }

        window.onload = function() {
            const splash = document.getElementById('splashScreen');
            const card = document.getElementById('loginCard');
            
            // 🚨 내 스마트폰만의 고유 ID(기기 번호) 생성 및 발급
            if(!localStorage.getItem('myDeviceUUID')) {
                const uniqueId = 'device-' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('myDeviceUUID', uniqueId);
            }

            if (sessionStorage.getItem('isSplashShown')) {
                splash.style.display = 'none';
                card.classList.add('show');
            } else {
                setTimeout(() => {
                    splash.style.opacity = '0';
                    setTimeout(() => {
                        splash.style.display = 'none';
                        card.classList.add('show');
                        sessionStorage.setItem('isSplashShown', 'true');
                    }, 400); 
                }, 800); 
            }
            pushState(); 
        };

        window.addEventListener('popstate', function(event) {
            if (isMoving) return; 
            pushState(); 
            alert("보안을 위해 뒤로가기를 사용할 수 없습니다. '시스템 종료'를 이용해 주세요.");
        });

        function exitApp() {
            if(confirm("시스템을 종료하시겠습니까?")) {
                window.open('about:blank', '_self').close();
                setTimeout(() => { alert("브라우저의 탭 닫기(X)를 이용해 종료해 주세요."); }, 300);
            }
        }

        function switchTab(mode) {
            const isUser = (mode === 'user');
            document.getElementById('userTab').classList.toggle('active', isUser);
            document.getElementById('adminTab').classList.toggle('active', !isUser);
            document.getElementById('userForm').style.display = isUser ? 'block' : 'none';
            document.getElementById('adminForm').style.display = isUser ? 'none' : 'block';
            if(!isUser) {
                const savedId = localStorage.getItem('adminId');
                document.getElementById('adminIdArea').style.display = savedId ? 'block' : 'none';
                document.getElementById('pwLabel').innerText = savedId ? "관리자 비밀번호" : "마스터 비밀번호(1234) 인증";
            }
        }

        function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; }
        function showAuthMsg(title, msg, showBtns = false) {
            document.getElementById('authModalTitle').innerHTML = title;
            document.getElementById('authModalMsg').innerHTML = msg;
            document.getElementById('authBtnGroup').style.display = showBtns ? 'flex' : 'none';
            
            if(!showBtns) { // 버튼이 없을 땐 확인 버튼 하나만 생성
                document.getElementById('authBtnGroup').style.display = 'flex';
                document.getElementById('authBtnGroup').innerHTML = `<button class="modal-btn modal-btn-confirm" onclick="closeAuthModal()">확인</button>`;
            }
            document.getElementById('authModal').style.display = 'flex';
        }

        // 🚨 직원 철통 보안 로그인 로직
        function userLogin() {
            const inputId = document.getElementById('userId').value.trim();
            const inputPw = document.getElementById('userPw').value;
            const totalUserList = JSON.parse(localStorage.getItem('totalUserList')) || [];
            const savedTeamPw = localStorage.getItem('teamPw') || "1234";
            
            const userIndex = totalUserList.findIndex(u => String(u.id) === String(inputId));
            const myDeviceUUID = localStorage.getItem('myDeviceUUID');
            
            // 1차: 명단 및 비번 확인
            if (userIndex === -1) { alert("관리자 명단에 등록되지 않은 사번입니다."); return; }
            if (inputPw !== savedTeamPw) { alert("팀 공용 비밀번호가 틀렸습니다."); return; }
            
            const user = totalUserList[userIndex];
            const status = user.authStatus || 'none';

            // 2차: 기기 인증 및 승인 상태 확인
            if (status === 'none') {
                // 한 번도 승인 요청한 적 없는 새 기기
                document.getElementById('authBtnGroup').innerHTML = `
                    <button class="modal-btn modal-btn-cancel" onclick="closeAuthModal()">취소</button>
                    <button class="modal-btn modal-btn-confirm" onclick="requestDeviceAuth('${inputId}')">인증 요청</button>
                `;
                showAuthMsg('📱 기기 인증 필요', '처음 접속하는 기기입니다.<br>관리자에게 기기 승인을 요청하시겠습니까?', true);
                return;
            } 
            else if (status === 'pending') {
                if(user.deviceId === myDeviceUUID) {
                    showAuthMsg('⏳ 승인 대기 중', '관리자의 기기 승인을 기다리고 있습니다.<br>승인 완료 후 로그인해 주세요.');
                } else {
                    showAuthMsg('🚫 접속 불가', '해당 사번은 다른 기기에서 승인 대기 중입니다.');
                }
                return;
            }
            else if (status === 'approved') {
                if(user.deviceId === myDeviceUUID) {
                    // 🎉 내 폰으로 승인받은 정상 로그인!
                    localStorage.setItem('currentUserDept', user.dept);
                    localStorage.setItem('currentUserName', user.name);
                    localStorage.setItem('currentUserId', user.id);
                    isMoving = true;           
                    setTimeout(() => { window.location.replace('user_main.html'); }, 100);
                } else {
                    showAuthMsg('🚫 다른 기기 등록됨', '해당 사번은 이미 다른 스마트폰에 귀속되어 있습니다.<br>기기 변경 시 관리자에게 해제를 요청하세요.');
                }
            }
        }

        // 🚨 사용자가 기기 인증을 요청하는 함수
        function requestDeviceAuth(id) {
            let totalUserList = JSON.parse(localStorage.getItem('totalUserList')) || [];
            const userIndex = totalUserList.findIndex(u => String(u.id) === String(id));
            
            if(userIndex !== -1) {
                totalUserList[userIndex].authStatus = 'pending';
                totalUserList[userIndex].deviceId = localStorage.getItem('myDeviceUUID');
                localStorage.setItem('totalUserList', JSON.stringify(totalUserList));
                
                showAuthMsg('✅ 요청 완료', '관리자에게 기기 승인 요청이 전송되었습니다.<br>승인 후 다시 로그인해 주세요.');
            }
        }

        function adminLogin() {
            const inputId = document.getElementById('adminId').value;
            const inputPw = document.getElementById('adminPw').value;
            const savedId = localStorage.getItem('adminId');
            const savedPw = localStorage.getItem('adminPw');
            
            isMoving = true;

            if (savedId && String(inputId) === String(savedId) && inputPw === savedPw) { 
                window.location.replace('admin_main.html'); 
                return; 
            }
            
            if (inputPw === "1234") { 
                window.location.replace('admin_setup_auth.html'); 
                return; 
            }
            
            isMoving = false;
            pushState();
            alert("정보가 틀렸습니다.");
        }
    </script>
</body>
</html>
