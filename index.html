<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육</title>
    <style>
        :root { --dtro-blue: #0072bc; --dtro-sky: #f4f9ff; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--dtro-sky); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { width: 100%; background: white; padding: 25px 0; text-align: center; border-bottom: 3px solid var(--dtro-blue); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .logo-text { font-size: 1.5rem; font-weight: 800; color: var(--dtro-blue); letter-spacing: -1px; }
        .container { width: 90%; max-width: 400px; margin-top: 35px; }
        .login-card { background: white; padding: 35px 25px; border-radius: 25px; box-shadow: 0 15px 30px rgba(0,0,0,0.08); text-align: center; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.95rem; font-weight: bold; display: block; margin-bottom: 10px; color: #333; }
        input { width: 100%; padding: 16px; border: 2px solid #edf2f7; border-radius: 15px; font-size: 1rem; box-sizing: border-box; background: #fcfdfe; }
        .btn-start { width: 100%; padding: 20px; background: var(--dtro-blue); color: white; border: none; border-radius: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 8px 20px rgba(0,114,188,0.3); }
        .admin-link { margin-top: 30px; display: block; color: #bbb; font-size: 0.85rem; text-decoration: underline; cursor: pointer; border:none; background:none; width:100%; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-text">DTRO SMART LEARNING</div>
        <div style="font-size: 0.8rem; color: #666; margin-top:5px;">대구교통공사와 함께하는 스마트한 세상</div>
    </div>
    <div class="container">
        <div class="login-card">
            <h2 style="margin-bottom:30px; color:#222;">본인 확인</h2>
            <div class="input-group"><label>사번 입력</label><input type="number" id="userId" placeholder="사번 8자리를 입력하세요"></div>
            <div class="input-group"><label>성명 입력</label><input type="text" id="userName" placeholder="이름을 입력하세요"></div>
            <button class="btn-start" onclick="startEdu()">오늘의 교육 시작하기</button>
            <button class="admin-link" onclick="checkAdmin()">관리자 로그인</button>
        </div>
    </div>
    <script>
        function startEdu() {
            const id = document.getElementById('userId').value;
            const name = document.getElementById('userName').value;
            if(!id || !name) { alert("사번과 성명을 모두 입력해주세요."); return; }
            localStorage.setItem("loginUser", JSON.stringify({id, name}));
            location.href = "user_timer.html";
        }
        function checkAdmin() {
            const pw = prompt("관리자 비밀번호를 입력하세요.");
            if(pw === "1234") location.href = "admin_main.html"; 
            else if(pw) alert("비밀번호가 틀렸습니다.");
        }
    </script>
</body>
</html>
