<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        :root { --dtro-blue: #0072bc; --dtro-sky: #f4f9ff; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--dtro-sky); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* 상단 헤더 */
        .header {
            width: 100%;
            background: white;
            padding: 20px 0; /* 여백 약간 줄임 */
            text-align: center;
            border-bottom: 2px solid var(--dtro-blue);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 로고 크기 조절 */
        .logo-img { height: 45px; vertical-align: middle; object-fit: contain; }

        .container { width: 90%; max-width: 380px; margin-top: 20px; }
        
        .login-card { 
            background: white; 
            padding: 30px 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            text-align: center; 
        }

        /* [변경] 타이틀 글씨 크기를 로고와 비슷하게 줄임 */
        .main-title { 
            font-size: 1.4rem; 
            margin-bottom: 25px; 
            color: #111; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .input-group { margin-bottom: 15px; text-align: left; }
        
        label { 
            font-size: 0.85rem; 
            font-weight: bold; 
            display: block; 
            margin-bottom: 6px; 
            color: #555; 
        }

        input, select { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            font-size: 0.95rem; 
            box-sizing: border-box; 
            background: #fafafa; 
        }

        /* [변경] 버튼 글씨 크기와 패딩 조절 */
        .btn-start { 
            width: 100%; 
            padding: 16px; 
            background: var(--dtro-blue); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
            box-shadow: 0 4px 6px rgba(0,114,188,0.15);
        }

        .admin-link { 
            margin-top: 20px; 
            display: block; 
            color: #999; 
            font-size: 0.8rem; 
            text-decoration: underline; 
            cursor: pointer; 
            border:none; 
            background:none; 
            width:100%; 
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="대구교통공사 DTRO" class="logo-img">
    </div>

    <div class="container">
        <div class="login-card">
            <h2 class="main-title">스마트 교육 플랫폼</h2>
            
            <div class="input-group">
                <label>소속 기지/관리소</label>
                <select id="userTeam">
                    <option value="">소속을 선택하세요</option>
                    <option value="경산">경산 (2호선)</option>
                    <option value="문양">문양 (2호선)</option>
                    <option value="월배">월배 (1호선)</option>
                    <option value="안심">안심 (1호선)</option>
                </select>
            </div>

            <div class="input-group">
                <label>사번 (8자리)</label>
                <input type="number" id="userId" placeholder="사번 8자리를 입력하세요" inputmode="numeric">
            </div>
            
            <div class="input-group">
                <label>팀 공용 비밀번호</label>
                <input type="password" id="userPw" placeholder="비밀번호를 입력하세요" inputmode="numeric">
            </div>

            <button class="btn-start" onclick="startEdu()">오늘의 교육 시작하기 →</button>
            <button class="admin-link" onclick="checkAdmin()">관리자(담당자) 로그인</button>
        </div>
    </div>

    <script>
        if(!localStorage.getItem("teamPassword")) {
            localStorage.setItem("teamPassword", "1234");
        }

        function startEdu() {
            const team = document.getElementById('userTeam').value;
            const id = document.getElementById('userId').value;
            const pw = document.getElementById('userPw').value;
            const teamPw = localStorage.getItem("teamPassword");

            if(!team) { alert("소속 기지를 선택해 주세요."); return; }

            if(id.length === 8 && pw === teamPw) {
                localStorage.setItem("loginUser", JSON.stringify({team: team, id: id, name: "기관사"}));
                window.onpopstate = null;
                location.replace("user_timer.html");
            } else {
                alert("정보가 일치하지 않습니다.\n사번 8자리와 팀 비밀번호를 확인하세요.");
            }
        }

        function checkAdmin() {
            const savedAdmin = JSON.parse(localStorage.getItem("assignedAdmin"));
            if (!savedAdmin) {
                const masterPw = prompt("담당자가 지정되지 않았습니다.\n마스터 비밀번호(1234)를 입력하세요.");
                if (masterPw === "1234") {
                    alert("인증 성공! 담당자 등록 페이지로 이동합니다.");
                    window.onpopstate = null;
                    location.href = "admin_register.html"; 
                } else if (masterPw) { alert("비밀번호가 틀렸습니다."); }
            } else {
                const adminTeam = prompt("관리 소속 기지를 입력하세요. (경산, 문양, 월배, 안심 중 입력)");
                if (adminTeam === savedAdmin.team) {
                    const adminId = prompt("관리자 사번을 입력하세요.");
                    if (adminId === savedAdmin.id) {
                        const adminPw = prompt("관리자 개인 비밀번호를 입력하세요.");
                        if (adminPw === savedAdmin.pw) {
                            window.onpopstate = null;
                            location.href = "admin_main.html";
                        } else if (adminPw) { alert("비밀번호가 일치하지 않습니다."); }
                    } else if (adminId) { alert("등록된 관리자 사번이 아닙니다."); }
                } else if (adminTeam) { alert("해당 기지의 관리자가 아닙니다."); }
            }
        }

        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function() {
            window.history.pushState(null, null, window.location.href);
            alert("앱 종료는 홈 버튼을 이용해 주세요.");
        };
    </script>
</body>
</html>
