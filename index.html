<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼 - 로그인</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f4f6f9; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { width: 90%; max-width: 380px; background: white; padding: 40px 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
        .logo { width: 180px; margin-bottom: 30px; }
        .tab-menu { display: flex; margin-bottom: 25px; background: #eee; border-radius: 12px; padding: 5px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: none; color: #888; }
        .tab-btn.active { background: white; color: var(--dtro-blue); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--dtro-blue); }
        .login-btn { width: 100%; padding: 16px; background: var(--dtro-blue); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .footer-text { margin-top: 20px; font-size: 0.85rem; color: #999; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="logo.png" class="logo" alt="DTRO 대구교통공사">
        
        <div class="tab-menu">
            <button id="userTab" class="tab-btn active" onclick="switchTab('user')">사용자 로그인</button>
            <button id="adminTab" class="tab-btn" onclick="switchTab('admin')">관리자 모드</button>
        </div>

        <div id="userForm">
            <input type="number" id="userId" placeholder="사번을 입력하세요">
            <input type="password" id="userPw" placeholder="팀 공용 비밀번호">
            <button class="login-btn" onclick="userLogin()">로그인</button>
        </div>

        <div id="adminForm" style="display: none;">
            <input type="password" id="adminPw" placeholder="관리자 비밀번호">
            <button class="login-btn" onclick="adminLogin()">관리자 인증</button>
            <p style="font-size:0.8rem; color:#666; margin-top:10px;">최초 접속 시 마스터 비번을 입력하세요.</p>
        </div>

        <div class="footer-text">© 2026 DTRO Smart Education System</div>
    </div>

    <script>
        let currentMode = 'user';
        const TEAM_PW = "1234"; // 기관사님이 정한 팀 공용 비번 (나중에 수정 가능)
        const MASTER_PW = "0000"; // 마스터 비번 (최초 관리자 등록용)

        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('userTab').className = mode === 'user' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('adminTab').className = mode === 'admin' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('userForm').style.display = mode === 'user' ? 'block' : 'none';
            document.getElementById('adminForm').style.display = mode === 'admin' ? 'block' : 'none';
        }

        // [사용자 로그인 로직]
        function userLogin() {
            const inputId = document.getElementById('userId').value;
            const inputPw = document.getElementById('userPw').value;
            
            // 1. 관리자가 등록한 전체 명단 가져오기
            const totalUserList = JSON.parse(localStorage.getItem('totalUserList')) || [];
            
            // 2. 명단에서 해당 사번 찾기
            const userInfo = totalUserList.find(user => user.id === inputId);

            if (!userInfo) {
                alert('등록된 교육 대상자가 아닙니다. 관리자에게 문의하세요.');
                return;
            }

            if (inputPw !== TEAM_PW) {
                alert('비밀번호가 틀렸습니다.');
                return;
            }

            // 3. 로그인 성공: 세션에 사용자 정보 저장
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userRole', 'user');
            localStorage.setItem('userId', userInfo.id);
            localStorage.setItem('userName', userInfo.name);
            localStorage.setItem('userDept', userInfo.dept);

            location.href = 'user_main.html';
        }

        // [관리자 로그인 로직]
        function adminLogin() {
            const inputPw = document.getElementById('adminPw').value;
            const registeredAdmin = localStorage.getItem('adminPw');

            // 1. 이미 등록된 관리자가 있는 경우
            if (registeredAdmin) {
                if (inputPw === registeredAdmin) {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userRole', 'admin');
                    location.href = 'admin_main.html';
                } else {
                    alert('비밀번호가 틀렸습니다.');
                }
            } 
            // 2. 관리자 최초 등록 (마스터 비번 확인)
            else {
                if (inputPw === MASTER_PW) {
                    alert('관리자 설정 페이지로 이동합니다. 소속과 비번을 설정해주세요.');
                    location.href = 'admin_setting.html'; // 관리자 정보 설정 페이지 (Step 3 예정)
                } else {
                    alert('비밀번호가 틀렸습니다.');
                }
            }
        }
    </script>
</body>
</html>
