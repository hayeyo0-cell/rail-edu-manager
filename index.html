<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { width: 90%; max-width: 400px; background: white; padding: 45px 25px; border-radius: 30px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); text-align: center; }
        .logo-area { margin-bottom: 25px; }
        .logo-area img { width: 170px; }
        .main-title { display: inline-block; font-size: 1.5rem; font-weight: bold; color: #222; margin-bottom: 35px; background: linear-gradient(to top, rgba(0, 114, 188, 0.2) 40%, transparent 40%); padding: 0 5px; }
        .tab-menu { display: flex; margin-bottom: 30px; background: #f0f0f0; border-radius: 15px; padding: 5px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: none; color: #999; transition: 0.3s; }
        .tab-btn.active { background: white; color: var(--dtro-blue); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-label { font-size: 0.9rem; font-weight: bold; color: #666; margin-bottom: 8px; display: block; padding-left: 5px; }
        input { width: 100%; padding: 16px; border: 1px solid #eee; border-radius: 15px; box-sizing: border-box; font-size: 1rem; background: #fafafa; outline: none; }
        input:focus { border-color: var(--dtro-blue); background: #fff; }
        .login-btn { width: 100%; padding: 18px; background: var(--dtro-blue); color: white; border: none; border-radius: 15px; font-size: 1.15rem; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 8px 20px rgba(0,114,188,0.2); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-area"><img src="logo.png" alt="DTRO"></div>
        <div class="main-title">스마트 교육 플랫폼</div>
        <div class="tab-menu">
            <button id="userTab" class="tab-btn active" onclick="switchTab('user')">사용자 로그인</button>
            <button id="adminTab" class="tab-btn" onclick="switchTab('admin')">관리자 모드</button>
        </div>
        <div id="userForm">
            <div class="input-group"><span class="input-label">사번 (8자리)</span><input type="number" id="userId" placeholder="사번 입력"></div>
            <div class="input-group"><span class="input-label">팀 공용 비밀번호</span><input type="password" id="userPw" placeholder="비밀번호 입력"></div>
            <button class="login-btn" onclick="userLogin()">교육 시작하기 →</button>
        </div>
        <div id="adminForm" style="display: none;">
            <div class="input-group"><span class="input-label">관리자 비밀번호</span><input type="password" id="adminPw" placeholder="비밀번호 입력"></div>
            <button class="login-btn" onclick="adminLogin()">관리자 인증</button>
            <p style="font-size:0.75rem; color:#999; margin-top:15px;">최초 접속 시 마스터 비번(1234)을 입력하세요.</p>
        </div>
    </div>

    <script>
        const MASTER_PW = "1234"; // 마스터 비번을 1234로 지정

        function switchTab(mode) {
            document.getElementById('userTab').className = mode === 'user' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('adminTab').className = mode === 'admin' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('userForm').style.display = mode === 'user' ? 'block' : 'none';
            document.getElementById('adminForm').style.display = mode === 'admin' ? 'block' : 'none';
        }

        function userLogin() {
            const inputId = document.getElementById('userId').value;
            const inputPw = document.getElementById('userPw').value;
            const savedTeamPw = localStorage.getItem('teamPw') || "1234";
            const totalUserList = JSON.parse(localStorage.getItem('totalUserList')) || [];
            const userInfo = totalUserList.find(user => String(user.id) === String(inputId));

            if (!userInfo) { alert('명단에 없는 사번입니다.'); return; }
            if (inputPw !== savedTeamPw) { alert('비밀번호가 틀렸습니다.'); return; }

            localStorage.setItem('userId', userInfo.id);
            localStorage.setItem('userName', userInfo.name);
            localStorage.setItem('userDept', userInfo.dept);
            localStorage.setItem('userRole', 'user');
            location.href = 'user_main.html';
        }

        function adminLogin() {
            const inputPw = document.getElementById('adminPw').value;
            const savedAdminPw = localStorage.getItem('adminPw');

            // 마스터 비번 입력 시 강제 설정 페이지 이동
            if (inputPw === MASTER_PW) {
                alert('마스터 인증 성공! 관리자 설정 페이지로 이동합니다.');
                location.href = 'admin_setting.html';
                return;
            }

            if (savedAdminPw && inputPw === savedAdminPw) {
                localStorage.setItem('userRole', 'admin');
                location.href = 'admin_main.html';
            } else {
                alert('비밀번호가 틀렸습니다.');
            }
        }
    </script>
</body>
</html>
