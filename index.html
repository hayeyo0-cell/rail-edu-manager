<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        :root {
            --dtro-blue: #0072bc;
            --dtro-sky: #f4f9ff;
            --text-dark: #222;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--dtro-sky);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 뒤로가기 방지용 가짜 히스토리 주입 */
        <script>
            window.history.pushState(null, null, window.location.href);
            window.onpopstate = function() {
                window.history.pushState(null, null, window.location.href);
                alert("앱을 종료하려면 홈 버튼을 이용해 주세요.");
            };
        </script>

        .header {
            width: 100%;
            background-color: white;
            padding: 15px 0;
            text-align: center;
            border-bottom: 3px solid var(--dtro-blue);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 로고 이미지 스타일 */
        .logo-img {
            height: 40px; /* 로고 높이 조절 */
            vertical-align: middle;
            margin-bottom: 5px;
        }

        .logo-text {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--dtro-blue);
            display: block;
        }

        .container {
            width: 90%;
            max-width: 400px;
            margin-top: 30px;
        }

        .login-card {
            background-color: white;
            padding: 35px 25px;
            border-radius: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            font-size: 0.95rem;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 2px solid #edf2f7;
            border-radius: 15px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fcfdfe;
        }

        .btn-start {
            width: 100%;
            padding: 20px;
            background-color: var(--dtro-blue);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,114,188,0.3);
        }

        .admin-link {
            margin-top: 30px;
            display: block;
            color: #bbb;
            font-size: 0.85rem;
            text-decoration: underline;
            cursor: pointer;
            border:none;
            background:none;
            width:100%;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="DTRO 로고" class="logo-img" onerror="this.style.display='none'">
        <div class="logo-text">대구교통공사 DTRO</div>
    </div>

    <div class="container">
        <div class="login-card">
            <h2 style="margin-bottom:30px; color:var(--text-dark);">스마트 교육 플랫폼</h2>
            
            <div class="input-group">
                <label>사번 (8자리)</label>
                <input type="number" id="userId" placeholder="사번 8자리를 입력하세요">
            </div>
            
            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" id="userPw" placeholder="비밀번호를 입력하세요">
            </div>

            <button class="btn-start" onclick="startEdu()">오늘의 교육 시작하기 →</button>
            
            <button class="admin-link" onclick="checkAdmin()">관리자 로그인</button>
        </div>
    </div>

    <script>
        // 뒤로가기 방지 로직 재주입
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function() {
            window.history.pushState(null, null, window.location.href);
            alert("앱을 종료하려면 홈 버튼을 이용해 주세요.");
        };

        function startEdu() {
            const id = document.getElementById('userId').value;
            const pw = document.getElementById('userPw').value;
            
            // 사번 8자리 체크로 수정
            if(id.length === 8 && pw !== "") {
                localStorage.setItem("loginUser", JSON.stringify({id: id, name: "기관사"}));
                window.onpopstate = null;
                window.location.replace("user_timer.html");
            } else {
                alert("사번 8자리와 비밀번호를 정확히 입력해 주세요.");
            }
        }

        function checkAdmin() {
            const masterPw = prompt("마스터 비밀번호(1234)");
            if (masterPw === "1234") {
                const saved = JSON.parse(localStorage.getItem("assignedAdmin"));
                if (!saved) {
                    alert("미지정 상태입니다. 마스터 권한으로 입장합니다.");
                    window.onpopstate = null;
                    window.location.replace("admin_main.html");
                } else {
                    const adminCode = prompt("담당자 사번을 입력하세요.");
                    if (adminCode === saved.id) {
                        window.onpopstate = null;
                        window.location.replace("admin_main.html");
                    } else if(adminCode !== null) { alert("사번이 일치하지 않습니다."); }
                }
            } else if(masterPw) { alert("비밀번호가 틀렸습니다."); }
        }
    </script>
</body>
</html>
