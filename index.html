<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        
        html, body { height: 100%; overflow: hidden; }
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-gray); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; 
            align-items: center;
        }

        /* [핵심 수정] 상단 영역 초슬림화 및 배경색 복구 */
        .top-header-section {
            width: 100%;
            background-color: var(--bg-gray); /* 이전의 연회색 배경으로 복구 */
            padding: 15px 0 10px 0; /* 여백을 최소한으로 줄여서 아주 슬림하게 */
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 2px solid var(--dtro-blue); /* 파란색 하단 테두리 실선 */
            margin-bottom: 25px; /* 카드와의 간격도 최적화 */
        }

        /* [핵심 수정] 로고의 흰색 배경을 주변 배경과 강제로 합성 */
        .brand-logo { 
            height: 24px; /* 슬림한 헤더에 맞춰 크기 조절 */
            margin-bottom: 4px; 
            display: block;
            mix-blend-mode: multiply; /* [마법] 로고의 흰색 배경을 투명하게 만들어줌 */
        }

        .main-title { 
            font-size: 1.4rem; /* 헤더가 슬림해진 만큼 제목 크기도 적당히 조절 */
            font-weight: bold; 
            color: #222; 
            margin: 0; 
            letter-spacing: -1px;
            position: relative;
        }

        /* 제목 밑 은은한 형광펜 효과 */
        .main-title::after {
            content: "";
            position: absolute;
            bottom: 2px;
            left: 0;
            width: 100%;
            height: 6px;
            background-color: rgba(0, 114, 188, 0.15);
            border-radius: 3px;
            z-index: -1;
        }

        /* 로그인 카드 */
        .login-card { 
            width: 88%; 
            max-width: 380px; 
            background: white; 
            border-radius: 24px; 
            padding: 30px 24px 20px 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            text-align: center;
        }
        
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 5px; padding-left: 5px; }
        
        input, select { 
            width: 100%; height: 48px; padding: 0 15px; 
            border: 1px solid #e5e5e5; border-radius: 12px; 
            font-size: 0.95rem; background: #fafafa; outline: none;
            box-sizing: border-box;
        }

        .btn-start { 
            width: 100%; height: 55px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 14px; font-size: 1.1rem; font-weight: bold; 
            cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,114,188,0.2);
        }

        .admin-link { margin-top: 18px; display: inline-block; font-size: 0.75rem; color: #ccc; text-decoration: none; }
    </style>
</head>
<body>

    <div class="top-header-section">
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <h1 class="main-title">스마트 교육 플랫폼</h1>
    </div>

    <div class="login-card">
        <div class="input-group">
            <label>소속 선택</label>
            <select id="userDept">
                <option value="">소속을 선택하세요</option>
                <option value="경산승무팀">경산승무팀</option>
                <option value="월배승무팀">월배승무팀</option>
                <option value="안심승무팀">안심승무팀</option>
            </select>
        </div>

        <div class="input-group">
            <label>사번 (8자리)</label>
            <input type="number" id="userId" placeholder="사번 입력" inputmode="numeric">
        </div>

        <div class="input-group" style="margin-bottom: 25px;">
            <label>팀 공용 비밀번호</label>
            <input type="password" id="userPw" placeholder="비밀번호 입력">
        </div>

        <button class="btn-start" onclick="location.href='user_main.html'">
            교육 시작하기 →
        </button>

        <a href="admin_login.html" class="admin-link">관리자 로그인</a>
    </div>

</body>
</html>
