<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        
        /* 1. 전체 화면을 꽉 채우는 배치 */
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-gray); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; 
            justify-content: center; /* 세로 중앙 정렬 */
            align-items: center; 
            min-height: 100vh; 
        }

        /* 2. 제목 영역: 카드와 적절한 거리 유지 */
        .main-title { 
            font-size: 1.55rem; 
            font-weight: bold; 
            color: #222; 
            margin-bottom: 30px; /* 카드와의 간격 */
            letter-spacing: -1px; 
            text-align: center;
        }

        /* 3. 로그인 카드: 시각적 무게중심 */
        .login-card { 
            width: 88%; 
            max-width: 380px; 
            background: white; 
            border-radius: 24px; 
            padding: 35px 25px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.06); 
            text-align: center;
        }
        
        .input-group { text-align: left; margin-bottom: 22px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; color: #555; margin-bottom: 8px; padding-left: 4px; }
        
        input, select { 
            width: 100%; height: 52px; padding: 0 15px; border: 1px solid #e1e1e1; border-radius: 14px; 
            box-sizing: border-box; font-size: 1rem; background: #fafafa; outline: none;
        }
        input:focus, select:focus { border-color: var(--dtro-blue); background: #fff; }

        .btn-start { 
            width: 100%; height: 58px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 16px; font-size: 1.15rem; font-weight: bold; 
            cursor: pointer; margin-top: 10px; box-shadow: 0 6px 20px rgba(0,114,188,0.25);
        }

        .admin-link { margin-top: 25px; display: inline-block; font-size: 0.8rem; color: #aaa; text-decoration: none; border-bottom: 1px solid #eee; }

        /* 4. 하단 로고: 바닥에 붙이지 않고 카드 아래에 안착 */
        .bottom-logo-area {
            margin-top: 40px; /* 카드와의 적정 거리 */
            display: flex;
            justify-content: center;
            width: 100%;
        }
        .bottom-logo {
            height: 28px; /* 크기를 살짝 키워 선명하게 */
            filter: grayscale(1); /* 조금 더 차분한 느낌 (취향에 따라 제거 가능) */
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="main-title">스마트 교육 플랫폼</div>

    <div class="login-card">
        <div class="input-group">
            <label>소속 선택</label>
            <select id="userDept">
                <option value="">소속을 선택하세요</option>
                <option value="경산승무팀">경산승무팀</option>
                <option value="월배승무팀">월배승무팀</option>
                <option value="안심승무팀">안심승무팀</option>
            </select>
        </div>

        <div class="input-group">
            <label>사번 (8자리)</label>
            <input type="number" id="userId" placeholder="사번 입력" inputmode="numeric">
        </div>

        <div class="input-group" style="margin-bottom: 30px;">
            <label>팀 공용 비밀번호</label>
            <input type="password" id="userPw" placeholder="비밀번호 입력">
        </div>

        <button class="btn-start" onclick="location.href='user_main.html'">
            교육 시작하기 →
        </button>

        <a href="admin_login.html" class="admin-link">관리자 로그인</a>
    </div>

    <div class="bottom-logo-area">
        <img src="logo.png" class="bottom-logo" alt="대구교통공사 DTRO">
    </div>

</body>
</html>
