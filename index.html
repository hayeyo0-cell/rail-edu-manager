<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* [핵심 수정] 제목과 로고를 하나의 그룹으로 배치 */
        .title-container {
            margin: 70px 0 35px 0; /* 상단 여백 */
            text-align: center;
            position: relative;
            display: inline-block; /* 내용물 크기에 맞게 조절 */
        }

        .main-title { 
            font-size: 1.45rem; /* 기존보다 약간 작게 조절하여 정갈하게 */
            font-weight: bold; 
            color: #333; 
            letter-spacing: -1px;
            margin: 0;
            display: block;
        }

        /* [핵심 수정] 제목 우측 하단에 로고 배치 */
        .sub-logo { 
            height: 18px; /* 세련된 느낌을 주는 작은 크기 */
            margin-top: 8px; /* 제목과의 간격 */
            margin-left: auto; /* 우측 정렬 */
            display: block;
            opacity: 0.9;
        }

        .login-card { 
            width: 90%; 
            max-width: 400px; 
            background: white; 
            border-radius: 20px; 
            padding: 30px 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); 
            text-align: center;
        }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 7px; padding-left: 5px; }
        
        input, select { 
            width: 100%; height: 50px; padding: 0 15px; border: 1px solid #ddd; border-radius: 13px; 
            box-sizing: border-box; font-size: 0.95rem; background: #fafafa; outline: none; transition: 0.2s;
        }
        input:focus, select:focus { border-color: var(--dtro-blue); background: #fff; }

        .btn-start { 
            width: 100%; height: 55px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; 
            cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,114,188,0.25);
        }
        .btn-start:active { transform: scale(0.98); }

        .admin-link { margin-top: 25px; display: inline-block; font-size: 0.75rem; color: #ccc; text-decoration: none; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="title-container">
        <div class="main-title">스마트 교육 플랫폼</div>
        <img src="logo.png" class="sub-logo" alt="대구교통공사 DTRO">
    </div>

    <div class="login-card">
        <div class="input-group">
            <label>소속 선택</label>
            <select id="userDept">
                <option value="">소속을 선택하세요</option>
                <option value="경산승무팀">경산승무팀</option>
                <option value="월배승무팀">월배승무팀</option>
                <option value="안심승무팀">안심승무팀</option>
            </select>
        </div>

        <div class="input-group">
            <label>사번 (8자리)</label>
            <input type="number" id="userId" placeholder="사번 입력" inputmode="numeric">
        </div>

        <div class="input-group">
            <label>팀 공용 비밀번호</label>
            <input type="password" id="userPw" placeholder="비밀번호 입력">
        </div>

        <button class="btn-start" onclick="location.href='user_main.html'">
            교육 시작하기 →
        </button>

        <a href="admin_login.html" class="admin-link">관리자 페이지 이동</a>
    </div>

</body>
</html>
