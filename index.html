<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육</title>
    <style>
        :root { --dtro-blue: #0072bc; --dtro-sky: #f0f7ff; --text-dark: #333; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f4f9ff; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .header { width: 100%; background: white; padding: 25px 0; text-align: center; border-bottom: 3px solid var(--dtro-blue); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .logo-text { font-size: 1.5rem; font-weight: 800; color: var(--dtro-blue); letter-spacing: -1px; }
        .sub-text { font-size: 0.85rem; color: #666; margin-top: 5px; }

        .container { width: 90%; max-width: 400px; margin-top: 35px; }
        
        .login-card { background: white; padding: 35px 25px; border-radius: 25px; box-shadow: 0 15px 30px rgba(0,0,0,0.08); text-align: center; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.95rem; font-weight: bold; color: var(--text-dark); display: block; margin-bottom: 10px; margin-left: 5px; }
        input { width: 100%; padding: 16px; border: 2px solid #edf2f7; border-radius: 15px; font-size: 1rem; box-sizing: border-box; background-color: #fcfdfe; }
        input:focus { border-color: var(--dtro-blue); outline: none; background-color: white; }

        .btn-start { width: 100%; padding: 20px; background: var(--dtro-blue); color: white; border: none; border-radius: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 8px 20px rgba(0,114,188,0.3); }
        .btn-start:active { transform: scale(0.97); }

        .info-box { margin-top: 40px; background: #e9f2ff; padding: 18px; border-radius: 15px; color: #4a6fa5; font-size: 0.9rem; line-height: 1.6; border-left: 5px solid var(--dtro-blue); }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-text">DTRO SMART LEARNING</div>
        <div class="sub-text">대구교통공사와 함께하는 스마트한 세상</div>
    </div>

    <div class="container">
        <div class="login-card">
            <h2 style="margin-bottom: 30px; color: #1a1a1a; font-size: 1.4rem;">본인 확인</h2>
            <div class="input-group">
                <label>사번 입력</label>
                <input type="number" id="userId" placeholder="사번 8자리를 입력하세요">
            </div>
            <div class="input-group" style="margin-bottom: 30px;">
                <label>성명 입력</label>
                <input type="text" id="userName" placeholder="이름을 입력하세요">
            </div>
            <button class="btn-start" onclick="startEdu()">오늘의 교육 시작하기</button>
        </div>

        <div class="info-box">
            💡 <b>안내사항</b><br>
            교육 시작 시 자동으로 시간이 측정되며,<br>완료 후 <b>자필 서명</b>을 하셔야 이수 처리됩니다.
        </div>
    </div>

    <script>
        function startEdu() {
            const id = document.getElementById('userId').value;
            const name = document.getElementById('userName').value;
            
            if(!id || !name) {
                alert("사번과 성명을 모두 입력해주세요.");
                return;
            }
            
            // 정보 저장
            const user = { id: id, name: name };
            localStorage.setItem("loginUser", JSON.stringify(user));
            localStorage.setItem('currentEduTitle', "4월 전동차 시뮬레이션 및 고장처치");
            
            // 바로 타이머 화면으로 이동! (기존의 중복 로그인을 없앱니다)
            location.href = "user_timer.html"; 
        }
    </script>
</body>
</html>
