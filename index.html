<script>
    function checkAdmin() {
        const masterPw = prompt("1단계: 마스터 비밀번호(1234)");
        if (masterPw === "1234") {
            // 저장된 담당자 정보 불러오기
            const assigned = JSON.parse(localStorage.getItem("assignedAdmin"));
            
            if (!assigned) {
                // 담당자 지정 전이라면 마스터 권한으로 바로 입장
                alert("지정된 담당자가 없습니다. 마스터 권한으로 입장합니다.");
                window.onpopstate = null;
                location.replace("admin_main.html");
            } else {
                // 담당자가 지정되어 있다면 사번과 비번 확인
                const adminId = prompt("2단계: 지정된 담당자 사번을 입력하세요.");
                const adminPw = prompt("3단계: 지정된 관리 비밀번호를 입력하세요.");
                
                if (adminId === assigned.id && adminPw === assigned.pw) {
                    window.onpopstate = null;
                    location.replace("admin_main.html");
                } else {
                    alert("담당자 정보가 일치하지 않습니다.");
                }
            }
        } else if(masterPw) {
            alert("마스터 비밀번호가 틀렸습니다.");
        }
    }
</script>
