<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        
        /* 스크롤 방지 및 전체 중앙 정렬 */
        html, body { height: 100%; overflow: hidden; }
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-gray); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
        }

        /* 슬림한 제목 영역 */
        .main-title { 
            font-size: 1.5rem; font-weight: bold; color: #222; 
            margin-bottom: 25px; letter-spacing: -1px; 
            text-align: center;
        }

        /* 로그인 카드 */
        .login-card { 
            width: 88%; max-width: 380px; 
            background: white; border-radius: 24px; 
            padding: 30px 22px 20px 22px; /* 하단 패딩을 살짝 줄임 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            text-align: center;
            margin-bottom: 15px; /* 로고와의 간격 */
        }
        
        .input-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 6px; padding-left: 5px; }
        
        input, select { 
            width: 100%; height: 48px; padding: 0 15px; 
            border: 1px solid #e1e1e1; border-radius: 12px; 
            font-size: 0.95rem; background: #fafafa; outline: none;
        }

        .btn-start { 
            width: 100%; height: 55px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 14px; font-size: 1.1rem; font-weight: bold; 
            cursor: pointer; margin-top: 5px; box-shadow: 0 5px 15px rgba(0,114,188,0.25);
        }

        .admin-link { margin-top: 18px; display: inline-block; font-size: 0.75rem; color: #bbb; text-decoration: none; }

        /* [핵심 수정] 카드 하단 밀착 로고 */
        .footer-logo {
            height: 24px; /* 너무 작지 않게, 글씨가 잘 보이는 크기 */
            opacity: 0.8; /* 선명하게 */
            display: block;
        }
    </style>
</head>
<body>

    <h1 class="main-title">스마트 교육 플랫폼</h1>

    <div class="login-card">
        <div class="input-group">
            <label>소속 선택</label>
            <select id="userDept">
                <option value="">소속을 선택하세요</option>
                <option value="경산승무팀">경산승무팀</option>
                <option value="월배승무팀">월배승무팀</option>
                <option value="안심승무팀">안심승무팀</option>
            </select>
        </div>

        <div class="input-group">
            <label>사번 (8자리)</label>
            <input type="number" id="userId" placeholder="사번 입력" inputmode="numeric">
        </div>

        <div class="input-group" style="margin-bottom: 25px;">
            <label>팀 공용 비밀번호</label>
            <input type="password" id="userPw" placeholder="비밀번호 입력">
        </div>

        <button class="btn-start" onclick="location.href='user_main.html'">
            교육 시작하기 →
        </button>

        <a href="admin_login.html" class="admin-link">관리자 로그인</a>
    </div>

    <img src="logo.png" class="footer-logo" alt="DTRO">

</body>
</html>
