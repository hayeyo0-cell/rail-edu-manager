<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        
        /* [수정] 스크롤 없이 화면 전체를 활용 */
        html, body { height: 100%; overflow: hidden; }
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-gray); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; 
            align-items: center;
        }

        /* 초슬림 헤더 */
        .top-header-section {
            width: 100%;
            background-color: var(--bg-gray);
            padding: 12px 0 8px 0; /* 여백 더 축소 */
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 2px solid var(--dtro-blue);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .brand-logo { 
            height: 22px; 
            margin-bottom: 4px; 
            mix-blend-mode: multiply; /* 로고 배경 합성 */
        }

        .main-title { 
            font-size: 1.35rem; 
            font-weight: bold; 
            color: #222; 
            margin: 0; 
            letter-spacing: -1px;
        }

        /* [핵심 수정] 하단 빈 공간 문제를 해결하는 컨테이너 */
        .main-container {
            flex: 1; /* 남은 세로 공간을 차지 */
            display: flex;
            flex-direction: column;
            justify-content: center; /* 카드와 요소를 세로 중앙에 적절히 배치 */
            width: 100%;
            align-items: center;
            padding-bottom: 40px; /* 바닥에 너무 붙지 않게 살짝 띄움 */
        }

        /* 로그인 카드 */
        .login-card { 
            width: 88%; 
            max-width: 380px; 
            background: white; 
            border-radius: 24px; 
            padding: 30px 24px 22px 24px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.06); 
            text-align: center;
        }
        
        .input-group { text-align: left; margin-bottom: 16px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 6px; padding-left: 5px; }
        
        input, select { 
            width: 100%; height: 50px; padding: 0 15px; 
            border: 1px solid #e8e8e8; border-radius: 12px; 
            font-size: 1rem; background: #fafafa; outline: none;
            box-sizing: border-box;
        }

        .btn-start { 
            width: 100%; height: 56px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 15px; font-size: 1.15rem; font-weight: bold; 
            cursor: pointer; margin-top: 5px; box-shadow: 0 6px 20px rgba(0,114,188,0.2);
        }

        .admin-link { 
            margin-top: 25px; 
            display: inline-block; 
            font-size: 0.8rem; 
            color: #ccc; 
            text-decoration: none; 
            letter-spacing: -0.5px;
        }
    </style>
</head>
<body>

    <div class="top-header-section">
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <h1 class="main-title">스마트 교육 플랫폼</h1>
    </div>

    <div class="main-container">
        <div class="login-card">
            <div class="input-group">
                <label>소속 선택</label>
                <select id="userDept">
                    <option value="">소속을 선택하세요</option>
                    <option value="경산승무팀">경산승무팀</option>
                    <option value="월배승무팀">월배승무팀</option>
                    <option value="안심승무팀">안심승무팀</option>
                </select>
            </div>

            <div class="input-group">
                <label>사번 (8자리)</label>
                <input type="number" id="userId" placeholder="사번 입력" inputmode="numeric">
            </div>

            <div class="input-group" style="margin-bottom: 25px;">
                <label>팀 공용 비밀번호</label>
                <input type="password" id="userPw" placeholder="비밀번호 입력">
            </div>

            <button class="btn-start" onclick="location.href='user_main.html'">
                교육 시작하기 →
            </button>

            <a href="admin_login.html" class="admin-link">관리자 로그인</a>
        </div>
    </div>

</body>
</html>
