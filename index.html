<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 교육관리 시스템</title>
    <style>
        :root {
            --ks-color: #e74c3c; --my-color: #2ecc71;
            --wb-color: #e67e22; --as-color: #3498db;
        }
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #333; }
        .btn { width: 100%; padding: 1rem; margin: 0.5rem 0; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .btn-user { background: #333; color: white; }
        .btn-admin { background: #fff; color: #333; border: 2px solid #333; }
        .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1rem; }
        .btn-ks { background: var(--ks-color); color: white; }
        .btn-my { background: var(--my-color); color: white; }
        .btn-wb { background: var(--wb-color); color: white; }
        .btn-as { background: var(--as-color); color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card" id="start-node">
        <h1>스마트 교육관리</h1>
        <button class="btn btn-user" onclick="goStep2('user')">기관사 로그인</button>
        <button class="btn btn-admin" onclick="goStep2('admin')">관리자 로그인</button>
    </div>
    <div class="card hidden" id="team-select">
        <h1 id="select-title">소속 팀 선택</h1>
        <div class="team-grid">
            <button class="btn btn-ks" onclick="handleSelect('KS')">KS (경산)</button>
            <button class="btn btn-my" onclick="handleSelect('MY')">MY (문양)</button>
            <button class="btn btn-wb" onclick="handleSelect('WB')">WB (월배)</button>
            <button class="btn btn-as" onclick="handleSelect('AS') )">AS (안심)</button>
        </div>
        <button onclick="location.reload()" style="margin-top:20px; background:none; border:none; color:#666; text-decoration:underline;">뒤로가기</button>
    </div>
    <script>
        let role = '';
        function goStep2(selectedRole) {
            role = selectedRole;
            document.getElementById('start-node').classList.add('hidden');
            document.getElementById('team-select').classList.remove('hidden');
        }
        function handleSelect(team) {
            alert(team + " 팀 " + (role === 'user' ? '기관사' : '관리자') + " 로그인을 시작합니다.");
        }
    </script>
</body>
</html>
