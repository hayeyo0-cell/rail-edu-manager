<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        /* 대구교통공사 브랜드 색상 적용 */
        :root {
            --dtro-blue: #0072bc; /* 로고의 주색상 */
            --dtro-sky: #f4f9ff; /* 배경용 연한 파란색 */
            --text-dark: #222;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--dtro-sky);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 회사 로고 헤더 부분 */
        .header {
            width: 100%;
            background-color: #white;
            padding: 25px 0;
            text-align: center;
            border-bottom: 3px solid var(--dtro-blue);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--dtro-blue);
            letter-spacing: -1px;
        }

        .logo-text span {
            color: var(--text-dark);
            font-weight: 400;
            font-size: 1.1rem;
            margin-left: 5px;
        }

        .container {
            width: 90%;
            max-width: 400px;
            margin-top: 35px;
        }

        .login-card {
            background-color: white;
            padding: 35px 25px;
            border-radius: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            font-size: 0.95rem;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 2px solid #edf2f7;
            border-radius: 15px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fcfdfe;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--dtro-blue);
            outline: none;
            background-color: white;
        }

        .btn-start {
            width: 100%;
            padding: 20px;
            background-color: var(--dtro-blue);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,114,188,0.3);
            transition: 0.3s;
        }

        .btn-start:active {
            transform: translateY(2px);
            box-shadow: 0 4px 10px rgba(0,114,188,0.2);
        }

        .admin-link {
            margin-top: 30px;
            display: block;
            color: #bbb;
            font-size: 0.85rem;
            text-decoration: underline;
            cursor: pointer;
            border:none;
            background:none;
            width:100%;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-text">
            대구교통공사 <span>DTRO</span>
        </div>
    </div>

    <div class="container">
        <div class="login-card">
            <h2 style="margin-bottom:30px; color:var(--text-dark);">기관사 스마트 교육</h2>
            
            <div class="input-group">
                <label>사번 (7자리)</label>
                <input type="number" id="userId" placeholder="사번을 입력하세요 (예: 2005055)">
            </div>
            
            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" id="userPw" placeholder="비밀번호를 입력하세요">
            </div>

            <button class="btn-start" onclick="startEdu()">오늘의 교육 시작하기 →</button>
            
            <button class="admin-link" onclick="checkAdmin()">관리자(담당자) 로그인</button>
        </div>
    </div>

    <script>
        // 로그인 및 2단계 보안 로직은 기관사님이 사용하시던 그대로 유지했습니다.
        function startEdu() {
            const id = document.getElementById('userId').value;
            const pw = document.getElementById('userPw').value;
            
            // 실제 데이터 처리는 아직 안 하므로, 임시로 사번 7자리 입력 시 통과
            if(id.length === 7 && pw !== "") {
                localStorage.setItem("loginUser", JSON.stringify({id: id, name: "일반 기관사"}));
                location.href = "user_timer.html"; // 타이머 페이지로 이동
            } else {
                alert("사번 7자리와 비밀번호를 모두 입력해 주세요.");
            }
        }

        function checkAdmin() {
            const masterPw = prompt("관리자 시스템 비밀번호를 입력하세요.");
            if (masterPw === "1234") {
                const step2 = prompt("2단계: 관리자 전용 확인 코드를 입력하세요.");
                if (step2 === "20050552") {
                    location.href = "admin_main.html"; // 관리자 페이지로 이동
                } else {
                    alert("2단계 확인 코드가 틀렸습니다.");
                }
            } else if (masterPw !== null) {
                alert("관리자 비밀번호가 틀렸습니다.");
            }
        }
    </script>
</body>
</html>
