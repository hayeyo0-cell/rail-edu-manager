<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        
        /* 스크롤 방지 및 전체 배치 */
        html, body { height: 100%; overflow: hidden; }
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-gray); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }

        /* [핵심 수정] 제목 영역 슬림화 & 로고 모서리 배치 */
        .header-area { 
            position: relative; 
            width: 90%; 
            max-width: 380px; 
            margin-bottom: 15px; /* 제목과 카드 사이 간격 최소화 */
            padding-top: 10px;
        }

        .main-title { 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: #222; 
            margin: 0; 
            text-align: left; /* 좌측 정렬로 공간 확보 */
            letter-spacing: -1px;
        }

        /* [핵심 수정] 동그라미 친 우측 모서리 로고 */
        .corner-logo { 
            position: absolute; 
            top: 5px; 
            right: 0; 
            height: 20px; /* 슬림하고 선명하게 */
            opacity: 0.9;
        }

        /* 로그인 카드 높이 최적화 */
        .login-card { 
            width: 88%; 
            max-width: 380px; 
            background: white; 
            border-radius: 22px; 
            padding: 25px 22px 20px 22px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            text-align: center;
        }
        
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 5px; padding-left: 4px; }
        
        input, select { 
            width: 100%; height: 48px; padding: 0 15px; 
            border: 1px solid #e1e1e1; border-radius: 12px; 
            font-size: 0.95rem; background: #fafafa; outline: none;
            box-sizing: border-box;
        }

        .btn-start { 
            width: 100%; height: 55px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 14px; font-size: 1.1rem; font-weight: bold; 
            cursor: pointer; margin-top: 5px; box-shadow: 0 5px 15px rgba(0,114,188,0.2);
        }

        .admin-link { margin-top: 15px; display: inline-block; font-size: 0.75rem; color: #ccc; text-decoration: none; }
    </style>
</head>
<body>

    <div class="header-area">
        <h1 class="main-title">스마트 교육 플랫폼</h1>
        <img src="logo.png" class="corner-logo" alt="DTRO">
    </div>

    <div class="login-card">
        <div class="input-group">
            <label>소속 선택</label>
            <select id="userDept">
                <option value="">소속을 선택하세요</option>
                <option value="경산승무팀">경산승무팀</option>
                <option value="월배승무팀">월배승무팀</option>
                <option value="안심승무팀">안심승무팀</option>
            </select>
        </div>

        <div class="input-group">
            <label>사번 (8자리)</label>
            <input type="number" id="userId" placeholder="사번 입력" inputmode="numeric">
        </div>

        <div class="input-group" style="margin-bottom: 20px;">
            <label>팀 공용 비밀번호</label>
            <input type="password" id="userPw" placeholder="비밀번호 입력">
        </div>

        <button class="btn-start" onclick="location.href='user_main.html'">
            교육 시작하기 →
        </button>

        <a href="admin_login.html" class="admin-link">관리자 로그인</a>
    </div>

</body>
</html>
