<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8f9fb; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .main-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 30px; background: linear-gradient(to top, #d0e7f5 40%, transparent 40%); display: inline-block; padding: 0 5px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 15px; background: #0072bc; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="main-title">스마트 교육 플랫폼</div>
        <div id="adminForm">
            <div id="adminIdArea" style="display:none; text-align:left;">
                <label>관리자 사번</label>
                <input type="number" id="adminId" placeholder="사번 입력">
            </div>
            <label id="pwLabel">마스터 비밀번호(1234) 입력</label>
            <input type="password" id="adminPw" placeholder="비밀번호">
            <button class="login-btn" onclick="adminLogin()">관리자 인증</button>
        </div>
    </div>

    <script>
        window.onload = () => {
            const savedAdminId = localStorage.getItem('adminId');
            if (savedAdminId) {
                document.getElementById('adminIdArea').style.display = 'block';
                document.getElementById('pwLabel').innerText = "관리자 비밀번호";
            }
        };

        function adminLogin() {
            const inputId = document.getElementById('adminId').value;
            const inputPw = document.getElementById('adminPw').value;
            
            // 1. 마스터 비번 인증 (초기화 및 설정 진입)
            if (inputPw === "1234") {
                location.href = 'admin_setting.html';
                return;
            }

            // 2. 정식 관리자 로그인
            const savedId = localStorage.getItem('adminId');
            const savedPw = localStorage.getItem('adminPw');
            if (inputId === savedId && inputPw === savedPw) {
                location.href = 'admin_main.html';
            } else {
                alert("정보가 일치하지 않습니다.");
            }
        }
    </script>
</body>
</html>
