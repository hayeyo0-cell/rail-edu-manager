<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        
        /* 스크롤 방지 및 전체 중앙 정렬 */
        html, body { height: 100%; overflow: hidden; }
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-gray); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
        }

        /* [핵심 수정] 관리자 로그인 화면과 동일한 대형 로고 밸런스 */
        .brand-area { 
            text-align: center; 
            margin-bottom: 30px; 
            margin-top: -20px; /* 상단 여백 다이어트 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-logo { 
            height: 32px; /* 관리자 화면과 동일하게 키움 */
            margin-bottom: 12px; 
            opacity: 1;
        }

        .main-title { 
            font-size: 1.65rem; 
            font-weight: bold; 
            color: #222; 
            margin: 0; 
            letter-spacing: -1px;
            position: relative;
            display: inline-block;
        }

        /* 파란색 포인트 밑줄 (형광펜 효과) */
        .main-title::after {
            content: "";
            position: absolute;
            bottom: 3px;
            left: 0;
            width: 100%;
            height: 8px;
            background-color: rgba(0, 114, 188, 0.2);
            border-radius: 4px;
            z-index: -1;
        }

        /* 로그인 카드 디자인 최적화 */
        .login-card { 
            width: 88%; 
            max-width: 380px; 
            background: white; 
            border-radius: 24px; 
            padding: 35px 24px 25px 24px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.06); 
            text-align: center;
        }
        
        .input-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 6px; padding-left: 5px; }
        
        input, select { 
            width: 100%; height: 52px; padding: 0 15px; 
            border: 1px solid #e1e1e1; border-radius: 14px; 
            font-size: 1rem; background: #fafafa; outline: none;
            box-sizing: border-box;
        }
        input:focus, select:focus { border-color: var(--dtro-blue); background: #fff; }

        .btn-start { 
            width: 100%; height: 58px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 16px; font-size: 1.15rem; font-weight: bold; 
            cursor: pointer; margin-top: 10px; box-shadow: 0 6px 20px rgba(0,114,188,0.25);
        }
        .btn-start:active { transform: scale(0.98); }

        .admin-link { margin-top: 22px; display: inline-block; font-size: 0.75rem; color: #ccc; text-decoration: none; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="brand-area">
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <h1 class="main-title">스마트 교육 플랫폼</h1>
    </div>

    <div class="login-card">
        <div class="input-group">
            <label>소속 선택</label>
            <select id="userDept">
                <option value="">소속을 선택하세요</option>
                <option value="경산승무팀">경산승무팀</option>
                <option value="월배승무팀">월배승무팀</option>
                <option value="안심승무팀">안심승무팀</option>
            </select>
        </div>

        <div class="input-group">
            <label>사번 (8자리)</label>
            <input type="number" id="userId" placeholder="사번 입력" inputmode="numeric">
        </div>

        <div class="input-group" style="margin-bottom: 30px;">
            <label>팀 공용 비밀번호</label>
            <input type="password" id="userPw" placeholder="비밀번호 입력">
        </div>

        <button class="btn-start" onclick="location.href='user_main.html'">
            교육 시작하기 →
        </button>

        <a href="admin_login.html" class="admin-link">관리자 로그인</a>
    </div>

</body>
</html>
