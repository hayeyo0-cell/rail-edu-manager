<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* [핵심 수정] 로그인 페이지 로고 영역 */
        .logo-container { 
            width: 100%; 
            background: white; 
            padding: 50px 0 40px 0; /* 상하 여백을 줘서 로고를 주인공으로 만듦 */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border-bottom: 1px solid #eee;
            margin-bottom: 40px;
        }
        .main-logo { 
            height: 45px; /* 로고를 훨씬 크게 키움 */
            display: block; 
        }

        .login-card { 
            width: 90%; 
            max-width: 400px; 
            background: white; 
            border-radius: 20px; 
            padding: 30px 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            text-align: center;
        }
        
        .welcome-text { font-size: 1.3rem; font-weight: bold; margin-bottom: 25px; color: #333; }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 8px; padding-left: 5px; }
        
        input, select { 
            width: 100%; height: 50px; padding: 0 15px; border: 1px solid #ddd; border-radius: 12px; 
            box-sizing: border-box; font-size: 1rem; background: #fafafa; outline: none; transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--dtro-blue); background: #fff; box-shadow: 0 0 8px rgba(0,114,188,0.1); }

        .btn-start { 
            width: 100%; height: 55px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; 
            cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,114,188,0.3);
        }
        .btn-start:active { transform: scale(0.98); }

        .admin-link { margin-top: 25px; display: inline-block; font-size: 0.85rem; color: #999; text-decoration: none; border-bottom: 1px solid #ddd; padding-bottom: 2px; }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" class="main-logo" alt="대구교통공사 DTRO">
    </div>

    <div class="login-card">
        <div class="welcome-text">스마트 교육 플랫폼</div>
        
        <div class="input-group">
            <label>소속 선택</label>
            <select id="userDept">
                <option value="">소속을 선택하세요</option>
                <option value="경산승무팀">경산승무팀</option>
                <option value="월배승무팀">월배승무팀</option>
                <option value="안심승무팀">안심승무팀</option>
            </select>
        </div>

        <div class="input-group">
            <label>사번 (8자리)</label>
            <input type="number" id="userId" placeholder="사번 입력" inputmode="numeric">
        </div>

        <div class="input-group">
            <label>팀 공용 비밀번호</label>
            <input type="password" id="userPw" placeholder="비밀번호 입력">
        </div>

        <button class="btn-start" onclick="location.href='user_main.html'">
            교육 시작하기 →
        </button>

        <a href="admin_login.html" class="admin-link">관리자 로그인</a>
    </div>

</body>
</html>
