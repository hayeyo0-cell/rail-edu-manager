<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 교육관리 시스템</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 380px; text-align: center; }
        h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #333; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.9rem; color: #666; margin-bottom: 5px; font-weight: bold; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn-login { width: 100%; padding: 15px; background: #333; color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .mode-select { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-size: 0.9rem; }
        .active { background: #333; color: white; border-color: #333; }
    </style>
</head>
<body>

<div class="card">
    <h1 id="title">기관사 교육관리</h1>
    
    <div class="mode-select">
        <button id="btn-user" class="mode-btn active" onclick="setMode('user')">기관사</button>
        <button id="btn-admin" class="mode-btn" onclick="setMode('admin')">관리자</button>
    </div>

    <div class="input-group">
        <label>소속 사업소</label>
        <select id="team-select" onchange="checkAdminStatus()">
            <option value="">사업소를 선택하세요</option>
            <option value="KS">KS (경산)</option>
            <option value="MY">MY (문양)</option>
            <option value="WB">WB (월배)</option>
            <option value="AS">AS (안심)</option>
        </select>
    </div>

    <div class="input-group" id="id-group">
        <label id="id-label">사번</label>
        <input type="text" id="id-input" placeholder="사번을 입력하세요">
    </div>

    <div class="input-group">
        <label>비밀번호</label>
        <input type="password" id="pw-input" placeholder="비밀번호를 입력하세요">
    </div>

    <button class="btn-login" onclick="handleLogin()">로그인</button>
</div>

<script>
    const commonUser = {id: "20050552", name: "테스터", pw: "1234"};
    const userDB = { "KS": [commonUser], "MY": [commonUser], "WB": [commonUser], "AS": [commonUser] };

    let currentMode = 'user';

    // 관리자 등록 여부에 따라 사번 칸 숨기기/보이기
    function checkAdminStatus() {
        const team = document.getElementById('team-select').value;
        const idGroup = document.getElementById('id-group');
        
        if (currentMode === 'admin' && team) {
            const savedAdmin = localStorage.getItem(`adminConfig_${team}`);
            idGroup.style.display = savedAdmin ? "block" : "none";
        } else {
            idGroup.style.display = "block";
        }
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btn-user').classList.toggle('active', mode === 'user');
        document.getElementById('btn-admin').classList.toggle('active', mode === 'admin');
        document.getElementById('title').innerText = mode === 'user' ? '기관사 교육관리' : '관리자 교육관리';
        document.getElementById('id-label').innerText = mode === 'user' ? '사번' : '관리자 사번';
        checkAdminStatus();
    }

    function handleLogin() {
        const team = document.getElementById('team-select').value;
        const id = document.getElementById('id-input').value;
        const pw = document.getElementById('pw-input').value;

        if(!team || !pw) { alert("소속과 비밀번호를 입력해주세요."); return; }

        if(currentMode === 'user') {
            const user = userDB[team].find(u => u.id === id && u.pw === pw);
            if(user) {
                localStorage.setItem("loginUser", JSON.stringify({ ...user, team: team }));
                window.location.href = "user_main.html";
            } else { alert("정보가 틀렸습니다."); }
        } else {
            const savedAdmin = JSON.parse(localStorage.getItem(`adminConfig_${team}`));
            if (!savedAdmin) {
                if (pw === "1234") {
                    localStorage.setItem("tempAdminAccess", team);
                    window.location.href = "admin_register.html";
                } else { alert("초기비밀번호는 1234입니다."); }
            } else {
                if (id === savedAdmin.id && pw === savedAdmin.pw) {
                    localStorage.setItem("loginAdmin", team);
                    window.location.href = "admin_main.html";
                } else { alert("관리자 정보가 틀립니다."); }
            }
        }
    }
</script>

</body>
</html>
