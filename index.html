<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 데이터 초기화</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f4f9ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 350px; }
        h2 { color: #e74c3c; margin-bottom: 20px; }
        p { color: #666; font-size: 0.9rem; line-height: 1.6; margin-bottom: 30px; }
        .btn-reset { width: 100%; padding: 20px; background: #e74c3c; color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3); }
    </style>
</head>
<body>
    <div class="card">
        <h2>⚠️ 담당자 설정 초기화</h2>
        <p>담당자 사번을 잘못 입력하여 로그인이 안 되시나요?<br>아래 버튼을 누르면 다시 <b>마스터 비밀번호(1234)</b>만으로 접속 가능한 상태가 됩니다.</p>
        
        <button class="btn-reset" onclick="resetData()">잘못된 정보 삭제하기</button>
    </div>

    <script>
        function resetData() {
            // 잘못 저장된 관리자 정보를 브라우저에서 강제로 지웁니다.
            localStorage.removeItem("assignedAdmin");
            alert("초기화 완료! 이제 다시 로그인 화면으로 이동합니다.");
            
            // 다시 원래의 로그인 로직이 있는 페이지로 돌아가게 합니다.
            // (이 코드를 적용한 후에 다시 정상 index.html로 덮어쓰기 해주셔야 합니다.)
            location.reload();
        }
    </script>
</body>
</html>
