<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* [핵심 수정] 빈 공간은 줄이고 로고만 선명하게 */
        .logo-container { 
            width: 100%; 
            background: white; 
            padding: 15px 0; /* 여백을 50px -> 15px로 대폭 축소 */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border-bottom: 1px solid #eee;
            margin-bottom: 20px; /* 카드와의 간격도 최적화 */
        }
        .main-logo { 
            height: 42px; /* 글씨는 여전히 크고 선명하게 */
            display: block; 
        }

        .login-card { 
            width: 90%; 
            max-width: 400px; 
            background: white; 
            border-radius: 20px; 
            padding: 25px 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            text-align: center;
        }
        
        .welcome-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; color: #333; }
        
        .input-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 6px; padding-left: 5px; }
        
        input, select { 
            width: 100%; height: 48px; padding: 0 15px; border: 1px solid #ddd; border-radius: 12px; 
            box-sizing: border-box; font-size: 0.95rem; background: #fafafa; outline: none;
        }
        input:focus, select:focus { border-color: var(--dtro-blue); background: #fff; }

        .btn-start { 
            width: 100%; height: 52px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 15px; font-size: 1.05rem; font-weight: bold; 
            cursor: pointer; margin-top: 5px; box-shadow: 0 5px 15px rgba(0,114,188,0.25);
        }

        .admin-link { margin-top: 20px; display: inline-block; font-size: 0.8rem; color: #bbb; text-decoration: none; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" class="main-logo" alt="대구교통공사 DTRO">
    </div>

    <div class="login-card">
        <div class="welcome-text">스마트 교육 플랫폼</div>
        
        <div class="input-group">
            <label>소속 선택</label>
            <select id="userDept">
                <option value="">소속을 선택하세요</option>
                <option value="경산승무팀">경산승무팀</option>
                <option value="월배승무팀">월배승무팀</option>
                <option value="안심승무팀">안심승무팀</option>
            </select>
        </div>

        <div class="input-group">
            <label>사번 (8자리)</label>
            <input type="number" id="userId" placeholder="사번 입력" inputmode="numeric">
        </div>

        <div class="input-group">
            <label>팀 공용 비밀번호</label>
            <input type="password" id="userPw" placeholder="비밀번호 입력">
        </div>

        <button class="btn-start" onclick="location.href='user_main.html'">
            교육 시작하기 →
        </button>

        <a href="admin_login.html" class="admin-link" style="font-size: 0.7rem;">관리자 페이지 이동</a>
    </div>

</body>
</html>
