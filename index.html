<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 스마트 교육 플랫폼</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="승무교육">

    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* 스플래시 화면 */
        #splashScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999;
            cursor: pointer;
        }
        .splash-logo { width: 180px; height: auto; margin-bottom: 20px; object-fit: contain; }
        .splash-text { font-size: 1.5rem; font-weight: bold; color: #222; }
        .tap-msg { font-size: 0.9rem; color: #999; margin-top: 15px; animation: blink 1.5s infinite; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .login-card { 
            width: 90%; max-width: 400px; background: white; padding: 45px 25px; 
            border-radius: 30px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); 
            text-align: center; display: none; 
        }
        .login-card.show { display: block; animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .logo-area img { width: 180px; height: auto; margin-bottom: 20px; object-fit: contain; }
        .main-title { display: inline-block; font-size: 1.5rem; font-weight: bold; color: #222; margin-bottom: 30px; background: linear-gradient(to top, rgba(0, 114, 188, 0.2) 40%, transparent 40%); padding: 0 5px; }
        .tab-menu { display: flex; margin-bottom: 25px; background: #f0f0f0; border-radius: 15px; padding: 5px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: none; color: #999; }
        .tab-btn.active { background: white; color: var(--dtro-blue); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input-group { text-align: left; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 1rem; background: #fafafa; outline: none; }
        .login-btn { width: 100%; padding: 16px; background: var(--dtro-blue); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .exit-btn { width: 100%; padding: 12px; background: none; color: #bbb; border: none; font-size: 0.85rem; font-weight: bold; cursor: pointer; margin-top: 20px; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="splashScreen" onclick="transitionToLogin()">
        <img src="logo.png" class="splash-logo" alt="DTRO">
        <div class="splash-text">스마트 교육 플랫폼</div>
        <div class="tap-msg">화면을 터치하여 시작하세요</div>
    </div>

    <div class="login-card" id="loginCard">
        <div class="logo-area"><img src="logo.png" alt="DTRO"></div>
        <div class="main-title">스마트 교육 플랫폼</div>
        
        <div class="tab-menu">
            <button id="userTab" class="tab-btn active" onclick="switchTab('user')">사용자 로그인</button>
            <button id="adminTab" class="tab-btn" onclick="switchTab('admin')">관리자 모드</button>
        </div>

        <div id="userForm">
            <input type="number" id="userId" placeholder="사번 입력" inputmode="numeric" style="margin-bottom:10px;">
            <input type="password" id="userPw" placeholder="비밀번호 입력">
            <button class="login-btn" onclick="userLogin()">교육 시작하기 →</button>
        </div>

        <div id="adminForm" style="display: none;">
            <input type="number" id="adminId" placeholder="관리자 사번" inputmode="numeric" id="adminIdArea" style="display:none; margin-bottom:10px;">
            <input type="password" id="adminPw" placeholder="비밀번호 입력">
            <button class="login-btn" onclick="adminLogin()">관리자 인증</button>
        </div>

        <button class="exit-btn" onclick="exitApp()">앱 종료</button>
    </div>

    <script>
        // 🚨 [필살기] 뒤로가기 시 무조건 index.html로 강제 소환
        function activateDefense() {
            window.history.pushState(null, null, window.location.href);
        }

        function transitionToLogin() {
            const splash = document.getElementById('splashScreen');
            const card = document.getElementById('loginCard');
            activateDefense(); // 터치하는 순간 방어막 생성
            
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                card.classList.add('show');
                sessionStorage.setItem('isSplashShown', 'true');
            }, 500);
        }

        window.onload = function() {
            if (sessionStorage.getItem('isSplashShown')) {
                document.getElementById('splashScreen').style.display = 'none';
                document.getElementById('loginCard').classList.add('show');
                activateDefense();
            }
        };

        // 🚨 뒤로가기 클릭 시 강제 새로고침 (이탈 원천 봉쇄)
        window.onpopstate = function() {
            alert("앱 종료는 하단의 '앱 종료' 버튼을 이용해 주세요.");
            location.replace('index.html'); // 이전 페이지로 가는 대신 현재 페이지를 다시 그림
        };

        function exitApp() {
            if(confirm("앱을 종료하시겠습니까?")) {
                window.close();
                setTimeout(() => { alert("브라우저의 탭 닫기 버튼을 눌러 종료해 주세요."); }, 300);
            }
        }

        function switchTab(mode) {
            const isUser = (mode === 'user');
            document.getElementById('userTab').classList.toggle('active', isUser);
            document.getElementById('adminTab').classList.toggle('active', !isUser);
            document.getElementById('userForm').style.display = isUser ? 'block' : 'none';
            document.getElementById('adminForm').style.display = isUser ? 'none' : 'block';
        }

        function userLogin() {
            const id = document.getElementById('userId').value;
            const pw = document.getElementById('userPw').value;
            const list = JSON.parse(localStorage.getItem('totalUserList')) || [];
            const sPw = localStorage.getItem('teamPw') || "1234";
            const user = list.find(u => String(u.id) === String(id));
            if (!user) return alert("명단에 없는 사번입니다.");
            if (pw !== sPw) return alert("비밀번호가 틀렸습니다.");
            localStorage.setItem('currentUserDept', user.dept);
            localStorage.setItem('currentUserName', user.name);
            localStorage.setItem('currentUserId', user.id);
            location.replace('user_main.html');
        }

        function adminLogin() {
            const id = document.getElementById('adminId').value;
            const pw = document.getElementById('adminPw').value;
            const sId = localStorage.getItem('adminId');
            const sPw = localStorage.getItem('adminPw');
            if (sId && String(id) === String(sId) && pw === sPw) { location.replace('admin_main.html'); return; }
            if (pw === "1234") { location.replace('admin_setup_auth.html'); return; }
            alert("정보가 틀렸습니다.");
        }
    </script>
</body>
</html>
