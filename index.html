<script>
    // 페이지 진입 시 히스토리 스택 초기화
    window.onload = function() {
        history.pushState(null, null, location.href);
        window.onpopstate = function() { history.pushState(null, null, location.href); };
    };

    function startEdu() {
        const id = document.getElementById('userId').value;
        const pw = document.getElementById('userPw').value;
        if(id === "20050552" && pw === "1234") {
            localStorage.setItem("loginUser", JSON.stringify({id: id, name: "테스트 기관사"}));
            window.onpopstate = null; // 뒤로가기 차단 해제
            location.replace("user_timer.html"); // 현재 기록을 덮어씀
        } else {
            alert("사번 또는 비밀번호가 틀렸습니다.");
        }
    }

    function checkAdmin() {
        const masterPw = prompt("1단계: 관리자 마스터 비밀번호를 입력하세요.");
        if (masterPw === "1234") {
            const adminCode = prompt("2단계: 관리자 사번(확인 코드)을 입력하세요.");
            if (adminCode === "20050552") {
                window.onpopstate = null;
                location.replace("admin_main.html"); // 현재 기록을 덮어씀
            } else if(adminCode) { alert("사번이 일치하지 않습니다."); }
        } else if(masterPw) { alert("비밀번호가 틀렸습니다."); }
    }
</script>
