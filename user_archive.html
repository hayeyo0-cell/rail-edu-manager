<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이수 완료 보관함 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        .top-nav { width: 100%; background: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-bottom: 1px solid #eee; }
        .nav-btn { background: white; border: 1px solid #eaeaea; border-radius: 8px; padding: 8px 15px; font-size: 0.85rem; color: #555; cursor: pointer; font-weight: bold; }
        
        .brand-logo { height: 42px; object-fit: contain; }

        .container { width: 92%; max-width: 420px; padding: 25px 0; }
        .section-title { font-size: 1.3rem; font-weight: bold; color: #333; margin-bottom: 20px; text-align: left; width: 100%; }

        /* 🚨 터치할 수 있다는 걸 보여주기 위해 클릭 효과 추가 */
        .archive-item { 
            background: white; border-radius: 20px; padding: 20px; 
            margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); 
            display: flex; flex-direction: column; text-align: left; border-left: 5px solid #27ae60;
            cursor: pointer; transition: transform 0.1s;
        }
        .archive-item:active { transform: scale(0.98); background: #f9fbfd; }
        
        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .comp-badge { font-size: 0.75rem; color: #27ae60; font-weight: bold; background: #e8f5e9; padding: 3px 8px; border-radius: 5px; }
        .item-title { font-size: 1.1rem; font-weight: bold; color: #333; margin-bottom: 5px; }
        .empty-msg { text-align: center; color: #bbb; padding: 60px 0; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="nav-btn" onclick="location.replace('user_main.html')">← 메인으로</button>
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <div style="width:75px;"></div>
    </div>

    <div class="container">
        <div class="section-title">📦 나의 이수 완료 내역</div>
        <div id="archiveList"></div>
    </div>

    <script>
        function preventBack() { window.history.pushState(null, null, window.location.href); }

        window.onload = function() {
            preventBack();
            const myId = localStorage.getItem('currentUserId');
            if(!myId) { 
                alert("로그인 정보가 없습니다.");
                location.replace('index.html'); 
                return; 
            }
            renderArchive();
        };

        window.onpopstate = function() { preventBack(); location.replace('user_main.html'); };
        document.body.onclick = function() { preventBack(); };

        function renderArchive() {
            const myId = localStorage.getItem('currentUserId');
            const archiveListDiv = document.getElementById('archiveList');
            const completedList = JSON.parse(localStorage.getItem('completedEduList')) || [];
            const totalEduList = JSON.parse(localStorage.getItem('totalEduList')) || [];
            
            const myCompleted = completedList.filter(c => String(c.userId) === String(myId));

            if (myCompleted.length === 0) {
                archiveListDiv.innerHTML = '<div class="empty-msg">🎉 아직 이수 완료한 내역이 없습니다.</div>';
                return;
            }

            let html = '';
            myCompleted.reverse().forEach(item => {
                const edu = totalEduList.find(e => String(e.id) === String(item.eduId));
                const title = edu ? edu.title : "삭제된 교육 과정";
                
                // 🚨 undefined 오류 해결: edu.type 대신 edu.category 사용
                const info = edu ? `${edu.dept} | ${edu.category || '분류 없음'}` : "상세 정보 없음";
                
                // 🚨 살아있는 교육은 상세페이지로 이동(review=true 꼬리표 달기), 지워진 건 알림창 띄우기
                const clickAction = edu ? `onclick="revisitEdu('${item.eduId}')"` : `onclick="alert('관리자에 의해 삭제되거나 기한이 만료된 교육입니다.')"`;

                html += `
                    <div class="archive-item" ${clickAction}>
                        <div class="item-header">
                            <span class="comp-badge">이수 완료</span>
                            <span style="font-size:0.8rem; color:#999;">완료일: ${item.completedDate || '기록없음'}</span>
                        </div>
                        <div class="item-title">${title}</div>
                        <div style="font-size:0.85rem; color:#666;">${info}</div>
                    </div>
                `;
            });
            archiveListDiv.innerHTML = html;
        }

        // 🚨 다시 보기 기능 연결
        function revisitEdu(eduId) {
            // review=true 꼬리표를 달아서 상세 페이지가 "아! 복습하러 온 거구나" 알게 함
            window.location.replace(`user_edu_detail.html?id=${eduId}&review=true`);
        }
    </script>
</body>
</html>
