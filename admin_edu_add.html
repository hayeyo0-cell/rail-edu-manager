<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>새 교육 등록 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .top-nav { width: 100%; background: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .nav-btn { background: white; border: 1px solid #eaeaea; border-radius: 8px; padding: 8px 15px; font-size: 0.85rem; color: #555; cursor: pointer; font-weight: bold; }
        .brand-logo { height: 42px; object-fit: contain; }
        
        .container { width: 92%; max-width: 450px; padding: 25px 0; padding-bottom: 60px; }
        .edu-card { background: white; border-radius: 25px; padding: 30px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); box-sizing: border-box; }
        
        .card-title { font-size: 1.4rem; font-weight: bold; color: var(--dtro-blue); margin-bottom: 25px; display: block; text-align: center; }
        .dept-info-box { background: #f0f7ff; color: var(--dtro-blue); padding: 14px; border-radius: 12px; font-size: 0.95rem; margin-bottom: 25px; text-align: center; border: 1px dashed #bcdcff; }
        
        .input-label { font-size: 0.95rem; font-weight: bold; color: #333; margin: 20px 0 8px 5px; display: block; text-align: left; }
        
        select, input[type="text"], input[type="date"], textarea { 
            width: 100%; padding: 15px; border: 1px solid #e2e8f0; border-radius: 12px; 
            box-sizing: border-box; font-size: 1rem; background: #f8fafc; outline: none; transition: 0.2s; 
        }
        select:focus, input:focus, textarea:focus { border-color: var(--dtro-blue); background: #fff; box-shadow: 0 0 0 3px rgba(0,114,188,0.05); }
        
        .radio-group-col { display: flex; flex-direction: column; gap: 10px; padding: 5px 0; }
        .radio-item { 
            display: flex; align-items: center; justify-content: flex-start; gap: 12px; 
            background: #f8fafc; border: 1px solid #e2e8f0; padding: 16px; border-radius: 12px; 
            cursor: pointer; font-size: 1rem; color: #444; font-weight: bold; transition: 0.2s; 
        }
        .radio-item input { width: 22px; height: 22px; cursor: pointer; margin: 0; accent-color: var(--dtro-blue); flex-shrink: 0; }
        .radio-item.active { border-color: var(--dtro-blue); background: #f0f7ff; color: var(--dtro-blue); }

        .file-upload-wrapper { position: relative; width: 100%; margin-top: 5px; }
        .file-upload-btn { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; 
            width: 100%; padding: 20px; border: 2px dashed #cbd5e1; border-radius: 12px; background: #f8fafc; 
            color: #64748b; font-weight: bold; cursor: pointer; transition: 0.2s; box-sizing: border-box;
        }
        .file-upload-wrapper input[type="file"] { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .file-name-display { margin-top: 10px; font-size: 0.9rem; color: var(--dtro-blue); font-weight: bold; text-align: center; display: none; background: #e0f2fe; padding: 10px; border-radius: 8px; word-break: break-all; }

        .save-btn { width: 100%; padding: 18px; background: var(--dtro-blue); color: white; border: none; border-radius: 15px; font-size: 1.15rem; font-weight: bold; margin-top: 35px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,114,188,0.2); transition: transform 0.1s; }
        .save-btn:active { transform: scale(0.98); box-shadow: none; }
        
        /* 알림 뱃지 스타일 */
        .sim-badge { background: #ff4757; color: white; font-size: 0.75rem; padding: 2px 8px; border-radius: 50px; margin-left: 5px; vertical-align: middle; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="nav-btn" onclick="goBack()">← 메인으로</button>
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <div style="width:75px;"></div>
    </div>

    <div class="container">
        <div class="edu-card">
            <span class="card-title">✍️ 새 교육 및 훈련 등록</span>
            <div class="dept-info-box">📍 담당 소속: <strong id="currentDept">경산승무팀</strong></div>

            <label class="input-label">교육 분류</label>
            <select id="eduType">
                <option value="게시교육">게시교육</option>
                <option value="대면교육">대면교육</option>
                <option value="면담교육">면담교육</option>
                <option value="기타교육">기타교육</option>
                <option value="지시사항">지시사항</option>
                <option value="시뮬레이션 교육">시뮬레이션 교육 (자동 시간기록)</option>
                <option value="육성방송 훈련">육성방송 훈련</option>
            </select>

            <label class="input-label">교육 제목</label>
            <input type="text" id="eduTitle" placeholder="제목을 입력하세요">

            <label class="input-label">⌛ 제출 마감일</label>
            <input type="date" id="eduDeadline">

            <label class="input-label">📝 앱 내 이수(확인) 방식</label>
            <div class="radio-group-col" id="sigGroup">
                <label class="radio-item" id="labelSigYes">
                    <input type="radio" name="needSig" value="서명 필요" onclick="updateRadioUI()"> 
                    ✍️ 서명 후 이수 (앱에서 직접 서명)
                </label>
                <label class="radio-item active" id="labelSigNo">
                    <input type="radio" name="needSig" value="단순 확인" checked onclick="updateRadioUI()"> 
                    ✔️ 단순 확인 (서명없이 이수완료만 누름)
                </label>
                <label class="radio-item" id="labelOffline">
                    <input type="radio" name="needSig" value="오프라인" onclick="updateRadioUI()"> 
                    📢 오프라인 교육 (서명/이수 버튼 없음)
                </label>
            </div>

            <label class="input-label">상세 교육내용</label>
            <textarea id="eduContent" rows="6" placeholder="상세 내용을 입력하세요"></textarea>

            <label class="input-label">📎 파일 첨부 (PDF 권장, 최대 2MB)</label>
            <div class="file-upload-wrapper">
                <div class="file-upload-btn">
                    <span style="font-size: 1.5rem;">📥</span>
                    <span>여기를 터치하여 파일 선택</span>
                </div>
                <input type="file" id="eduFile" accept="image/*, .pdf, .hwp">
            </div>
            <div id="fileNameDisplay" class="file-name-display"></div>

            <button class="save-btn" onclick="saveEdu()">설정 저장 및 배포</button>
        </div>
    </div>

    <script>
        let isMoving = false;
        (function() {
            history.pushState(null, null, location.href);
            window.addEventListener('popstate', function() {
                if(isMoving) return;
                goBack();
            });
        })();

        function goBack() {
            isMoving = true;
            location.replace('admin_main.html');
        }

        const myDept = localStorage.getItem('userDept') || "소속 미지정";
        document.getElementById('currentDept').innerText = myDept;

        function updateRadioUI() {
            const val = document.querySelector('input[name="needSig"]:checked').value;
            document.getElementById('labelSigYes').classList.toggle('active', val === '서명 필요');
            document.getElementById('labelSigNo').classList.toggle('active', val === '단순 확인');
            document.getElementById('labelOffline').classList.toggle('active', val === '오프라인');
        }

        let selectedFileData = ""; 
        document.getElementById('eduFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const nameDisplay = document.getElementById('fileNameDisplay');
            
            if (file) {
                if (file.size > 2 * 1024 * 1024) {
                    alert("⚠️ 파일 용량이 너무 큽니다! (최대 2MB 제한)");
                    this.value = ''; 
                    nameDisplay.style.display = 'none';
                    selectedFileData = "";
                    return;
                }
                nameDisplay.innerText = `📎 첨부됨: ${file.name}`;
                nameDisplay.style.display = 'block';

                const reader = new FileReader();
                reader.onload = function(event) { selectedFileData = event.target.result; };
                reader.readAsDataURL(file);
            }
        });

        function saveEdu() {
            const title = document.getElementById('eduTitle').value.trim();
            const content = document.getElementById('eduContent').value.trim();
            const sigType = document.querySelector('input[name="needSig"]:checked').value;
            const eduType = document.getElementById('eduType').value;
            let deadline = document.getElementById('eduDeadline').value || "기한 없음";

            if(!title || !content) { 
                alert("제목과 상세 내용을 필수로 입력해 주세요!"); 
                return; 
            }

            // --- 시뮬레이션 교육용 랜덤 데이터 생성 로직 ---
            let simulationData = null;
            if (eduType === "시뮬레이션 교육") {
                // 30분(1800초) ~ 40분(2400초) 사이의 무작위 목표시간 설정
                const randomGoalSeconds = Math.floor(Math.random() * (2400 - 1800 + 1)) + 1800;
                simulationData = {
                    isSimulation: true,
                    goalSeconds: randomGoalSeconds,
                    passScore: 60,
                    totalQuestions: 10
                };
            }

            const totalEduList = JSON.parse(localStorage.getItem('totalEduList')) || [];
            
            try {
                totalEduList.push({
                    id: Date.now(),
                    dept: myDept,
                    category: eduType,
                    title: title,
                    content: content,
                    deadline: deadline,
                    signatureType: sigType, 
                    fileData: selectedFileData,
                    simulation: simulationData, // 시뮬레이션 전용 데이터 추가
                    date: new Date().toLocaleDateString()
                });

                localStorage.setItem('totalEduList', JSON.stringify(totalEduList));
                
                const msg = eduType === "시뮬레이션 교육" 
                    ? "🎮 시뮬레이션 교육이 설정되었습니다.\n(사용자 앱에서 30~40분 랜덤 기록 및 10문제 퀴즈 작동)"
                    : "🎉 교육 등록이 완료되었습니다!";
                
                alert(msg);
                isMoving = true;
                location.replace('admin_main.html');
                
            } catch (error) {
                alert("⚠️ 저장 공간 부족! 오래된 게시물을 삭제해 주세요.");
            }
        }
    </script>
</body>
</html>
