<label class="input-label">📝 서명 필요 여부</label>
<div style="display: flex; gap: 20px; padding: 10px 0;">
    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
        <input type="radio" name="needSignature" value="필요" style="width: 20px; height: 20px; margin: 0;"> 서명 필요
    </label>
    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
        <input type="radio" name="needSignature" value="불필요" checked style="width: 20px; height: 20px; margin: 0;"> 서명 없음
    </label>
</div>

<label class="input-label">상세 지시내용</label>
<textarea id="eduContent" rows="7" placeholder="상세 내용을 입력하세요"></textarea>

<script>
function saveEdu() {
    const title = document.getElementById('eduTitle').value;
    const content = document.getElementById('eduContent').value;
    // 서명 여부 값 가져오기
    const needSignature = document.querySelector('input[name="needSignature"]:checked').value;

    if(!title || !content) { alert("내용을 입력해주세요!"); return; }

    const totalEduList = JSON.parse(localStorage.getItem('totalEduList')) || [];
    totalEduList.push({
        id: Date.now(),
        dept: myDept,
        category: document.getElementById('eduType').value,
        title: title,
        content: content,
        deadline: document.getElementById('eduDeadline').value,
        signatureType: needSignature, // 🚨 서명 여부 저장
        fileData: selectedFileData,
        date: new Date().toLocaleDateString()
    });
    localStorage.setItem('totalEduList', JSON.stringify(totalEduList));

    alert("등록되었습니다!");
    location.replace('admin_main.html');
}
</script>
