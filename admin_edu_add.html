<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 관리자 - 교육/훈련 등록</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f0f2f5; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; color: #333; }
        
        /* 헤더 스타일 */
        .header { width: 100%; background: white; padding: 10px 0; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .header-left { width: 90px; padding-left: 12px; } 
        .slim-logo { height: 26px; }
        .header-right { width: 90px; }
        .txt-btn { background: #f8f9fa; border: 1px solid #ddd; padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; color: #666; cursor: pointer; }
        
        .container { width: 92%; max-width: 480px; margin: 15px auto; padding-bottom: 40px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .page-title { font-size: 1rem; font-weight: bold; margin-bottom: 20px; color: var(--dtro-blue); display: flex; align-items: center; }
        .page-title::before { content: '⚙️'; margin-right: 8px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 6px; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; 
            box-sizing: border-box; font-size: 0.85rem; background: #fafafa; transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--dtro-blue); outline: none; background: #fff; }
        input { height: 45px; }
        textarea { height: 90px; resize: none; }

        /* 동적 설정 영역 (중요) */
        .sub-setting { background: #eef7ff; border: 1px solid #b3d7ff; padding: 15px; border-radius: 12px; margin-top: 5px; display: none; }
        .flex-row { display: flex; gap: 8px; margin-top: 8px; }
        .flex-row div { flex: 1; }
        .flex-row label { font-size: 0.65rem; color: #0056b3; margin-bottom: 3px; }
        .flex-row input { background: white !important; height: 40px; text-align: center; font-weight: bold; }

        .btn-submit { 
            width: 100%; height: 50px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; 
            cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,114,188,0.3);
        }
        .info-text { font-size: 0.7rem; color: #888; margin-top: 5px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left"><button class="txt-btn" onclick="location.href='admin_main.html'">이전으로</button></div>
        <img src="logo.png" class="slim-logo" alt="DTRO">
        <div class="header-right"></div>
    </div>

    <div class="container">
        <div class="card">
            <div class="page-title">스마트 교육/훈련 게시</div>

            <div class="input-group">
                <label>교육 분류 설정</label>
                <select id="eduCategory" onchange="toggleTrainingMode()">
                    <option value="게시교육">일반 게시교육 (공문/지시)</option>
                    <option value="대면교육">대면/집합 교육</option>
                    <option value="면담교육">개별 면담 교육</option>
                    <option value="육성방송 훈련">🎙️ 육성방송 훈련 (앱 내 실행)</option>
                    <option value="시뮬레이션 교육">🚋 시뮬레이션 교육 (앱 내 실행)</option>
                </select>
            </div>

            <div id="trainingSetting" class="sub-setting">
                <div id="settingContent"></div>
                <p class="info-text">※ 위 설정값은 기관사 앱 내 훈련 모듈과 실시간 연동되어 이수 여부를 판단합니다.</p>
            </div>

            <div class="input-group">
                <label>교육 및 훈련 제목</label>
                <input type="text" id="eduTitle" placeholder="예: 2호선 응급처치 시뮬레이션 1차">
            </div>

            <div class="input-group">
                <label>상세 지시사항</label>
                <textarea id="eduContent" placeholder="기관사님들이 확인해야 할 내용을 입력하세요."></textarea>
            </div>

            <button class="btn-submit" onclick="submitTraining()">앱에 즉시 게시하기</button>
        </div>
    </div>

    <script>
        function toggleTrainingMode() {
            const category = document.getElementById('eduCategory').value;
            const settingDiv = document.getElementById('trainingSetting');
            const content = document.getElementById('settingContent');
            
            if (category === "육성방송 훈련") {
                settingDiv.style.display = "block";
                content.innerHTML = `
                    <label style="color:var(--dtro-blue);">🎯 육성방송 훈련 목표</label>
                    <div class="flex-row">
                        <div>
                            <label>반기 목표(회)</label>
                            <input type="number" id="targetCount" value="10" inputmode="numeric">
                        </div>
                        <div>
                            <label>합격 기준(점)</label>
                            <input type="number" id="targetScore" value="80" inputmode="numeric">
                        </div>
                    </div>
                `;
            } else if (category === "시뮬레이션 교육") {
                settingDiv.style.display = "block";
                content.innerHTML = `
                    <label style="color:var(--dtro-blue);">📋 시뮬레이션 이수 기준 (앱 내 로직)</label>
                    <div class="flex-row">
                        <div>
                            <label>이수 횟수</label>
                            <input type="number" id="simCount" value="3" inputmode="numeric">
                        </div>
                        <div>
                            <label>총 시간(H)</label>
                            <input type="number" step="0.1" id="simTime" value="1.5" inputmode="decimal">
                        </div>
                        <div>
                            <label>평가(점)</label>
                            <input type="number" id="simScore" value="60" inputmode="numeric">
                        </div>
                    </div>
                `;
            } else {
                settingDiv.style.display = "none";
                content.innerHTML = "";
            }
        }

        function submitTraining() {
            const title = document.getElementById('eduTitle').value;
            const category = document.getElementById('eduCategory').value;

            if(!title) { alert("제목을 입력해주세요."); return; }

            // 데이터 객체 생성 (앱 내 실행 모드 포함)
            const trainingData = {
                title: title,
                category: category,
                isInternalAppRun: (category.includes("훈련") || category.includes("시뮬레이션")),
                timestamp: new Date().toISOString()
            };

            console.log("저장될 데이터:", trainingData);
            alert("✅ 게시 완료!\n기관사 앱에서 즉시 훈련 및 실적 집계가 시작됩니다.");
            location.href = 'admin_main.html';
        }

        // 초기 로드 시 실행
        window.onload = toggleTrainingMode;
    </script>
</body>
</html>
