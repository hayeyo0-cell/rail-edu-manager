<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>새 교육 등록</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; }
        .header { background: white; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; }
        .back-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #333; padding: 0 10px; }
        .container { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .input-card { width: 100%; max-width: 400px; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); box-sizing: border-box; }
        label { display: block; font-weight: bold; font-size: 0.9rem; color: #444; margin-bottom: 8px; }
        input, textarea { width: 100%; border: 1px solid #e8e8e8; border-radius: 12px; padding: 15px; font-size: 1rem; margin-bottom: 20px; box-sizing: border-box; outline: none; background: #fafafa; }
        textarea { height: 180px; resize: none; }
        .file-upload-box { 
            border: 2px dashed #ccd6e0; border-radius: 15px; padding: 40px 20px; 
            text-align: center; color: #888; margin-bottom: 25px; cursor: pointer;
        }
        .submit-btn { width: 100%; height: 60px; background: var(--dtro-blue); color: white; border: none; border-radius: 15px; font-size: 1.15rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="history.back()">←</button>
        <span style="font-weight:bold; margin-left:10px;">새 교육 등록하기</span>
    </div>
    <div class="container">
        <div class="input-card">
            <label>교육 제목</label>
            <input type="text" id="eduTitle" placeholder="제목을 입력하세요">
            <label>상세 내용 및 지시사항</label>
            <textarea id="eduContent" placeholder="교육 내용을 상세히 입력하세요."></textarea>
            <label>관련 자료 및 사진</label>
            <div class="file-upload-box" onclick="document.getElementById('fileInput').click()">📁 사진 또는 파일 선택</div>
            <input type="file" id="fileInput" style="display:none;">
            <button class="submit-btn" onclick="alert('등록되었습니다!'); location.href='admin_main.html'">등록 완료</button>
        </div>
    </div>
</body>
</html>
