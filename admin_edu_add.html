<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>새 교육 등록 - DTRO</title>
    <style>
        /* 🚨 껍데기 설정: 화면에 꽉 차게 고정 */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f8f9fb; }
        .wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        /* 헤더는 고정 */
        .top-nav { 
            width: 100%; background: white; padding: 12px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-sizing: border-box; border-bottom: 1px solid #eee; flex-shrink: 0;
        }
        .nav-btn { background: white; border: 1px solid #eee; border-radius: 8px; padding: 8px 15px; font-weight: bold; cursor: pointer; }
        .brand-logo { height: 42px; }

        /* 컨텐츠 영역 */
        .content-area { flex: 1; width: 100%; display: flex; justify-content: center; overflow-y: auto; padding: 20px 0; }
        .edu-card { width: 92%; max-width: 420px; background: white; border-radius: 30px; padding: 30px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); height: fit-content; }
        
        /* 입력 폼 스타일 */
        .card-title { font-size: 1.4rem; font-weight: bold; color: #0072bc; margin-bottom: 20px; display: block; }
        input, textarea, select { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; background: #fafafa; font-size: 1rem; }
        .save-btn { width: 100%; padding: 18px; background: #0072bc; color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="top-nav">
            <button class="nav-btn" onclick="askGoMain()">← 메인으로</button>
            <img src="logo.png" class="brand-logo" alt="DTRO">
            <div style="width:75px;"></div>
        </div>

        <div class="content-area">
            <div class="edu-card">
                <span class="card-title">✍️ 새 교육 등록</span>
                <select id="eduType">
                    <option value="게시교육">게시교육</option>
                    <option value="안전교육">안전교육</option>
                </select>
                <input type="text" id="eduTitle" placeholder="제목 입력">
                <textarea id="eduContent" rows="8" placeholder="상세 내용 입력"></textarea>
                <button class="save-btn" onclick="saveEdu()">✅ 등록 완료</button>
            </div>
        </div>
    </div>

    <script>
        // 🚨 [물리적 차단] 껍데기에서 히스토리를 무한 도배
        // 사용자가 뒤로가기를 누르면 이 껍데기 안에서만 헛바퀴를 돕니다.
        (function() {
            function preventBack() {
                window.history.pushState(null, null, window.location.href);
            }
            // 0.1초마다 강제로 히스토리를 심어버립니다. (가장 지독한 방법)
            setInterval(preventBack, 100);
            
            window.onpopstate = function() {
                // 뒤로가기 시 무조건 팝업
                if(confirm("작성 중인 내용이 사라집니다. 메인으로 갈까요?")) {
                    location.replace('admin_main.html');
                }
            };
        })();

        function askGoMain() {
            if(confirm("메인으로 돌아갈까요?")) location.replace('admin_main.html');
        }

        function saveEdu() {
            const title = document.getElementById('eduTitle').value;
            const content = document.getElementById('eduContent').value;
            if(!title || !content) { alert("내용을 입력해주세요."); return; }

            const totalEduList = JSON.parse(localStorage.getItem('totalEduList')) || [];
            totalEduList.push({
                id: Date.now(),
                dept: localStorage.getItem('userDept'),
                title: title,
                content: content,
                date: new Date().toLocaleDateString()
            });
            localStorage.setItem('totalEduList', JSON.stringify(totalEduList));

            alert("등록되었습니다!");
            location.replace('admin_main.html');
        }
    </script>
</body>
</html>
