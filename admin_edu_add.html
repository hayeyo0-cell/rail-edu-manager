<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>새 교육 등록 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* 🚨 상단 헤더: 패딩 및 로고 크기 수정 (42px) */
        .top-nav { 
            width: 100%; background: white; padding: 12px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-sizing: border-box; border-bottom: 1px solid #eee;
        }
        .nav-btn { 
            background: white; border: 1px solid #eaeaea; border-radius: 8px; 
            padding: 8px 15px; font-size: 0.85rem; color: #555; cursor: pointer; font-weight: bold;
        }
        
        /* 🚨 로고 크기 26px -> 42px로 상향 */
        .brand-logo { height: 42px; object-fit: contain; }

        .container { width: 92%; max-width: 420px; padding: 25px 0; }

        /* 등록 카드 디자인 */
        .edu-card { 
            background: white; border-radius: 30px; padding: 30px 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); box-sizing: border-box; 
        }

        .card-title { font-size: 1.4rem; font-weight: bold; color: var(--dtro-blue); margin-bottom: 25px; display: block; text-align: left; }
        .dept-info-box { background: #f0f7ff; color: #555; padding: 12px; border-radius: 12px; font-size: 0.9rem; margin-bottom: 25px; text-align: center; }

        .input-label { font-size: 1rem; font-weight: bold; color: #333; margin: 20px 0 10px 0; display: block; text-align: left; }
        
        select, input, textarea { 
            width: 100%; padding: 16px; border: 1px solid #eee; border-radius: 15px; 
            box-sizing: border-box; font-size: 1rem; background: #fafafa; outline: none; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--dtro-blue); background: #fff; }

        /* 파일 첨부 영역: 저장소 연결 */
        .file-section { margin-top: 15px; text-align: left; }
        .file-input-box { 
            width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 12px; 
            background: #fff; box-sizing: border-box; font-size: 0.9rem; color: #666; 
        }

        .save-btn { 
            width: 100%; padding: 18px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 15px; font-size: 1.15rem; font-weight: bold; 
            margin-top: 35px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,114,188,0.2);
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="nav-btn" onclick="location.href='admin_main.html'">← 메인으로</button>
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <div style="width:75px;"></div>
    </div>

    <div class="container">
        <div class="edu-card">
            <span class="card-title">✍️ 새 교육 및 훈련 등록</span>
            <div class="dept-info-box">📍 현재 관리 소속: <strong id="currentDept">경산승무팀</strong></div>

            <label class="input-label">교육 분류</label>
            <select id="eduType">
                <option value="게시교육">게시교육</option>
                <option value="운전취급">운전취급</option>
                <option value="사고분석">사고분석</option>
                <option value="지시사항">지시사항</option>
                <option value="안전교육">안전교육</option>
                <option value="대면교육">대면교육</option>
                <option value="면담교육">면담교육</option>
                <option value="시뮬레이션">시뮬레이션</option>
                <option value="육성방송 훈련">육성방송 훈련</option>
            </select>

            <label class="input-label">교육 및 훈련 제목</label>
            <input type="text" id="eduTitle" placeholder="제목을 입력하세요">

            <label class="input-label">⌛ 이수 마감 기한</label>
            <input type="date" id="eduDeadline">

            <label class="input-label">상세 지시내용</label>
            <textarea id="eduContent" rows="7" placeholder="상세 내용을 입력하세요"></textarea>

            <label class="input-label">📎 파일 첨부</label>
            <div class="file-section">
                <input type="file" id="eduFile" class="file-input-box">
            </div>

            <button class="save-btn" onclick="saveEdu()">설정 저장 및 완료</button>
        </div>
    </div>

    <script>
        // 소속 정보 불러오기
        const myDept = localStorage.getItem('userDept') || "경산승무팀";
        document.getElementById('currentDept').innerText = myDept;

        let selectedFileData = ""; 

        // 파일 선택 시 데이터 읽기
        document.getElementById('eduFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    selectedFileData = event.target.result; 
                };
                reader.readAsDataURL(file);
            }
        });

        function saveEdu() {
            const title = document.getElementById('eduTitle').value;
            const content = document.getElementById('eduContent').value;
            const type = document.getElementById('eduType').value;
            const deadline = document.getElementById('eduDeadline').value;

            if(!title || !content) {
                alert("제목과 내용을 모두 입력해 주세요!");
                return;
            }

            const totalEduList = JSON.parse(localStorage.getItem('totalEduList')) || [];
            
            const newEdu = {
                id: Date.now(),
                dept: myDept,
                category: type,
                type: type,
                title: title,
                content: content,
                deadline: deadline,
                fileData: selectedFileData,
                date: new Date().toLocaleDateString()
            };

            totalEduList.push(newEdu);
            localStorage.setItem('totalEduList', JSON.stringify(totalEduList));

            alert("교육이 성공적으로 등록되었습니다!");
            location.href = 'admin_main.html';
        }
    </script>
</body>
</html>
