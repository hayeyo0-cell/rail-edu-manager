<script>
    function checkSpecialType() {
        const category = document.getElementById('eduCategory').value;
        const specialDiv = document.getElementById('specialSetting');
        const label = document.getElementById('specialLabel');
        const targetInput = document.getElementById('targetCount');
        
        if (category === "육성방송 훈련") {
            specialDiv.style.display = "block";
            specialDiv.innerHTML = `
                <label style="font-size: 0.75rem; color:var(--dtro-blue); font-weight: bold;">🎯 반기 목표 훈련 횟수</label>
                <input type="number" id="targetCount" placeholder="목표 횟수 (예: 10)" inputmode="numeric" style="background:white; margin-top:5px; height:40px; width:100%; border:1px solid #ddd; border-radius:8px; padding:10px; font-size:0.75rem;">
            `;
        } else if (category === "시뮬레이션 교육") {
            specialDiv.style.display = "block";
            // 실적 보고용 평가 및 시간 항목 추가
            specialDiv.innerHTML = `
                <label style="font-size: 0.75rem; color:var(--dtro-blue); font-weight: bold;">📋 시뮬레이션 이수 실적 설정</label>
                <div style="display: flex; gap: 8px; margin-top: 5px;">
                    <input type="text" id="simGrade" placeholder="평가 기준 (예: A/B/C)" style="flex: 1; background:white; height:40px; border:1px solid #ddd; border-radius:8px; padding:10px; font-size:0.75rem;">
                    <input type="number" id="simTime" placeholder="이수 시간 (분)" style="flex: 1; background:white; height:40px; border:1px solid #ddd; border-radius:8px; padding:10px; font-size:0.75rem;">
                </div>
                <p style="font-size: 0.65rem; color: #888; margin-top: 5px;">* 기관사가 이수 후 결과값을 입력하는 기준이 됩니다.</p>
            `;
        } else {
            specialDiv.style.display = "none";
        }
    }

    // 파일 핸들링 및 제출 로직은 동일
    function submitEdu() {
        const title = document.getElementById('eduTitle').value;
        if(!title) { alert("제목을 입력해주세요."); return; }
        alert("실적 증빙 항목을 포함하여 게시되었습니다.");
        location.href = 'admin_main.html';
    }
</script>
