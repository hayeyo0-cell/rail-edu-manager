<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교육 등록 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --dtro-sky: #f4f9ff; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }

        /* 상단 헤더 (메인과 통일) */
        .header { 
            width: 100%; background: white; padding: 12px 0; 
            display: flex; align-items: center; justify-content: space-between; 
            border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; 
        }
        .header-left { width: 90px; padding-left: 15px; } 
        .slim-logo { height: 32px; vertical-align: middle; }
        .header-right { width: 90px; padding-right: 15px; text-align: right; }
        .txt-btn { background: #f8f9fa; border: 1px solid #ddd; padding: 5px 10px; border-radius: 6px; font-size: 0.75rem; color: #555; cursor: pointer; }

        .container { width: 92%; max-width: 500px; margin: 15px auto; padding-bottom: 30px; }
        .card { background: white; border-radius: 20px; padding: 25px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .page-title { font-size: 1.15rem; font-weight: bold; color: #333; margin-bottom: 25px; display: flex; align-items: center; }
        .page-title::before { content: '✍️'; margin-right: 10px; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 8px; }
        
        input, select, textarea { 
            width: 100%; padding: 13px; border: 1px solid #ddd; border-radius: 10px; 
            box-sizing: border-box; font-size: 0.95rem; background: #fafafa;
        }
        textarea { height: 100px; resize: none; font-family: inherit; }

        /* 등록 버튼 */
        .btn-submit { 
            width: 100%; padding: 16px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 12px; font-size: 1.05rem; font-weight: bold; 
            cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,114,188,0.3);
        }

        /* 상세 설정 (횟수 입력 등) */
        .sub-setting { background: #fdfdfd; border: 1px dashed #ccc; padding: 15px; border-radius: 10px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left"><button class="txt-btn" onclick="location.href='admin_main.html'">이전으로</button></div>
        <img src="logo.png" class="slim-logo">
        <div class="header-right"></div>
    </div>

    <div class="container">
        <div class="card">
            <div class="page-title">새 교육 및 훈련 등록</div>

            <div class="input-group">
                <label>교육 대분류</label>
                <select id="eduCategory" onchange="updateSubCategory()">
                    <option value="게시교육">게시교육 (지시사항/사고사례 등)</option>
                    <option value="대면교육">대면교육 (집합교육/현장실습 등)</option>
                </select>
            </div>

            <div class="input-group">
                <label>세부 유형 선택</label>
                <select id="eduType" onchange="checkSpecialType()">
                    </select>
            </div>

            <div id="specialSetting" class="sub-setting">
                <label id="specialLabel">목표 횟수 설정</label>
                <input type="number" id="targetCount" placeholder="예: 10" style="background:white;">
                <p style="font-size:0.75rem; color:#888; margin-top:5px;">※ 해당 차수 내 수행해야 할 총 횟수를 입력하세요.</p>
            </div>

            <div class="input-group">
                <label>교육 제목</label>
                <input type="text" id="eduTitle" placeholder="제목을 입력하세요">
            </div>

            <div class="input-group">
                <label>상세 지시내용</label>
                <textarea id="eduContent" placeholder="기관사님들께 전달할 상세 내용을 입력하세요."></textarea>
            </div>

            <button class="btn-submit" onclick="submitEdu()">교육 게시하기</button>
        </div>
    </div>

    <script>
        window.onload = updateSubCategory;

        function updateSubCategory() {
            const category = document.getElementById('eduCategory').value;
            const typeSelect = document.getElementById('eduType');
            typeSelect.innerHTML = "";

            // 모든 유형을 한 곳에서 관리하되 대분류에 따라 기본값을 다르게 제안
            const commonOptions = [
                {val: "지시사항", text: "일반 지시사항 (게시)"},
                {val: "사고사례", text: "사고사례 교육 (게시)"},
                {val: "시뮬레이션", text: "시뮬레이션 교육 (훈련)"},
                {val: "육성방송", text: "육성방송 훈련 (훈련)"},
                {val: "기타", text: "기타 교육"}
            ];

            commonOptions.forEach(opt => {
                const el = document.createElement("option");
                el.value = opt.val; el.innerText = opt.text;
                typeSelect.appendChild(el);
            });
            checkSpecialType();
        }

        function checkSpecialType() {
            const type = document.getElementById('eduType').value;
            const specialDiv = document.getElementById('specialSetting');
            const label = document.getElementById('specialLabel');

            if (type === "육성방송") {
                specialDiv.style.display = "block";
                label.innerText = "반기별 목표 횟수";
            } else if (type === "시뮬레이션") {
                specialDiv.style.display = "block";
                label.innerText = "이수 목표 횟수";
            } else {
                specialDiv.style.display = "none";
            }
        }

        function submitEdu() {
            const title = document.getElementById('eduTitle').value;
            if(!title) { alert("제목을 입력해주세요."); return; }
            alert("정상적으로 등록되었습니다.");
            location.href = 'admin_main.html';
        }
    </script>
</body>
</html>
