<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교육 등록 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; color: #333; }

        /* 상단 헤더 */
        .header { 
            width: 100%; background: white; padding: 12px 0; 
            display: flex; align-items: center; justify-content: space-between; 
            border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; 
        }
        .header-left { width: 90px; padding-left: 12px; } 
        .slim-logo { height: 30px; vertical-align: middle; }
        .header-right { width: 90px; }
        .txt-btn { background: #f8f9fa; border: 1px solid #ddd; padding: 5px 10px; border-radius: 6px; font-size: 0.75rem; color: #666; cursor: pointer; }

        .container { width: 92%; max-width: 480px; margin: 15px auto; padding-bottom: 30px; }
        .card { background: white; border-radius: 16px; padding: 22px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .page-title { font-size: 1rem; font-weight: bold; margin-bottom: 22px; display: flex; align-items: center; }
        .page-title::before { content: '✍️'; margin-right: 8px; }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; color: #777; margin-bottom: 6px; }
        
        /* [수정] 드롭다운 및 입력창 디자인 슬림화 */
        input, select, .file-upload-box { 
            width: 100%; height: 42px; padding: 0 10px; border: 1px solid #ddd; 
            border-radius: 8px; box-sizing: border-box; 
            font-size: 0.85rem; /* 폰트 크기 하향 */
            background: #fafafa; color: #444; display: flex; align-items: center;
        }

        /* [핵심] 드롭다운 목록 글씨 크기 제어 (일부 브라우저 적용) */
        select option {
            font-size: 0.85rem;
            padding: 10px;
        }
        
        textarea { 
            width: 100%; height: 90px; padding: 12px; border: 1px solid #ddd; 
            border-radius: 8px; box-sizing: border-box; font-size: 0.85rem; 
            background: #fafafa; resize: none; font-family: inherit;
        }

        .file-upload-box { border: 1px dashed #ccc; background: #fff; justify-content: center; cursor: pointer; color: #888; font-size: 0.8rem; }

        .btn-submit { 
            width: 100%; height: 48px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 10px; font-size: 0.95rem; font-weight: bold; 
            cursor: pointer; margin-top: 10px;
        }

        .sub-setting { background: #fdfdfd; border: 1px solid #eee; padding: 12px; border-radius: 8px; margin-top: 8px; display: none; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left"><button class="txt-btn" onclick="location.href='admin_main.html'">이전으로</button></div>
        <img src="logo.png" class="slim-logo">
        <div class="header-right"></div>
    </div>

    <div class="container">
        <div class="card">
            <div class="page-title">새 교육 및 훈련 등록</div>

            <div class="input-group">
                <label>교육 대분류</label>
                <select id="eduCategory" onchange="updateSubCategory()">
                    <option value="게시교육">게시교육 (지시사항/사고사례)</option>
                    <option value="대면교육">대면교육 (집합/현장실습)</option>
                </select>
            </div>

            <div class="input-group">
                <label>세부 유형 선택</label>
                <select id="eduType" onchange="checkSpecialType()">
                    </select>
            </div>

            <div id="specialSetting" class="sub-setting">
                <label id="specialLabel" style="font-size: 0.75rem; color:var(--dtro-blue);">설정</label>
                <input type="number" id="targetCount" placeholder="횟수 입력" inputmode="numeric">
            </div>

            <div class="input-group">
                <label>교육 제목</label>
                <input type="text" id="eduTitle" placeholder="제목을 입력하세요">
            </div>

            <div class="input-group">
                <label>상세 지시내용</label>
                <textarea id="eduContent" placeholder="상세 내용을 입력하세요."></textarea>
            </div>

            <div class="input-group">
                <label>참조 파일 (사진/공문)</label>
                <div class="file-upload-box" onclick="document.getElementById('fileInput').click()">
                    <span id="fileNameDisplay">📁 파일 선택 또는 촬영</span>
                    <input type="file" id="fileInput" style="display:none;" onchange="handleFile(this)">
                </div>
            </div>

            <button class="btn-submit" onclick="submitEdu()">교육 게시하기</button>
        </div>
    </div>

    <script>
        window.onload = updateSubCategory;

        function updateSubCategory() {
            const category = document.getElementById('eduCategory').value;
            const typeSelect = document.getElementById('eduType');
            typeSelect.innerHTML = "";
            const options = [
                {val: "지시사항", text: "일반 지시사항"},
                {val: "사고사례", text: "사고사례 교육"},
                {val: "시뮬레이션", text: "시뮬레이션 교육"},
                {val: "육성방송", text: "육성방송 훈련"},
                {val: "기타", text: "기타 교육"}
            ];
            options.forEach(opt => {
                const el = document.createElement("option");
                el.value = opt.val; el.innerText = opt.text;
                typeSelect.appendChild(el);
            });
            checkSpecialType();
        }

        function checkSpecialType() {
            const type = document.getElementById('eduType').value;
            const specialDiv = document.getElementById('specialSetting');
            const label = document.getElementById('specialLabel');
            if (type === "육성방송" || type === "시뮬레이션") {
                specialDiv.style.display = "block";
                label.innerText = type === "육성방송" ? "반기 목표 횟수" : "이수 목표 횟수";
            } else { specialDiv.style.display = "none"; }
        }

        function handleFile(input) {
            const fileName = input.files[0] ? input.files[0].name : "📁 파일 선택 또는 촬영";
            document.getElementById('fileNameDisplay').innerText = fileName;
        }

        function submitEdu() {
            const title = document.getElementById('eduTitle').value;
            if(!title) { alert("제목을 입력해주세요."); return; }
            alert("정상적으로 게시되었습니다!");
            location.href = 'admin_main.html';
        }
    </script>
</body>
</html>
