<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>새 교육 등록 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .top-nav { width: 100%; background: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .nav-btn { background: white; border: 1px solid #eaeaea; border-radius: 8px; padding: 8px 15px; font-size: 0.85rem; color: #555; cursor: pointer; font-weight: bold; }
        .brand-logo { height: 42px; object-fit: contain; }
        .container { width: 92%; max-width: 420px; padding: 25px 0; padding-bottom: 60px; }
        .edu-card { background: white; border-radius: 30px; padding: 30px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); box-sizing: border-box; }
        .card-title { font-size: 1.4rem; font-weight: bold; color: var(--dtro-blue); margin-bottom: 25px; display: block; text-align: left; }
        .dept-info-box { background: #f0f7ff; color: #555; padding: 12px; border-radius: 12px; font-size: 0.9rem; margin-bottom: 25px; text-align: center; }
        .input-label { font-size: 1rem; font-weight: bold; color: #333; margin: 20px 0 10px 0; display: block; text-align: left; }
        select, input, textarea { width: 100%; padding: 16px; border: 1px solid #eee; border-radius: 15px; box-sizing: border-box; font-size: 1rem; background: #fafafa; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--dtro-blue); background: #fff; }
        .save-btn { width: 100%; padding: 18px; background: var(--dtro-blue); color: white; border: none; border-radius: 15px; font-size: 1.15rem; font-weight: bold; margin-top: 35px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="nav-btn" onclick="handleManualBack()">← 메인으로</button>
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <div style="width:75px;"></div>
    </div>

    <div class="container">
        <div class="edu-card">
            <span class="card-title">✍️ 새 교육 및 훈련 등록</span>
            <div class="dept-info-box">📍 소속: <strong id="currentDept">경산승무팀</strong></div>

            <label class="input-label">교육 분류</label>
            <select id="eduType">
                <option value="게시교육">게시교육</option>
                <option value="안전교육">안전교육</option>
                <option value="시뮬레이션">시뮬레이션</option>
                <option value="육성방송 훈련">육성방송 훈련</option>
            </select>

            <label class="input-label">교육 및 훈련 제목</label>
            <input type="text" id="eduTitle" placeholder="제목을 입력하세요">

            <label class="input-label">상세 지시내용</label>
            <textarea id="eduContent" rows="7" placeholder="상세 내용을 입력하세요"></textarea>

            <label class="input-label">📎 파일 첨부</label>
            <input type="file" id="eduFile" style="margin-top:10px; width:100%;">

            <button class="save-btn" onclick="saveEdu()">설정 저장 및 완료</button>
        </div>
    </div>

    <script>
        // 🚨 [트랩 방어] 브라우저가 뒤로 가려고 하면 무조건 '메인'으로 강제 소환
        (function() {
            // 1. 현재 페이지 뒤에 메인 페이지를 숨겨둡니다.
            window.history.pushState(null, null, 'admin_main.html');
            // 2. 그 위에 다시 현재 페이지를 덮어씌웁니다.
            window.history.pushState(null, null, window.location.href);

            window.onpopstate = function() {
                // 뒤로가기 버튼을 누르는 순간 숨겨둔 'admin_main.html'이 호출되도록 유도
                if(confirm("작성 중인 내용이 저장되지 않습니다. 관리자 메인으로 돌아갈까요?")) {
                    window.location.replace('admin_main.html');
                } else {
                    // 취소하면 다시 트랩 설치
                    window.history.pushState(null, null, window.location.href);
                }
            };
        })();

        function handleManualBack() {
            if(confirm("메인으로 돌아갈까요?")) window.location.replace('admin_main.html');
        }

        const myDept = localStorage.getItem('userDept') || "경산승무팀";
        document.getElementById('currentDept').innerText = myDept;

        let selectedFileData = ""; 
        document.getElementById('eduFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) { selectedFileData = event.target.result; };
                reader.readAsDataURL(file);
            }
        });

        function saveEdu() {
            const title = document.getElementById('eduTitle').value;
            const content = document.getElementById('eduContent').value;
            if(!title || !content) { alert("제목과 내용을 모두 입력해 주세요!"); return; }

            const totalEduList = JSON.parse(localStorage.getItem('totalEduList')) || [];
            totalEduList.push({
                id: Date.now(),
                dept: myDept,
                type: document.getElementById('eduType').value,
                title: title,
                content: content,
                fileData: selectedFileData,
                date: new Date().toLocaleDateString()
            });
            localStorage.setItem('totalEduList', JSON.stringify(totalEduList));

            alert("등록되었습니다!");
            window.location.replace('admin_main.html');
        }
    </script>
</body>
</html>
