<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교육 등록 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f4f6f9; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .top-nav { width: 100%; background: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-bottom: 1px solid #eee; }
        .nav-btn { background: #f8f8f8; border: 1px solid #eee; border-radius: 6px; padding: 6px 12px; font-size: 0.8rem; color: #555; cursor: pointer; font-weight: bold; }
        /* 🚨 내 로고 크기 지정 */
        .brand-logo { height: 28px; object-fit: contain; }
        .container { width: 92%; max-width: 400px; padding: 20px 0; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .section-title { font-size: 1.2rem; font-weight: bold; color: #333; margin-bottom: 20px; display: block; text-align: center; }
        .input-label { font-size: 0.9rem; font-weight: bold; color: #666; margin: 15px 0 8px 0; display: block; }
        select, input, textarea { width: 100%; padding: 15px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 1rem; background: #fafafa; outline: none; }
        .save-btn { width: 100%; padding: 18px; background: var(--dtro-blue); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; margin-top: 30px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="top-nav">
        <button class="nav-btn" onclick="location.href='admin_main.html'">← 메인으로</button>
        <img src="logo.png" class="brand-logo" alt="DTRO Logo">
        <div style="width:70px;"></div>
    </div>
    <div class="container">
        <div class="card">
            <span class="section-title">✍️ 새 교육 및 훈련 등록</span>
            <div style="background:#eef6ff; padding:10px; border-radius:8px; font-size:0.85rem; color:var(--dtro-blue); font-weight:bold; margin-bottom:20px; text-align:center;">
                📍 현재 관리 소속: <span id="currentDept">경산승무팀</span>
            </div>
            <label class="input-label">교육 및 훈련 제목</label>
            <input type="text" id="eduTitle" placeholder="제목을 입력하세요">
            <label class="input-label">상세 지시내용</label>
            <textarea id="eduContent" rows="5" placeholder="상세 내용을 입력하세요"></textarea>
            <button class="save-btn" onclick="saveEdu()">교육 등록 완료</button>
        </div>
    </div>
    <script>
        const myDept = localStorage.getItem('userDept') || "경산승무팀";
        document.getElementById('currentDept').innerText = myDept;
        function saveEdu() {
            const title = document.getElementById('eduTitle').value;
            const content = document.getElementById('eduContent').value;
            if(!title || !content) return alert("제목과 내용을 입력해 주세요!");
            const totalEduList = JSON.parse(localStorage.getItem('totalEduList')) || [];
            totalEduList.push({
                id: Date.now(),
                dept: myDept,
                title,
                content,
                date: new Date().toLocaleDateString()
            });
            localStorage.setItem('totalEduList', JSON.stringify(totalEduList));
            alert("교육이 등록되었습니다.");
            location.href = 'admin_main.html';
        }
    </script>
</body>
</html>
