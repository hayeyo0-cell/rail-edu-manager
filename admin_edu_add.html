<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교육 및 훈련 등록</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f4f6f9; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-gray); }
        body { font-family: 'Noto Sans KR', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .top-header { width: 100%; background: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; box-sizing: border-box; }
        .back-btn { background: white; border: 1px solid #eaeaea; border-radius: 6px; padding: 6px 12px; font-size: 0.85rem; color: #555; cursor: pointer; }
        .brand-logo { height: 32px; mix-blend-mode: multiply; object-fit: contain; }
        .header-spacer { width: 65px; }
        .main-container { width: 100%; display: flex; justify-content: center; padding: 20px 0; }
        .input-card { width: 90%; max-width: 400px; background: white; border-radius: 20px; padding: 25px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); box-sizing: border-box; }
        .card-title { font-size: 1.25rem; font-weight: bold; color: var(--dtro-blue); margin-bottom: 25px; display: flex; align-items: center; }
        label { display: block; font-size: 0.95rem; font-weight: bold; color: #555; margin-bottom: 8px; }
        input[type="text"], input[type="date"], textarea, select { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 14px 15px; font-size: 1rem; margin-bottom: 20px; background: #fff; box-sizing: border-box; outline: none; transition: border-color 0.2s; font-family: 'Noto Sans KR', sans-serif; }
        textarea { height: 130px; resize: none; }
        .file-wrapper { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 10px; padding: 10px; margin-bottom: 30px; }
        .file-btn { background: #f8f9fa; border: 1px solid #ccc; padding: 8px 15px; border-radius: 6px; font-size: 0.9rem; cursor: pointer; margin-right: 12px; }
        .file-name { font-size: 0.9rem; color: #999; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        input[type="file"] { display: none; }
        .submit-btn { width: 100%; padding: 18px; background: var(--dtro-blue); color: white; border: none; border-radius: 12px; font-size: 1.15rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,114,188,0.2); }
    </style>
</head>
<body>
    <div class="top-header">
        <button class="back-btn" onclick="location.href='admin_main.html'">이전으로</button>
        <img src="logo.png" class="brand-logo" alt="대구교통공사 DTRO">
        <div class="header-spacer"></div>
    </div>
    <div class="main-container">
        <div class="input-card">
            <div class="card-title"><span>✍️</span> 교육 및 훈련 등록</div>
            <label>교육 분류</label>
            <select id="eduCategory">
                <option value="게시교육">게시교육</option>
                <option value="대면교육">대면교육</option>
                <option value="면담교육">면담교육</option>
                <option value="시뮬레이션">시뮬레이션</option>
                <option value="육성방송 훈련">육성방송 훈련</option>
                <option value="기타교육">기타교육</option>
                <option value="공지사항">공지사항</option>
            </select>
            <label>교육 및 훈련 제목</label>
            <input type="text" id="eduTitle" placeholder="제목을 입력하세요">
            <label style="color:#ff4d4d;">⏳ 이수 마감 기한</label>
            <input type="date" id="eduDeadline">
            <label>상세 지시내용</label>
            <textarea id="eduContent" placeholder="상세 내용을 입력하세요."></textarea>
            
            <label>참조 파일 (사진/매뉴얼)</label>
            <div class="file-wrapper">
                <button class="file-btn" onclick="document.getElementById('fileInput').click()">파일 선택</button>
                <span class="file-name" id="fileNameDisplay">선택된 파일 없음</span>
                <input type="file" id="fileInput" onchange="updateFileName(this)">
            </div>
            
            <button class="submit-btn" id="saveBtn" onclick="submitForm()">앱에 즉시 게시하기</button>
        </div>
    </div>

    <script>
        let fileData = ""; 
        let fileName = "";

        function updateFileName(input) {
            const display = document.getElementById('fileNameDisplay');
            const saveBtn = document.getElementById('saveBtn');
            
            if (input.files && input.files[0]) {
                fileName = input.files[0].name;
                display.innerText = "읽는 중...";
                saveBtn.disabled = true; // 읽는 동안 버튼 잠금

                const reader = new FileReader();
                reader.onload = function(e) { 
                    fileData = e.target.result; 
                    display.innerText = fileName;
                    display.style.color = '#0072bc';
                    saveBtn.disabled = false; // 완료 후 해제
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function submitForm() {
            const category = document.getElementById('eduCategory').value;
            const title = document.getElementById('eduTitle').value;
            const deadline = document.getElementById('eduDeadline').value;
            const content = document.getElementById('eduContent').value;

            if(!title || !deadline || !content) { alert('항목을 모두 채워주세요!'); return; }

            const today = new Date();
            const dateStr = today.getFullYear() + '.' + String(today.getMonth() + 1).padStart(2, '0') + '.' + String(today.getDate()).padStart(2, '0');

            const newEdu = { 
                category: category, 
                title: title, 
                deadline: deadline, 
                content: content, 
                date: dateStr, 
                fileName: fileName, 
                fileContent: fileData 
            };

            let eduList = JSON.parse(localStorage.getItem('myEduList')) || [];
            eduList.unshift(newEdu); 
            localStorage.setItem('myEduList', JSON.stringify(eduList));
            
            alert('등록 완료! 이제 상세 화면에서 파일을 확인하세요.');
            window.location.replace('admin_main.html'); 
        }
    </script>
</body>
</html>
