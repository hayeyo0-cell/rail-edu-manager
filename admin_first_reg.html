<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관리자 계정 생성</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }

        .top-header-section { width: 100%; background-color: var(--bg-gray); padding: 12px 0 8px 0; display: flex; flex-direction: column; align-items: center; border-bottom: 2px solid var(--dtro-blue); }
        .brand-logo { height: 22px; margin-bottom: 4px; mix-blend-mode: multiply; }
        .main-title { font-size: 1.35rem; font-weight: bold; color: #222; margin: 0; }

        .main-container { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; width: 100%; align-items: center; padding-bottom: 40px; }
        .reg-card { width: 88%; max-width: 380px; background: white; border-radius: 24px; padding: 25px 22px 20px 22px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); }
        
        .label { font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 6px; display: block; padding-left: 4px; }
        .input-group { margin-bottom: 12px; }
        input { width: 100%; height: 48px; border: 1px solid #eee; border-radius: 12px; padding: 0 15px; box-sizing: border-box; outline: none; font-size: 1rem; background: #fafafa; }
        input:focus { border-color: var(--dtro-blue); background: #fff; }
        
        .btn-reg { width: 100%; height: 55px; background: var(--dtro-blue); color: white; border: none; border-radius: 14px; font-weight: bold; font-size: 1.1rem; margin-top: 15px; box-shadow: 0 6px 15px rgba(0,114,188,0.2); }
    </style>
</head>
<body>
    <div class="top-header-section">
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <h1 class="main-title">최초 관리자 지정</h1>
    </div>

    <div class="main-container">
        <div class="reg-card">
            <div class="input-group">
                <span class="label">새 관리자 사번</span>
                <input type="text" id="adminId" placeholder="등록할 사번 입력">
            </div>
            <div class="input-group">
                <span class="label">사번 확인 (재입력)</span>
                <input type="text" id="confirmId" placeholder="사번 한 번 더 입력">
            </div>

            <hr style="border:0; border-top:1px solid #f5f5f5; margin:15px 0;">

            <div class="input-group">
                <span class="label">관리자 비밀번호</span>
                <input type="password" id="adminPw" placeholder="비밀번호 입력">
            </div>
            <div class="input-group">
                <span class="label">비밀번호 확인 (재입력)</span>
                <input type="password" id="confirmPw" placeholder="비밀번호 한 번 더 입력">
            </div>

            <button class="btn-reg" onclick="validateRegistration()">관리자 등록 완료</button>
        </div>
    </div>

    <script>
        function validateRegistration() {
            const id = document.getElementById('adminId').value;
            const cid = document.getElementById('confirmId').value;
            const pw = document.getElementById('adminPw').value;
            const cpw = document.getElementById('confirmPw').value;

            if(!id || !pw) { alert('모든 정보를 입력해 주세요.'); return; }
            
            // 보안 원칙: 사번과 비번 모두 2차 확인 일치 여부 검사
            if(id !== cid) { alert('입력하신 사번이 서로 다릅니다.'); return; }
            if(pw !== cpw) { alert('입력하신 비밀번호가 서로 다릅니다.'); return; }

            // 데이터 저장 (로컬 스토리지)
            localStorage.setItem('adminCreated', 'true');
            localStorage.setItem('adminId', id);
            localStorage.setItem('adminPw', pw);

            alert('관리자 지정이 완료되었습니다!\n설정한 사번으로 로그인이 가능합니다.');
            location.href = 'index.html';
        }
    </script>
</body>
</html>
