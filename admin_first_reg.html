<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관리자 계정 생성</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        html, body { height: 100%; overflow: hidden; display: flex; flex-direction: column; align-items: center; background: var(--bg-gray); font-family: 'Noto Sans KR', sans-serif; }
        .main-container { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; width: 100%; align-items: center; padding-bottom: 60px; }
        .reg-card { width: 88%; max-width: 380px; background: white; border-radius: 24px; padding: 30px 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); }
        .label { font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 6px; display: block; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; height: 48px; border: 1px solid #eee; border-radius: 12px; padding: 0 15px; box-sizing: border-box; outline: none; font-size: 1rem; }
        .btn-reg { width: 100%; height: 55px; background: var(--dtro-blue); color: white; border: none; border-radius: 14px; font-weight: bold; font-size: 1.1rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="reg-card">
            <h2 style="text-align:center; margin-bottom:25px;">최초 관리자 등록</h2>
            
            <div class="input-group">
                <span class="label">관리자 사번</span>
                <input type="text" id="adminId" placeholder="등록할 사번 입력">
            </div>
            <div class="input-group">
                <span class="label">사번 확인</span>
                <input type="text" id="confirmId" placeholder="사번 한 번 더 입력">
            </div>

            <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">

            <div class="input-group">
                <span class="label">관리자 비밀번호</span>
                <input type="password" id="adminPw" placeholder="비밀번호 입력">
            </div>
            <div class="input-group">
                <span class="label">비밀번호 확인</span>
                <input type="password" id="confirmPw" placeholder="비밀번호 한 번 더 입력">
            </div>

            <button class="btn-reg" onclick="validateRegistration()">관리자 등록 완료</button>
        </div>
    </div>

    <script>
        function validateRegistration() {
            const id = document.getElementById('adminId').value;
            const cid = document.getElementById('confirmId').value;
            const pw = document.getElementById('adminPw').value;
            const cpw = document.getElementById('confirmPw').value;

            if(!id || !pw) { alert('모든 항목을 입력해 주세요.'); return; }
            if(id !== cid) { alert('사번 입력값이 서로 다릅니다.'); return; }
            if(pw !== cpw) { alert('비밀번호 입력값이 서로 다릅니다.'); return; }

            alert('관리자 등록이 완료되었습니다.\n이제 설정하신 정보로 로그인이 가능합니다.');
            location.href = 'admin_login.html';
        }
    </script>
</body>
</html>
