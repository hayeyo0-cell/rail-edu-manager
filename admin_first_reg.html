<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>최초 관리자 지정 - DTRO</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; --error-red: #ff4d4d; }
        html, body { height: 100%; overflow: hidden; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* 🚨 상단 헤더: 로고 42px 통일 및 하단 블루라인 강조 */
        .top-header-section { 
            width: 100%; background-color: white; padding: 15px 0; 
            display: flex; flex-direction: column; align-items: center; 
            border-bottom: 3px solid var(--dtro-blue); box-sizing: border-box;
        }
        .brand-logo { height: 42px; margin-bottom: 6px; mix-blend-mode: multiply; object-fit: contain; }
        .main-title { font-size: 1.25rem; font-weight: bold; color: var(--dtro-blue); margin: 0; }

        .main-container { flex: 1; display: flex; flex-direction: column; justify-content: center; width: 100%; align-items: center; padding-bottom: 40px; }
        .reg-card { width: 88%; max-width: 380px; background: white; border-radius: 24px; padding: 30px 22px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); box-sizing: border-box; }
        
        .label { font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 6px; display: block; padding-left: 4px; }
        .input-group { margin-bottom: 12px; position: relative; }
        input, select { 
            width: 100%; height: 50px; border: 1px solid #eee; border-radius: 12px; 
            padding: 0 15px; box-sizing: border-box; outline: none; font-size: 1rem; 
            background: #fafafa; transition: 0.3s;
        }
        input:focus { border-color: var(--dtro-blue); background: #fff; }
        
        .error-msg { font-size: 0.75rem; color: var(--error-red); padding-left: 5px; margin-top: 4px; display: none; font-weight: bold; }
        input.invalid { border-color: var(--error-red); background-color: #fff9f9; }

        .btn-reg { 
            width: 100%; height: 58px; background: var(--dtro-blue); color: white; 
            border: none; border-radius: 15px; font-weight: bold; font-size: 1.15rem; 
            margin-top: 15px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,114,188,0.2);
        }
        .btn-reg:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="top-header-section">
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <h1 class="main-title">최초 관리자 권한 지정</h1>
    </div>

    <div class="main-container">
        <div class="reg-card">
            <div class="input-group">
                <span class="label">관리자 소속 팀</span>
                <select id="adminDept">
                    <option value="">소속을 선택하세요</option>
                    <option value="경산승무팀">경산승무팀</option>
                    <option value="문양승무팀">문양승무팀</option>
                    <option value="월배승무팀">월배승무팀</option>
                    <option value="안심승무팀">안심승무팀</option>
                </select>
            </div>

            <div class="input-group">
                <span class="label">신규 관리자 사번 (ID)</span>
                <input type="number" id="adminId" placeholder="사번 입력" oninput="validateMatch('Id')" inputmode="numeric">
            </div>
            <div class="input-group">
                <input type="number" id="confirmId" placeholder="사번 재입력 확인" oninput="validateMatch('Id')" inputmode="numeric">
                <div id="errorId" class="error-msg">사번이 서로 일치하지 않습니다.</div>
            </div>

            <hr style="border:0; border-top:1px solid #f5f5f5; margin:15px 0;">

            <div class="input-group">
                <span class="label">새 비밀번호 설정</span>
                <input type="password" id="adminPw" placeholder="비밀번호 입력" oninput="validateMatch('Pw')">
            </div>
            <div class="input-group">
                <input type="password" id="confirmPw" placeholder="비밀번호 재입력 확인" oninput="validateMatch('Pw')">
                <div id="errorPw" class="error-msg">비밀번호가 서로 일치하지 않습니다.</div>
            </div>

            <button id="regBtn" class="btn-reg" onclick="saveAdmin()">관리자 등록 완료</button>
        </div>
    </div>

    <script>
        // 🚨 [보안] 뒤로가기 절대 차단 로직
        (function() {
            function lockHistory() {
                for(let i = 0; i < 10; i++) {
                    window.history.pushState(null, null, window.location.href);
                }
            }
            lockHistory();
            window.onpopstate = function() {
                lockHistory();
                alert("최초 관리자 등록을 완료해야 시스템 사용이 가능합니다.");
            };
            document.body.onclick = lockHistory;
        })();

        // 실시간 값 비교
        function validateMatch(type) {
            const original = document.getElementById('admin' + type).value;
            const confirm = document.getElementById('confirm' + type).value;
            const errorElement = document.getElementById('error' + type);
            const confirmInput = document.getElementById('confirm' + type);

            if (confirm.length > 0) {
                if (original !== confirm) {
                    errorElement.style.display = 'block';
                    confirmInput.classList.add('invalid');
                } else {
                    errorElement.style.display = 'none';
                    confirmInput.classList.remove('invalid');
                }
            } else {
                errorElement.style.display = 'none';
                confirmInput.classList.remove('invalid');
            }
        }

        function saveAdmin() {
            const dept = document.getElementById('adminDept').value;
            const id = document.getElementById('adminId').value;
            const cid = document.getElementById('confirmId').value;
            const pw = document.getElementById('adminPw').value;
            const cpw = document.getElementById('confirmPw').value;

            if(!dept || !id || !pw) { alert('모든 항목을 입력해 주세요.'); return; }
            if(id !== cid) { alert('사번 확인이 일치하지 않습니다.'); return; }
            if(pw !== cpw) { alert('비밀번호 확인이 일치하지 않습니다.'); return; }

            // 로컬스토리지 저장
            localStorage.setItem('adminCreated', 'true');
            localStorage.setItem('userDept', dept); // 시스템 소속 키와 연동
            localStorage.setItem('adminId', id);
            localStorage.setItem('adminPw', pw);

            alert('관리자 등록 성공! 설정한 계정으로 로그인하세요.');
            // 🚨 [보안] 이동 시 replace를 사용하여 뒤로가기 기록 삭제
            location.replace('admin_login.html');
        }
    </script>
</body>
</html>
