<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>최초 관리자 지정</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }

        /* 표준 슬림 헤더 */
        .top-header-section { width: 100%; background-color: var(--bg-gray); padding: 12px 0 8px 0; display: flex; flex-direction: column; align-items: center; border-bottom: 2px solid var(--dtro-blue); }
        .brand-logo { height: 22px; margin-bottom: 4px; mix-blend-mode: multiply; }
        .main-title { font-size: 1.35rem; font-weight: bold; color: #222; margin: 0; }

        /* 하단 밀착형 밸런스 */
        .main-container { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; width: 100%; align-items: center; padding-bottom: 30px; }
        .reg-card { width: 88%; max-width: 380px; background: white; border-radius: 24px; padding: 25px 22px 20px 22px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); }
        
        .label { font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 6px; display: block; padding-left: 4px; }
        .input-group { margin-bottom: 10px; }
        input, select { width: 100%; height: 45px; border: 1px solid #eee; border-radius: 10px; padding: 0 15px; box-sizing: border-box; outline: none; font-size: 0.95rem; background: #fafafa; }
        input:focus, select:focus { border-color: var(--dtro-blue); background: #fff; }
        
        .btn-reg { width: 100%; height: 55px; background: var(--dtro-blue); color: white; border: none; border-radius: 14px; font-weight: bold; font-size: 1.1rem; margin-top: 15px; box-shadow: 0 6px 15px rgba(0,114,188,0.2); cursor: pointer; }
    </style>
</head>
<body>
    <div class="top-header-section">
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <h1 class="main-title">최초 관리자 지정</h1>
    </div>

    <div class="main-container">
        <div class="reg-card">
            <div class="input-group">
                <span class="label">관리자 소속</span>
                <select id="adminDept">
                    <option value="">소속을 선택하세요</option>
                    <option value="경산승무팀">경산승무팀</option>
                    <option value="월배승무팀">월배승무팀</option>
                    <option value="안심승무팀">안심승무팀</option>
                </select>
            </div>

            <div class="input-group">
                <span class="label">관리자 사번 (ID)</span>
                <input type="text" id="adminId" placeholder="사번 입력">
            </div>
            <div class="input-group">
                <span class="label">사번 확인</span>
                <input type="text" id="confirmId" placeholder="사번 한 번 더 입력">
            </div>

            <hr style="border:0; border-top:1px solid #f5f5f5; margin:12px 0;">

            <div class="input-group">
                <span class="label">관리자 비밀번호</span>
                <input type="password" id="adminPw" placeholder="비밀번호 입력">
            </div>
            <div class="input-group">
                <span class="label">비밀번호 확인</span>
                <input type="password" id="confirmPw" placeholder="비밀번호 한 번 더 입력">
            </div>

            <button class="btn-reg" onclick="saveAdminAccount()">관리자 등록 완료</button>
        </div>
    </div>

    <script>
        function saveAdminAccount() {
            const dept = document.getElementById('adminDept').value;
            const id = document.getElementById('adminId').value;
            const cid = document.getElementById('confirmId').value;
            const pw = document.getElementById('adminPw').value;
            const cpw = document.getElementById('confirmPw').value;

            // 빈칸 검사
            if(!dept || !id || !pw) { alert('모든 항목을 입력해 주세요.'); return; }
            
            // 2중 확인 검사
            if(id !== cid) { alert('사번 입력값이 서로 다릅니다.'); return; }
            if(pw !== cpw) { alert('비밀번호 입력값이 서로 다릅니다.'); return; }

            // 로컬 스토리지에 관리자 정보 저장
            localStorage.setItem('adminCreated', 'true');
            localStorage.setItem('adminDept', dept);
            localStorage.setItem('adminId', id);
            localStorage.setItem('adminPw', pw);

            alert('관리자 등록이 완료되었습니다!\n이제 등록하신 사번과 비번으로 로그인해 주세요.');
            
            // 등록 완료 후 로그인 화면으로 이동
            location.href = 'admin_login.html';
        }
    </script>
</body>
</html>
