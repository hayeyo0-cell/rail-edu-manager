<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTRO 관리자</title>
    <script>
        function checkStatus() {
            if (!localStorage.getItem('adminCreated')) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('setupSection').style.display = 'block';
            }
        }
    </script>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f8f9fb; }
        
        /* 전체 화면 및 스크롤 방지 */
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg-gray); }
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            display: flex; 
            flex-direction: column; 
        }

        /* [표준] 슬림 헤더 */
        .top-header-section { 
            width: 100%; background-color: var(--bg-gray); 
            padding: 12px 0 8px 0; display: flex; flex-direction: column; 
            align-items: center; border-bottom: 2px solid var(--dtro-blue); 
            flex-shrink: 0;
        }
        .brand-logo { height: 22px; margin-bottom: 4px; mix-blend-mode: multiply; }
        .main-title { font-size: 1.35rem; font-weight: bold; color: #222; margin: 0; }

        /* [핵심 수정] 카드를 화면 정중앙으로 배치 */
        .main-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; /* 세로 방향 중앙 정렬 */
            align-items: center;     /* 가로 방향 중앙 정렬 */
            width: 100%; 
            padding-bottom: 20px;    /* 바닥 주소창 등 대비 약간의 여백 */
        }

        .card { 
            width: 88%; 
            max-width: 380px; 
            background: white; 
            border-radius: 24px; 
            padding: 40px 24px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.06); 
            text-align: center;
            box-sizing: border-box;
        }
        
        input { 
            width: 100%; height: 55px; border: 1px solid #eee; border-radius: 14px; 
            padding: 0 15px; margin-bottom: 20px; box-sizing: border-box; 
            outline: none; background: #fafafa; font-size: 1.1rem; 
        }
        
        .btn-black { 
            width: 100%; height: 58px; background: #333; color: white; 
            border: none; border-radius: 15px; font-weight: bold; font-size: 1.1rem;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn-black:active { transform: scale(0.98); }
    </style>
</head>
<body onload="checkStatus()">

    <div class="top-header-section">
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <h1 class="main-title">관리자 전용</h1>
    </div>

    <div class="main-container">
        <div id="loginSection" class="card">
            <h2 style="font-size:1.15rem; margin-bottom:25px; color:#222;">관리자 로그인</h2>
            <input type="text" id="loginId" placeholder="관리자 ID (사번)">
            <input type="password" id="loginPw" placeholder="비밀번호">
            <button class="btn-black" onclick="location.href='admin_main.html'">로그인</button>
            <a href="index.html" style="display:block; margin-top:25px; color:#ccc; font-size:0.85rem; text-decoration:none;">홈으로 돌아가기</a>
        </div>

        <div id="setupSection" class="card" style="display:none;">
            <h2 style="font-size:1.15rem; margin-bottom:25px; color:var(--dtro-blue); line-height:1.5;">
                최초 설정을 위해<br>마스터 비번을 입력하세요
            </h2>
            <input type="password" id="masterInput" placeholder="Master Password" style="text-align:center;">
            <button class="btn-black" onclick="verifyMaster()">마스터 인증</button>
        </div>
    </div>

    <script>
        function verifyMaster() {
            if(document.getElementById('masterInput').value === '1234') {
                location.href = 'admin_first_reg.html';
            } else {
                alert('마스터 비밀번호가 틀립니다.');
            }
        }
    </script>
</body>
</html>
