<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>실시간 이수 현황</title>
    <style>
        :root { --dtro-blue: #0072bc; --bg-gray: #f4f6f9; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-gray); }
        body { font-family: 'Noto Sans KR', sans-serif; display: flex; flex-direction: column; align-items: center; }

        /* 🚨 다른 페이지와 동일하게 패딩 12px 및 로고 크기 42px 적용 */
        .top-header { width: 100%; background: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; box-sizing: border-box; }
        .back-btn { background: white; border: 1px solid #eaeaea; border-radius: 6px; padding: 6px 12px; font-size: 0.85rem; color: #555; cursor: pointer; font-weight: bold; }
        
        /* 🚨 로고 크기 32px -> 42px로 상향 */
        .brand-logo { height: 42px; object-fit: contain; }

        .main-container { width: 92%; max-width: 500px; padding: 20px 0; }
        
        /* 교육 선택 셀렉트 박스 */
        .select-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); margin-bottom: 20px; }
        select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; background: #fff; }

        /* 통계 요약 카드 */
        .stats-summary { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 20px; text-align: center; }
        .progress-container { background: #eee; border-radius: 10px; height: 20px; width: 100%; margin: 15px 0; overflow: hidden; }
        .progress-bar { background: var(--dtro-blue); height: 100%; width: 0%; transition: width 0.5s ease; }
        .stats-grid { display: flex; justify-content: space-around; margin-top: 15px; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: var(--dtro-blue); }
        .stat-label { font-size: 0.8rem; color: #888; }

        /* 명단 탭 */
        .tab-menu { display: flex; margin-bottom: 15px; background: #e0e0e0; border-radius: 10px; padding: 4px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 7px; cursor: pointer; font-size: 0.9rem; font-weight: bold; color: #666; background: none; }
        .tab-btn.active { background: white; color: var(--dtro-blue); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* 명단 리스트 */
        .list-card { background: white; border-radius: 15px; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #f9f9f9; }
        .user-name { font-weight: bold; }
        .user-id { font-size: 0.8rem; color: #999; }
        .status-badge { font-size: 0.75rem; padding: 4px 8px; border-radius: 5px; font-weight: bold; }
        .status-done { background: #eef9f1; color: #2ecc71; }
        .status-yet { background: #fff0f0; color: #ff4d4d; }
    </style>
</head>
<body>

    <div class="top-header">
        <button class="back-btn" onclick="location.href='admin_main.html'">이전으로</button>
        <img src="logo.png" class="brand-logo" alt="DTRO">
        <div style="width:75px;"></div>
    </div>

    <div class="main-container">
        <div class="select-card">
            <div style="font-weight:bold; margin-bottom:10px; font-size:0.9rem; color:#555;">현황을 확인할 교육 선택</div>
            <select id="eduSelect" onchange="updateStats()"></select>
        </div>

        <div class="stats-summary">
            <div id="selectedEduTitle" style="font-weight:bold; font-size:1.1rem; margin-bottom:5px;">교육을 선택해주세요</div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-value" id="totalCount">0</span>
                    <span class="stat-label">대상 인원</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="doneCount" style="color:#2ecc71;">0</span>
                    <span class="stat-label">이수 완료</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="yetCount" style="color:#ff4d4d;">0</span>
                    <span class="stat-label">미이수</span>
                </div>
            </div>
        </div>

        <div class="tab-menu">
            <button class="tab-btn active" id="tabYet" onclick="switchTab('yet')">미이수자 명단</button>
            <button class="tab-btn" id="tabDone" onclick="switchTab('done')">이수 완료자</button>
        </div>

        <div class="list-card" id="listArea"></div>
    </div>

    <script>
        const adminDept = localStorage.getItem('userDept') || "경산승무팀";
        let currentTab = 'yet';

        window.onload = function() {
            loadEduOptions();
        };

        function loadEduOptions() {
            const eduSelect = document.getElementById('eduSelect');
            const allEduList = JSON.parse(localStorage.getItem('totalEduList')) || []; // 🚨 totalEduList로 명칭 통일
            const myEduList = allEduList.filter(edu => edu.dept === adminDept);

            if (myEduList.length === 0) {
                eduSelect.innerHTML = '<option value="">등록된 교육이 없습니다</option>';
                return;
            }

            let html = '<option value="">교육을 선택하세요</option>';
            myEduList.forEach(edu => {
                html += `<option value="${edu.title}">${edu.title}</option>`;
            });
            eduSelect.innerHTML = html;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabYet').classList.toggle('active', tab === 'yet');
            document.getElementById('tabDone').classList.toggle('active', tab === 'done');
            updateStats();
        }

        function updateStats() {
            const selectedTitle = document.getElementById('eduSelect').value;
            if (!selectedTitle) return;

            document.getElementById('selectedEduTitle').innerText = selectedTitle;

            const totalUserList = JSON.parse(localStorage.getItem('totalUserList')) || [];
            const myDeptUsers = totalUserList.filter(u => u.dept === adminDept);
            const completedList = JSON.parse(localStorage.getItem('completedEduList')) || [];
            
            const doneUsersInDept = myDeptUsers.filter(user => {
                return completedList.some(done => done.title === selectedTitle && done.empId === user.id);
            });

            const yetUsersInDept = myDeptUsers.filter(user => {
                return !doneUsersInDept.some(done => done.id === user.id);
            });

            const total = myDeptUsers.length;
            const done = doneUsersInDept.length;
            const yet = yetUsersInDept.length;
            const percent = total > 0 ? (done / total) * 100 : 0;

            document.getElementById('totalCount').innerText = total;
            document.getElementById('doneCount').innerText = done;
            document.getElementById('yetCount').innerText = yet;
            document.getElementById('progressBar').style.width = percent + "%";

            renderList(currentTab === 'done' ? doneUsersInDept : yetUsersInDept);
        }

        function renderList(users) {
            const listArea = document.getElementById('listArea');
            if (users.length === 0) {
                listArea.innerHTML = '<div style="text-align:center; padding:30px; color:#999;">해당되는 인원이 없습니다.</div>';
                return;
            }

            let html = '';
            users.forEach(user => {
                const statusLabel = currentTab === 'done' ? '이수완료' : '미이수';
                const statusClass = currentTab === 'done' ? 'status-done' : 'status-yet';
                html += `
                <div class="user-item">
                    <div class="user-info">
                        <span class="user-name">${user.name}</span>
                        <span class="user-id">사번: ${user.id}</span>
                    </div>
                    <span class="status-badge ${statusClass}">${statusLabel}</span>
                </div>
                `;
            });
            listArea.innerHTML = html;
        }
    </script>
</body>
</html>
