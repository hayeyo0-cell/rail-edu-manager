<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이수 현황</title>
    <style>
        :root { --dtro-blue: #0072bc; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8f9fb; margin: 0; padding: 0; }
        .header { background: white; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; }
        .container { padding: 20px; }
        .stat-card { background: white; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .progress-bar { width: 100%; height: 18px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-fill { width: 75%; height: 100%; background: var(--dtro-blue); }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="history.back()" style="background:none; border:none; font-size:1.3rem;">←</button>
        <span style="font-weight:bold; margin-left:10px;">실시간 이수 현황</span>
    </div>
    <div class="container">
        <div class="stat-card">
            <div style="font-size: 0.9rem; color: #666;">전체 이수율</div>
            <div style="font-size: 2rem; font-weight: bold; color: var(--dtro-blue); margin: 5px 0;">75%</div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <div style="font-size: 0.85rem; color: #999;">완료 12명 / 미이수 4명</div>
        </div>
    </div>
</body>
</html>
